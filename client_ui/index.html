<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory</title>
<style>
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface2:  #21262d;
  --border:    #30363d;
  --accent:    #58a6ff;
  --green:     #3fb950;
  --warn:      #d29922;
  --danger:    #f85149;
  --text:      #e6edf3;
  --muted:     #8b949e;
  --radius:    10px;
  --user-bg:   rgba(31,111,235,.1);
  --user-bd:   rgba(31,111,235,.25);
  --think-bg:  rgba(210,153,34,.06);
  --think-bd:  rgba(210,153,34,.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
}

/* ── Scrollbar ─────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── Layout ────────────────────────────────────────────────────── */
#sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Sidebar ───────────────────────────────────────────────────── */
.sidebar-top {
  padding: 14px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo {
  font-weight: 700;
  font-size: 15px;
  color: var(--accent);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.new-chat-btn {
  background: var(--accent);
  color: #0d1117;
  border: none;
  border-radius: 7px;
  padding: 6px 11px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  transition: filter .15s;
}
.new-chat-btn:hover { filter: brightness(1.12); }

#conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 6px;
}
.conv-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background .12s;
  position: relative;
}
.conv-item:hover { background: var(--surface2); }
.conv-item.active { background: rgba(88,166,255,.1); }
.conv-item-icon { font-size: 15px; flex-shrink: 0; opacity: .7; }
.conv-item-body { flex: 1; min-width: 0; }
.conv-item-title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.conv-item.active .conv-item-title { color: var(--accent); }
.conv-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.conv-del-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 5px;
  font-size: 13px;
  opacity: 0;
  transition: opacity .15s, background .15s;
  flex-shrink: 0;
}
.conv-item:hover .conv-del-btn { opacity: 1; }
.conv-del-btn:hover { background: rgba(248,81,73,.15); color: var(--danger); }

.sidebar-bottom {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
}
.settings-btn {
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  padding: 9px 12px;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all .15s;
}
.settings-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Chat header ───────────────────────────────────────────────── */
#chat-header {
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 54px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  flex-shrink: 0;
}
#chat-title-wrap { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; }
#chat-title {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  color: var(--text);
  padding: 3px 6px;
  border-radius: 5px;
  transition: background .12s;
}
#chat-title:hover { background: var(--surface2); }
#chat-title-input {
  display: none;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 5px;
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  padding: 3px 8px;
  outline: none;
  width: 300px;
}
.model-badge {
  font-size: 11px;
  background: rgba(88,166,255,.1);
  border: 1px solid rgba(88,166,255,.2);
  color: var(--accent);
  border-radius: 999px;
  padding: 2px 9px;
  white-space: nowrap;
}
.icon-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--muted);
  cursor: pointer;
  padding: 6px 8px;
  border-radius: 7px;
  font-size: 13px;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.icon-btn:hover { border-color: var(--border); color: var(--text); background: var(--surface2); }
.icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(248,81,73,.06); }

/* ── Messages ──────────────────────────────────────────────────── */
#messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px 0;
  display: flex;
  flex-direction: column;
}

/* Welcome screen */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
}
#welcome .welcome-icon { font-size: 52px; }
#welcome h2 { font-size: 22px; color: var(--text); }
#welcome p { font-size: 14px; }

/* Message wrap */
.message-wrap {
  display: flex;
  gap: 12px;
  padding: 8px 24px;
  animation: fadeUp .2s ease;
  max-width: 900px;
  width: 100%;
  align-self: center;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* User message */
.message-wrap.user { flex-direction: row-reverse; }
.message-wrap.user .msg-content-wrap {
  background: var(--user-bg);
  border: 1px solid var(--user-bd);
  border-radius: 14px 14px 4px 14px;
  align-items: flex-end;
}
.message-wrap.user .msg-text { color: var(--text); }
.message-wrap.user .msg-meta { justify-content: flex-end; }

/* AI message */
.message-wrap.assistant .msg-content-wrap {
  background: transparent;
  border-radius: 4px 14px 14px 14px;
}

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  margin-top: 2px;
}
.user-avatar {
  background: rgba(31,111,235,.2);
  border: 1px solid rgba(31,111,235,.3);
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
}
.ai-avatar {
  background: rgba(63,185,80,.1);
  border: 1px solid rgba(63,185,80,.2);
}

.msg-content-wrap {
  flex: 1;
  min-width: 0;
  padding: 12px 16px;
}
.msg-text {
  color: var(--text);
  line-height: 1.7;
  word-break: break-word;
}
/* Streaming cursor */
.stream-cursor::after {
  content: '▌';
  animation: blink .6s step-end infinite;
  color: var(--accent);
}
@keyframes blink {
  50% { opacity: 0; }
}
/* Status / tool indicator */
.msg-status {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.msg-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
}
.msg-model-tag {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
}
.msg-action-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  font-size: 12px;
  transition: all .12s;
  opacity: 0;
}
.message-wrap:hover .msg-action-btn { opacity: 1; }
.msg-action-btn:hover { background: var(--surface2); color: var(--text); }

/* Thinking block */
.thinking-block {
  background: var(--think-bg);
  border: 1px solid var(--think-bd);
  border-radius: 8px;
  margin-bottom: 12px;
  overflow: hidden;
}
.thinking-toggle {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 9px 13px;
  cursor: pointer;
  font-size: 12px;
  color: var(--warn);
  font-weight: 600;
  user-select: none;
  transition: background .12s;
}
.thinking-toggle:hover { background: rgba(210,153,34,.08); }
.thinking-arrow { margin-left: auto; font-size: 10px; transition: transform .2s; }
.thinking-arrow.open { transform: rotate(180deg); }
.thinking-body {
  display: none;
  padding: 0 13px 12px;
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
}

/* Markdown styles */
.msg-text h1 { font-size: 1.4em; font-weight: 700; margin: .8em 0 .4em; border-bottom: 1px solid var(--border); padding-bottom: .2em; }
.msg-text h2 { font-size: 1.2em; font-weight: 700; margin: .7em 0 .3em; }
.msg-text h3 { font-size: 1.05em; font-weight: 700; margin: .6em 0 .3em; }
.msg-text p  { margin: .5em 0; }
.msg-text ul, .msg-text ol { padding-left: 1.5em; margin: .5em 0; }
.msg-text li { margin: .2em 0; }
.msg-text blockquote {
  border-left: 3px solid var(--accent);
  margin: .5em 0;
  padding: .3em .8em;
  color: var(--muted);
  background: rgba(88,166,255,.04);
  border-radius: 0 5px 5px 0;
}
.msg-text a { color: var(--accent); text-decoration: none; }
.msg-text a:hover { text-decoration: underline; }
.msg-text hr { border: none; border-top: 1px solid var(--border); margin: .8em 0; }
.msg-text strong { font-weight: 700; }
.msg-text em { font-style: italic; }
code.inline-code {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: .88em;
  color: #e06c75;
}
.code-block {
  background: #010409;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: .6em 0;
  overflow: hidden;
}
.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: rgba(255,255,255,.02);
  border-bottom: 1px solid var(--border);
}
.code-lang {
  font-size: 11px;
  color: var(--muted);
  font-family: monospace;
  text-transform: lowercase;
}
.copy-code-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  border-radius: 5px;
  padding: 2px 8px;
  font-size: 11px;
  transition: all .12s;
}
.copy-code-btn:hover { border-color: var(--accent); color: var(--text); }
.code-block pre {
  margin: 0;
  padding: 14px 16px;
  overflow-x: auto;
}
.code-block code {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 13px;
  line-height: 1.6;
  color: #c9d1d9;
  white-space: pre;
}

/* ── Input area ────────────────────────────────────────────────── */
#input-area {
  border-top: 1px solid var(--border);
  padding: 12px 20px 16px;
  background: var(--surface);
  flex-shrink: 0;
}
.input-options {
  display: flex;
  gap: 14px;
  margin-bottom: 10px;
}
.opt-toggle {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all .12s;
  user-select: none;
}
.opt-toggle:has(input:checked) {
  color: var(--accent);
  border-color: rgba(88,166,255,.3);
  background: rgba(88,166,255,.07);
}
.opt-toggle input { display: none; }
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
#msg-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  padding: 11px 14px;
  resize: none;
  outline: none;
  transition: border-color .15s;
  max-height: 180px;
  overflow-y: auto;
  line-height: 1.5;
}
#msg-input:focus { border-color: var(--accent); }
#msg-input::placeholder { color: var(--muted); }
.send-btn, .stop-btn {
  width: 38px;
  height: 38px;
  border-radius: 9px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.send-btn { background: var(--accent); color: #0d1117; }
.send-btn:hover { filter: brightness(1.12); }
.send-btn:disabled { opacity: .35; cursor: not-allowed; }
.stop-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 13px; }
.stop-btn:hover { border-color: var(--danger); color: var(--danger); }

/* ── Settings modal ────────────────────────────────────────────── */
#settings-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 560px;
  max-width: 95vw;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.modal-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
}
.modal-header h2 { flex: 1; font-size: 16px; font-weight: 700; }
.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 18px;
  padding: 4px 7px;
  border-radius: 6px;
  transition: all .12s;
}
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.modal-section { margin-bottom: 20px; }
.modal-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 12px;
}
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
.input-wrap { position: relative; }
.modal input[type=text],
.modal input[type=password],
.modal input[type=number],
.modal select,
.modal textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color .15s;
  font-family: inherit;
}
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--accent); }
.modal textarea { resize: vertical; min-height: 70px; }
.modal select { cursor: pointer; }
.eye-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 15px;
  padding: 4px;
  transition: color .12s;
}
.eye-btn:hover { color: var(--text); }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--accent); color: #0d1117; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.model-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.model-chip {
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 12px;
  cursor: pointer;
  color: var(--muted);
  transition: all .12s;
}
.model-chip:hover, .model-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,.07); }
.conn-result {
  font-size: 12px;
  padding: 7px 12px;
  border-radius: 7px;
  margin-top: 8px;
  display: none;
}
.conn-result.ok  { background: rgba(63,185,80,.1);  border: 1px solid rgba(63,185,80,.3);  color: var(--green); display:block; }
.conn-result.err { background: rgba(248,81,73,.1);  border: 1px solid rgba(248,81,73,.3);  color: var(--danger); display:block; }
.hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Toast ─────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 18px;
  font-size: 13px;
  color: var(--text);
  opacity: 0;
  transition: all .25s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sidebar-top">
    <div class="logo">🧠 AI Memory</div>
    <button class="new-chat-btn" onclick="App.newConversation()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
      新对话
    </button>
  </div>
  <div id="conv-list"></div>
  <div class="sidebar-bottom">
    <button class="settings-btn" onclick="App.openSettings()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      设置
    </button>
  </div>
</aside>

<!-- ── Main area ───────────────────────────────────────────────── -->
<main id="main">
  <header id="chat-header">
    <div id="chat-title-wrap">
      <span id="chat-title" onclick="App.startRenameTitle()" title="点击重命名">New Chat</span>
      <input id="chat-title-input" type="text" onblur="App.commitRenameTitle()" onkeydown="if(event.key==='Enter')App.commitRenameTitle(); if(event.key==='Escape')App.cancelRenameTitle();" maxlength="80">
    </div>
    <span id="model-badge" class="model-badge"></span>
    <button class="icon-btn danger" title="清空对话" onclick="App.clearConversation()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      清空
    </button>
  </header>

  <div id="messages-container">
    <div id="welcome">
      <div class="welcome-icon">🧠</div>
      <h2>AI Memory</h2>
      <p>选择左侧对话，或点击「新对话」开始</p>
    </div>
  </div>

  <div id="input-area">
    <div class="input-options">
      <label class="opt-toggle" id="opt-search-label">
        <input type="checkbox" id="opt-search"> 🔍 联网搜索
      </label>
      <label class="opt-toggle" id="opt-rag-label">
        <input type="checkbox" id="opt-rag"> 📚 记忆检索
      </label>
    </div>
    <div class="input-row">
      <textarea id="msg-input" rows="1"
        placeholder="发送消息… (Enter 发送，Shift+Enter 换行)"
        onkeydown="handleInputKey(event)"
        oninput="autoResizeInput(this)"></textarea>
      <button class="stop-btn" id="stop-btn" onclick="App.stopGeneration()" style="display:none" title="停止">⬛</button>
      <button class="send-btn" id="send-btn" onclick="App.sendMessage()" title="发送 (Enter)">↑</button>
    </div>
  </div>
</main>

<!-- ── Settings modal ─────────────────────────────────────────── -->
<div id="settings-modal" style="display:none" onclick="if(event.target===this)App.closeSettings()">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙️ 设置</h2>
      <button class="modal-close" onclick="App.closeSettings()">✕</button>
    </div>
    <div class="modal-body">

      <div class="modal-section">
        <div class="modal-section-title">上游 API</div>
        <div class="field">
          <label>API 地址（Base URL）</label>
          <input type="text" id="s-baseurl" placeholder="https://api.deepseek.com">
          <p class="hint">DeepSeek: https://api.deepseek.com &nbsp;·&nbsp; OpenAI: https://api.openai.com</p>
        </div>
        <div class="field">
          <label>API Key</label>
          <div class="input-wrap">
            <input type="password" id="s-apikey" placeholder="sk-xxxxxxxxxxxxxxxx">
            <button class="eye-btn" onclick="toggleEye('s-apikey',this)">👁</button>
          </div>
          <p class="hint">仅保存在本地，不会上传至任何第三方</p>
        </div>
        <div class="field">
          <label>模型</label>
          <input type="text" id="s-model" placeholder="deepseek-chat">
          <div class="model-chips" id="model-chips"></div>
        </div>
        <div class="field">
          <label>Temperature（0 ~ 2）</label>
          <input type="number" id="s-temp" min="0" max="2" step="0.1" value="0.7">
        </div>
        <div id="conn-result" class="conn-result"></div>
        <button class="btn btn-secondary" style="margin-top:10px" onclick="App.testConnection()">🔗 测试连接</button>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">工具 &amp; 功能</div>
        <div class="field">
          <label>联网搜索</label>
          <select id="s-websearch">
            <option value="auto">自动（根据关键词智能判断）</option>
            <option value="true">总是启用</option>
            <option value="false">总是禁用</option>
          </select>
        </div>
        <div class="field" style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="s-rag" style="width:auto;cursor:pointer">
          <label for="s-rag" style="margin:0;color:var(--text);cursor:pointer">默认启用 RAG 记忆检索</label>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">系统提示词（System Prompt）</div>
        <div class="field">
          <textarea id="s-sysprompt" rows="4" placeholder="可选：为所有对话设置全局 System Prompt…"></textarea>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="App.closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="App.saveSettings()">💾 保存设置</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

// ── Markdown renderer ───────────────────────────────────────────────────────
function renderMarkdown(raw) {
  if (!raw) return '';
  const codeBlocks = [], inlineCodes = [];

  // Extract fenced code blocks
  let text = raw.replace(/```([\w\-]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: (lang || '').trim(), code });
    return `\x02CB${idx}\x03`;
  });

  // Extract inline code
  text = text.replace(/`([^`\n]+)`/g, (_, code) => {
    const idx = inlineCodes.length;
    inlineCodes.push(code);
    return `\x02IC${idx}\x03`;
  });

  // HTML escape remaining text (\x02/\x03 are unaffected)
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text = esc(text);

  // Headings
  text = text.replace(/^#{3} (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^#{2} (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^#{1} (.+)$/gm, '<h1>$1</h1>');

  // Bold / italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/gs, '<strong><em>$1</em></strong>');
  text = text.replace(/\*\*(.+?)\*\*/gs, '<strong>$1</strong>');
  text = text.replace(/\*([^*\n]+?)\*/g,  '<em>$1</em>');

  // Blockquote
  text = text.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

  // Horizontal rule
  text = text.replace(/^[-*_]{3,}$/gm, '<hr>');

  // Unordered lists
  text = text.replace(/((?:^[ \t]*[-*+] [^\n]+\n?)+)/gm, blk => {
    const items = blk.replace(/^[ \t]*[-*+] (.+)$/gm, '<li>$1</li>');
    return `<ul>${items}</ul>`;
  });

  // Ordered lists
  text = text.replace(/((?:^\d+\. [^\n]+\n?)+)/gm, blk => {
    const items = blk.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    return `<ol>${items}</ol>`;
  });

  // Paragraphs (split on blank lines)
  const BLOCK_START = /^<(h[1-6]|ul|ol|blockquote|hr|div|pre)/;
  const paras = text.split(/\n{2,}/);
  text = paras.map(p => {
    const trimmed = p.trim();
    if (!trimmed) return '';
    if (BLOCK_START.test(trimmed)) return trimmed;
    return '<p>' + trimmed.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  // Restore code blocks
  text = text.replace(/\x02CB(\d+)\x03/g, (_, i) => {
    const { lang, code } = codeBlocks[i];
    const escaped = esc(code);
    const langHtml = lang ? `<span class="code-lang">${esc(lang)}</span>` : '';
    return `<div class="code-block"><div class="code-header">${langHtml}<button class="copy-code-btn" onclick="copyCode(this)">复制</button></div><pre><code>${escaped}</code></pre></div>`;
  });

  // Restore inline code
  text = text.replace(/\x02IC(\d+)\x03/g, (_, i) =>
    `<code class="inline-code">${esc(inlineCodes[i])}</code>`
  );

  return text;
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code');
  navigator.clipboard.writeText(code.innerText || code.textContent).then(() => {
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制', 2000);
  });
}

// ── Utility ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function toast(msg, duration = 2500) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), duration);
}

function timeAgo(ts) {
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 60)   return '刚刚';
  if (diff < 3600) return `${Math.floor(diff/60)} 分钟前`;
  if (diff < 86400)return `${Math.floor(diff/3600)} 小时前`;
  return `${Math.floor(diff/86400)} 天前`;
}

function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
}

function toggleEye(id, btn) {
  const el = $(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

function autoResizeInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    App.sendMessage();
  }
}

// ── App state ────────────────────────────────────────────────────────────────
const App = {
  activeConvId: null,
  conversations: [],
  isStreaming: false,
  _stream: { msgId: null, reasoningText: '', contentText: '', statusEl: null, bodyEl: null, reasoningBodyEl: null },

  // ── init ──────────────────────────────────────────────────────────────────
  async init() {
    await this.loadConfig();
    await this.loadConversations();
    if (this.conversations.length > 0) {
      await this.selectConversation(this.conversations[0].id);
    }
  },

  // ── API helper ────────────────────────────────────────────────────────────
  async api(method, ...args) {
    if (!window.pywebview) throw new Error('pywebview not ready');
    return window.pywebview.api[method](...args);
  },

  // ── Config ────────────────────────────────────────────────────────────────
  async loadConfig() {
    const cfg = await this.api('get_config');
    $('model-badge').textContent = cfg.model || 'deepseek-chat';
    $('opt-search').checked = cfg.tool_web_search === 'true';
    $('opt-rag').checked    = !!cfg.tool_rag;
  },

  async openSettings() {
    const cfg = await this.api('get_config');
    $('s-baseurl').value    = cfg.upstream_base_url || '';
    $('s-apikey').value     = cfg.api_key_masked    || '';
    $('s-model').value      = cfg.model             || 'deepseek-chat';
    $('s-temp').value       = cfg.temperature       ?? 0.7;
    $('s-websearch').value  = cfg.tool_web_search   || 'auto';
    $('s-rag').checked      = !!cfg.tool_rag;
    $('s-sysprompt').value  = cfg.system_prompt     || '';
    $('conn-result').className = 'conn-result';

    // Load available models as chips
    $('model-chips').innerHTML = '<span style="font-size:11px;color:var(--muted)">加载中…</span>';
    $('settings-modal').style.display = 'flex';
    this.api('list_upstream_models').then(models => {
      const chips = $('model-chips');
      chips.innerHTML = '';
      const current = $('s-model').value;
      models.forEach(m => {
        const c = document.createElement('div');
        c.className = 'model-chip' + (m.id === current ? ' active' : '');
        c.textContent = m.id;
        c.onclick = () => {
          $('s-model').value = m.id;
          chips.querySelectorAll('.model-chip').forEach(x => x.classList.remove('active'));
          c.classList.add('active');
        };
        chips.appendChild(c);
      });
    }).catch(() => {
      $('model-chips').innerHTML = '<span style="font-size:11px;color:var(--muted)">无法加载（请先保存 API Key）</span>';
    });
  },

  closeSettings() {
    $('settings-modal').style.display = 'none';
  },

  async saveSettings() {
    const apiKeyInput = $('s-apikey').value.trim();
    const updates = {
      upstream_base_url: $('s-baseurl').value.trim(),
      model:             $('s-model').value.trim(),
      temperature:       parseFloat($('s-temp').value) || 0.7,
      tool_web_search:   $('s-websearch').value,
      tool_rag:          $('s-rag').checked,
      system_prompt:     $('s-sysprompt').value,
    };
    // 只有用户实际输入了 key 才更新（避免掩码覆盖真实值）
    if (apiKeyInput && !apiKeyInput.includes('·')) {
      updates.api_key = apiKeyInput;
    }
    await this.api('save_config', updates);
    $('model-badge').textContent = updates.model || 'deepseek-chat';
    toast('✅ 设置已保存');
    this.closeSettings();
  },

  async testConnection() {
    const res = $('conn-result');
    res.className = 'conn-result';
    res.textContent = '连接中…';
    res.style.display = 'block';
    // 先保存当前输入的 key 用于测试
    const apiKeyInput = $('s-apikey').value.trim();
    if (apiKeyInput && !apiKeyInput.includes('·')) {
      await this.api('save_config', {
        upstream_base_url: $('s-baseurl').value.trim(),
        api_key: apiKeyInput,
        model: $('s-model').value.trim(),
      });
    }
    const result = await this.api('test_connection');
    res.className = result.ok ? 'conn-result ok' : 'conn-result err';
    res.textContent = (result.ok ? '✅ ' : '❌ ') + result.message;
  },

  // ── Conversations ─────────────────────────────────────────────────────────
  async loadConversations() {
    this.conversations = await this.api('list_conversations');
    this.renderSidebar();
  },

  renderSidebar() {
    const list = $('conv-list');
    if (!this.conversations.length) {
      list.innerHTML = '<div style="padding:20px 10px;text-align:center;color:var(--muted);font-size:12px">暂无对话<br>点击「新对话」开始</div>';
      return;
    }
    list.innerHTML = this.conversations.map(c => `
      <div class="conv-item ${c.id === this.activeConvId ? 'active' : ''}" data-id="${c.id}"
           onclick="App.selectConversation('${c.id}')" ondblclick="App.startRenameConv('${c.id}')">
        <div class="conv-item-icon">💬</div>
        <div class="conv-item-body">
          <div class="conv-item-title" id="conv-title-${c.id}">${escHtml(c.title)}</div>
          <div class="conv-item-meta">${c.message_count} 条消息 · ${timeAgo(c.updated_at)}</div>
        </div>
        <button class="conv-del-btn" onclick="event.stopPropagation();App.deleteConversation('${c.id}')"
                title="删除对话">🗑</button>
      </div>
    `).join('');
  },

  async newConversation() {
    const conv = await this.api('new_conversation');
    this.conversations.unshift({ id: conv.id, title: conv.title, updated_at: conv.updated_at, message_count: 0 });
    await this.selectConversation(conv.id);
    this.renderSidebar();
    $('msg-input').focus();
  },

  async selectConversation(id) {
    this.activeConvId = id;
    const conv = await this.api('get_conversation', id);
    if (!conv) return;
    this.renderSidebar();
    this.renderMessages(conv);
    $('chat-title').textContent = conv.title || 'New Chat';
  },

  async deleteConversation(id) {
    if (!confirm('确定删除这条对话吗？')) return;
    await this.api('delete_conversation', id);
    this.conversations = this.conversations.filter(c => c.id !== id);
    if (this.activeConvId === id) {
      this.activeConvId = null;
      $('messages-container').innerHTML = `
        <div id="welcome">
          <div class="welcome-icon">🧠</div>
          <h2>AI Memory</h2>
          <p>选择左侧对话，或点击「新对话」开始</p>
        </div>`;
      $('chat-title').textContent = 'New Chat';
      $('model-badge').textContent = '';
    }
    this.renderSidebar();
    toast('对话已删除');
  },

  async clearConversation() {
    if (!this.activeConvId) return;
    if (!confirm('确定清空这条对话的所有消息吗？')) return;
    await this.api('clear_conversation', this.activeConvId);
    const conv = await this.api('get_conversation', this.activeConvId);
    this.renderMessages(conv);
    const item = this.conversations.find(c => c.id === this.activeConvId);
    if (item) item.message_count = 0;
    this.renderSidebar();
    toast('对话已清空');
  },

  // ── Title editing ─────────────────────────────────────────────────────────
  startRenameTitle() {
    if (!this.activeConvId) return;
    const inp = $('chat-title-input');
    inp.value = $('chat-title').textContent;
    $('chat-title').style.display = 'none';
    inp.style.display = 'block';
    inp.focus();
    inp.select();
  },

  async commitRenameTitle() {
    const inp = $('chat-title-input');
    const newTitle = inp.value.trim() || 'New Chat';
    inp.style.display = 'none';
    $('chat-title').style.display = '';
    if (!this.activeConvId) return;
    await this.api('rename_conversation', this.activeConvId, newTitle);
    $('chat-title').textContent = newTitle;
    const item = this.conversations.find(c => c.id === this.activeConvId);
    if (item) item.title = newTitle;
    this.renderSidebar();
  },

  cancelRenameTitle() {
    $('chat-title-input').style.display = 'none';
    $('chat-title').style.display = '';
  },

  async startRenameConv(id) {
    const titleEl = $(`conv-title-${id}`);
    if (!titleEl) return;
    const cur = titleEl.textContent;
    const name = prompt('重命名对话', cur);
    if (!name || name.trim() === cur) return;
    await this.api('rename_conversation', id, name.trim());
    const item = this.conversations.find(c => c.id === id);
    if (item) item.title = name.trim();
    if (id === this.activeConvId) $('chat-title').textContent = name.trim();
    this.renderSidebar();
  },

  updateConvTitle(convId, title) {
    const item = this.conversations.find(c => c.id === convId);
    if (item) item.title = title;
    if (convId === this.activeConvId) $('chat-title').textContent = title;
    this.renderSidebar();
  },

  // ── Message rendering ─────────────────────────────────────────────────────
  renderMessages(conv) {
    const container = $('messages-container');
    if (!conv.messages || !conv.messages.length) {
      container.innerHTML = `
        <div id="welcome" style="flex:1">
          <div class="welcome-icon">💬</div>
          <h2>${escHtml(conv.title)}</h2>
          <p>发送第一条消息开始对话</p>
        </div>`;
      const mdl = this._getModel();
      $('model-badge').textContent = mdl;
      return;
    }
    container.innerHTML = '';
    conv.messages.forEach(m => {
      if (m.role === 'user')      container.appendChild(this._buildUserMsg(m));
      if (m.role === 'assistant') container.appendChild(this._buildAiMsg(m));
    });
    const mdl = conv.messages.filter(m => m.role === 'assistant').pop()?.model || this._getModel();
    $('model-badge').textContent = mdl;
    this._scrollToBottom();
  },

  _getModel() {
    return $('model-badge').textContent || 'deepseek-chat';
  },

  _buildUserMsg(m) {
    const wrap = document.createElement('div');
    wrap.className = 'message-wrap user';
    wrap.dataset.id = m.id;
    wrap.innerHTML = `
      <div class="msg-avatar user-avatar">你</div>
      <div class="msg-content-wrap">
        <div class="msg-text">${escHtml(m.content || '')}</div>
        <div class="msg-meta">
          <span>${fmtTime(m.created_at)}</span>
          <button class="msg-action-btn" title="复制" onclick="copyText(${JSON.stringify(m.content || '')})">⧉</button>
        </div>
      </div>`;
    return wrap;
  },

  _buildAiMsg(m) {
    const wrap = document.createElement('div');
    wrap.className = 'message-wrap assistant';
    wrap.dataset.id = m.id;

    const reasoning = (m.reasoning_content || '').trim();
    const thinkHtml = reasoning ? `
      <div class="thinking-block">
        <div class="thinking-toggle" onclick="toggleThinking(this)">
          <span>💭</span>
          <span>思考过程</span>
          <span class="thinking-arrow">▼</span>
        </div>
        <div class="thinking-body">${escHtml(reasoning)}</div>
      </div>` : '';

    const content   = (m.content || '').trim();
    const usage     = m.usage || {};
    const tokStr    = usage.total_tokens ? ` · ${usage.total_tokens} tokens` : '';
    const modelTag  = m.model ? `<span class="msg-model-tag">${escHtml(m.model)}</span>` : '';

    wrap.innerHTML = `
      <div class="msg-avatar ai-avatar">🧠</div>
      <div class="msg-content-wrap">
        ${thinkHtml}
        <div class="msg-text">${renderMarkdown(content)}</div>
        <div class="msg-meta">
          ${modelTag}
          <span>${fmtTime(m.created_at)}${tokStr}</span>
          <button class="msg-action-btn" title="复制" onclick="copyText(${JSON.stringify(content)})">⧉</button>
        </div>
      </div>`;
    return wrap;
  },

  // ── Streaming helpers ─────────────────────────────────────────────────────
  _startStreamingUI(msgId) {
    const container = $('messages-container');
    let welcome = $('welcome');
    if (welcome) welcome.remove();

    const wrap = document.createElement('div');
    wrap.className = 'message-wrap assistant';
    wrap.dataset.id = msgId;
    wrap.innerHTML = `
      <div class="msg-avatar ai-avatar">🧠</div>
      <div class="msg-content-wrap">
        <div class="msg-status" id="stream-status-${msgId}"></div>
        <div class="thinking-block" id="thinking-block-${msgId}" style="display:none">
          <div class="thinking-toggle" onclick="toggleThinking(this)">
            <span>💭</span>
            <span>思考中…</span>
            <span class="thinking-arrow open">▼</span>
          </div>
          <div class="thinking-body" style="display:block" id="thinking-body-${msgId}"></div>
        </div>
        <div class="msg-text stream-cursor" id="stream-content-${msgId}"></div>
      </div>`;
    container.appendChild(wrap);
    this._stream.msgId            = msgId;
    this._stream.reasoningText    = '';
    this._stream.contentText      = '';
    this._stream.statusEl         = $(`stream-status-${msgId}`);
    this._stream.bodyEl           = $(`stream-content-${msgId}`);
    this._stream.thinkingBlockEl  = $(`thinking-block-${msgId}`);
    this._stream.thinkingBodyEl   = $(`thinking-body-${msgId}`);
    this._scrollToBottom();
  },

  _appendReasoning(text) {
    this._stream.reasoningText += text;
    const blk  = this._stream.thinkingBlockEl;
    const body = this._stream.thinkingBodyEl;
    if (blk && body) {
      blk.style.display = '';
      body.textContent  = this._stream.reasoningText;
      this._scrollToBottom();
    }
  },

  _appendContent(text) {
    this._stream.contentText += text;
    const el = this._stream.bodyEl;
    if (el) {
      // Show raw text with newlines during streaming for performance
      el.textContent = this._stream.contentText;
      this._scrollToBottom();
    }
  },

  _finalizeStream(usage) {
    const el = this._stream.bodyEl;
    if (el) {
      el.classList.remove('stream-cursor');
      el.innerHTML = renderMarkdown(this._stream.contentText); // Full render on finish
    }
    // Update the thinking header
    const blk = this._stream.thinkingBlockEl;
    if (blk && this._stream.reasoningText) {
      const toggle = blk.querySelector('.thinking-toggle span:nth-child(2)');
      if (toggle) toggle.textContent = '思考过程';
      const arrow = blk.querySelector('.thinking-arrow');
      if (arrow) arrow.classList.remove('open');
      const body  = blk.querySelector('.thinking-body');
      if (body)   body.style.display = 'none'; // collapse on finish
    }
    // Add meta footer
    const wrap = $('messages-container').querySelector(`[data-id="${this._stream.msgId}"]`);
    if (wrap) {
      const contentWrap = wrap.querySelector('.msg-content-wrap');
      const tokStr = usage?.total_tokens ? ` · ${usage.total_tokens} tokens` : '';
      const model  = $('model-badge').textContent || '';
      const modelTag = model ? `<span class="msg-model-tag">${escHtml(model)}</span>` : '';
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.innerHTML = `${modelTag}<span>${fmtTime(Math.floor(Date.now()/1000))}${tokStr}</span>
        <button class="msg-action-btn" title="复制" onclick="copyText(${JSON.stringify(this._stream.contentText)})">⧉</button>`;
      contentWrap.appendChild(meta);
    }
    // Update sidebar count
    if (this.activeConvId) {
      const item = this.conversations.find(c => c.id === this.activeConvId);
      if (item) { item.message_count += 2; item.updated_at = Math.floor(Date.now()/1000); }
      this.conversations.sort((a, b) => b.updated_at - a.updated_at);
      this.renderSidebar();
    }
  },

  _setStreaming(val) {
    this.isStreaming = val;
    $('send-btn').disabled = val;
    $('stop-btn').style.display = val ? 'flex' : 'none';
  },

  _scrollToBottom() {
    const c = $('messages-container');
    c.scrollTop = c.scrollHeight;
  },

  // ── Send message ──────────────────────────────────────────────────────────
  async sendMessage() {
    if (this.isStreaming) return;
    const input = $('msg-input');
    const text  = input.value.trim();
    if (!text) return;

    // Create conversation if none active
    if (!this.activeConvId) {
      await this.newConversation();
    }

    // Append user message to UI immediately
    const container = $('messages-container');
    let welcome = $('welcome');
    if (welcome) welcome.remove();

    const userWrap = document.createElement('div');
    userWrap.className = 'message-wrap user';
    userWrap.innerHTML = `
      <div class="msg-avatar user-avatar">你</div>
      <div class="msg-content-wrap">
        <div class="msg-text">${escHtml(text)}</div>
        <div class="msg-meta"><span>${fmtTime(Math.floor(Date.now()/1000))}</span></div>
      </div>`;
    container.appendChild(userWrap);
    this._scrollToBottom();

    input.value = '';
    input.style.height = 'auto';

    const options = {
      tool_web_search: $('opt-search').checked ? 'true' : 'auto',
      tool_rag:        $('opt-rag').checked,
    };

    this._setStreaming(true);
    await this.api('send_message', this.activeConvId, text, options);
  },

  async stopGeneration() {
    await this.api('stop_generation');
    this._setStreaming(false);
    if (this._stream.bodyEl) {
      this._stream.bodyEl.classList.remove('stream-cursor');
      this._stream.bodyEl.innerHTML = renderMarkdown(this._stream.contentText);
    }
    toast('已停止生成');
  },

  // ── openSettings refactored (already done above) ─────────────────────────
};

// ── Stream event handler ────────────────────────────────────────────────────
window.__onStreamEvent = function(event) {
  switch (event.type) {
    case 'start':
      App._startStreamingUI(event.message_id);
      break;
    case 'status':
      if (App._stream.statusEl) App._stream.statusEl.textContent = event.text;
      break;
    case 'reasoning_chunk':
      App._appendReasoning(event.text);
      break;
    case 'content_chunk':
      // Clear status on first content
      if (App._stream.statusEl && App._stream.statusEl.textContent) {
        App._stream.statusEl.textContent = '';
      }
      App._appendContent(event.text);
      break;
    case 'done':
      App._finalizeStream(event.usage);
      App._setStreaming(false);
      break;
    case 'stopped':
      App._setStreaming(false);
      if (App._stream.bodyEl) {
        App._stream.bodyEl.classList.remove('stream-cursor');
        App._stream.bodyEl.innerHTML = renderMarkdown(App._stream.contentText);
      }
      break;
    case 'error':
      App._setStreaming(false);
      if (App._stream.bodyEl) {
        App._stream.bodyEl.classList.remove('stream-cursor');
        App._stream.bodyEl.innerHTML = `<span style="color:var(--danger)">❌ ${escHtml(event.message)}</span>`;
      }
      toast('❌ ' + event.message, 5000);
      break;
    case 'title_update':
      App.updateConvTitle(event.conv_id, event.title);
      break;
  }
};

// ── Global helpers ──────────────────────────────────────────────────────────
function toggleThinking(toggle) {
  const body  = toggle.nextElementSibling;
  const arrow = toggle.querySelector('.thinking-arrow');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  arrow.classList.toggle('open', !isOpen);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('✅ 已复制'));
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Bootstrap ───────────────────────────────────────────────────────────────
function bootstrap() {
  if (window.pywebview) {
    App.init();
  } else {
    window.addEventListener('pywebviewready', () => App.init());
  }
}
bootstrap();
</script>
