<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Memory</title>
  <script>
    document.documentElement.style.zoom = 1.5;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    /* ── Design Tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:         #0d1117;
      --sb-bg:      #161b22;
      --card:       #1c2333;
      --hover:      #21262d;
      --border:     #30363d;
      --accent:     #58a6ff;
      --accent-bg:  rgba(88,166,255,.12);
      --green:      #3fb950;
      --warn:       #f0883e;
      --danger:     #f85149;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --user-bubble:#1a3350;
      --r:          10px;
      --r-sm:       6px;
      --sb-w:       260px;
    }
    html {
      font-size: 15px;
      height: 100%;
    }

    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   'Noto Sans CJK SC', 'Noto Sans SC', 'Noto Sans CJK',
                   'WenQuanYi Micro Hei', 'WenQuanYi Zen Hei',
                   'PingFang SC', 'Microsoft YaHei',
                   'Source Han Sans CN',
                   'Noto Color Emoji', 'Segoe UI Emoji', 'Apple Color Emoji',
                   sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.6;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    [hidden] { display: none !important; }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app { display: flex; height: 100%; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sb-w);
      min-width: 160px;
      max-width: 480px;
      background: var(--sb-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      user-select: none;
      overflow: hidden;
    }
    #resizeHandle {
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background .15s;
      z-index: 20;
      touch-action: none;   /* 防止触摸手势取消 pointer capture */
    }
    #resizeHandle:hover, #resizeHandle.dragging { background: var(--accent); }
    .sb-header {
      padding: 16px 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 20px; }
    .logo-text { font-size: 15px; font-weight: 700; color: var(--accent); }

    #newChatBtn {
      width: 32px; height: 32px;
      background: var(--accent-bg);
      border: 1px solid rgba(88,166,255,.25);
      border-radius: var(--r-sm);
      color: var(--accent);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 300;
      transition: background .15s;
      flex-shrink: 0;
    }
    #newChatBtn:hover { background: rgba(88,166,255,.22); }

    #convList {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
    }
    .conv-section-label {
      font-size: 11px;
      color: var(--muted);
      padding: 8px 6px 4px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background .12s;
      position: relative;
      margin-bottom: 2px;
    }
    .conv-item:hover { background: var(--hover); }
    .conv-item.active { background: var(--accent-bg); }
    .conv-item .conv-icon { font-size: 14px; flex-shrink: 0; opacity: .7; }
    .conv-item .conv-info { flex: 1; overflow: hidden; }
    .conv-item .conv-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .conv-item.active .conv-title { color: var(--accent); }
    .conv-item .conv-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .conv-item .conv-actions {
      display: none;
      gap: 4px;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
    }
    .conv-item:hover .conv-actions { display: flex; }
    .conv-actions button {
      width: 26px; height: 26px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .conv-actions button:hover { color: var(--accent); border-color: var(--accent); }

    .sb-footer {
      padding: 10px 8px;
      border-top: 1px solid var(--border);
    }
    #settingsBtn {
      width: 100%;
      padding: 9px 12px;
      border-radius: var(--r-sm);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      transition: background .12s, color .12s;
    }
    #settingsBtn:hover { background: var(--hover); color: var(--text); }

    /* ── Main area ──────────────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .chat-header {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }
    #chatTitle {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--accent-bg);
      border: 1px solid rgba(88,166,255,.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    #headerClearBtn {
      padding: 5px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
    }
    #headerClearBtn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Messages ────────────────────────────────────────────────────────── */
    #msgContainer {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    #msgList {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 100%;
    }

    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 2px;
      letter-spacing: 0;
    }
    .msg-row.user .msg-avatar {
      background: rgba(88,166,255,.25);
      border: 1px solid rgba(88,166,255,.4);
      color: #58a6ff;
    }
    .msg-row.assistant .msg-avatar {
      background: rgba(63,185,80,.18);
      border: 1px solid rgba(63,185,80,.35);
      color: #3fb950;
    }

    .msg-body { flex: 1; min-width: 0; }
    .msg-row.user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

    /* User bubble */
    .msg-row.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(88,166,255,.2);
      border-radius: 16px 4px 16px 16px;
      padding: 12px 16px;
      max-width: 72%;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.65;
    }

    /* Assistant bubble */
    .msg-row.assistant .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* Status chip (during stream) */
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 10px;
      background: var(--hover);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .status-chip .spinner {
      width: 10px; height: 10px;
      border: 1.5px solid rgba(255,255,255,.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Thinking block */
    .think-block {
      border: 1px solid rgba(88,166,255,.2);
      border-radius: var(--r-sm);
      margin-bottom: 10px;
      overflow: hidden;
      background: rgba(88,166,255,.04);
    }
    .think-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      user-select: none;
      transition: background .12s;
    }
    .think-header:hover { background: rgba(88,166,255,.06); }
    .think-arrow { margin-left: auto; transition: transform .2s; font-size: 10px; }
    .think-block.open .think-arrow { transform: rotate(90deg); }
    .think-body {
      display: none;
      padding: 0 12px 12px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
    }
    .think-block.open .think-body { display: block; }

    /* Blinking cursor during stream */
    .cursor { display: inline-block; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* Message actions (always visible) */
    .msg-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .msg-act-btn {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--sb-bg);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: all .12s;
    }
    .msg-act-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Markdown styles ─────────────────────────────────────────────────── */
    .md h1,.md h2,.md h3,.md h4 {
      font-weight: 700;
      margin: 1em 0 .4em;
      line-height: 1.35;
      color: var(--text);
    }
    .md h1 { font-size: 1.4em; }
    .md h2 { font-size: 1.2em; }
    .md h3 { font-size: 1.05em; }
    .md p { margin: .55em 0; }
    .md ul,.md ol { padding-left: 1.6em; margin: .5em 0; }
    .md li { margin: .25em 0; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 14px;
      margin: .6em 0;
      color: var(--muted);
      background: var(--accent-bg);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
    }
    .md table { border-collapse: collapse; width: 100%; margin: .7em 0; font-size: 13px; }
    .md th,.md td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; }
    .md th { background: var(--hover); font-weight: 600; }
    .md code {
      background: rgba(255,255,255,.07);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: .88em;
    }
    .md pre {
      position: relative;
      background: #010409;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      margin: .7em 0;
      overflow: hidden;
    }
    .md pre code {
      display: block;
      padding: 14px 16px;
      overflow-x: auto;
      background: transparent;
      border: none;
      font-size: 13px;
      line-height: 1.55;
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #0d1117;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
    }
    .copy-btn {
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #161b22;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      transition: all .12s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
    .md strong { font-weight: 700; }
    .md em { font-style: italic; }

    /* Empty state */
    #emptyState {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      user-select: none;
    }
    .empty-icon { font-size: 48px; opacity: .5; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text); opacity: .6; }
    .empty-hint { font-size: 13px; }
    .empty-tips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .tip-chip {
      padding: 8px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
    }
    .tip-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Input area ──────────────────────────────────────────────────────── */
    #inputArea {
      border-top: 1px solid var(--border);
      padding: 12px 20px 16px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .input-toolbar {
      display: flex;
      gap: 6px;
      margin: 0 auto 8px;
      max-width: 780px;
    }
    .tool-toggle {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
      line-height: 1.4;
    }
    .tool-toggle:hover { border-color: var(--muted); color: var(--text); }
    .tool-toggle.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 780px;
      margin: 0 auto;
    }
    #msgInput {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      padding: 10px 14px;
      resize: none;
      outline: none;
      max-height: 200px;
      overflow-y: auto;
      transition: border-color .15s;
    }
    #msgInput:focus { border-color: var(--accent); }
    #msgInput::placeholder { color: var(--muted); }
    #sendBtn {
      width: 40px; height: 40px;
      background: var(--accent);
      border: none;
      border-radius: var(--r-sm);
      color: #0d1117;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      transition: filter .12s;
      display: flex; align-items: center; justify-content: center;
    }
    #sendBtn:hover:not(:disabled) { filter: brightness(1.15); }
    #sendBtn:disabled { opacity: .4; cursor: not-allowed; }
    #cancelBtn {
      width: 40px; height: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all .12s;
    }
    #cancelBtn.show { display: flex; }
    #cancelBtn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Settings Modal ──────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      animation: fadeIn .15s ease;
    }
    .modal-panel {
      background: var(--sb-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 560px;
      max-width: 96vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-header span { font-size: 15px; font-weight: 700; }
    .close-btn {
      width: 28px; height: 28px;
      background: var(--hover);
      border: none;
      border-radius: 50%;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .close-btn:hover { background: var(--danger); color: #fff; }
    .modal-tabs {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-tab {
      padding: 6px 14px;
      border-radius: var(--r-sm);
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: all .12s;
    }
    .modal-tab:hover { background: var(--hover); color: var(--text); }
    .modal-tab.active { background: var(--accent-bg); color: var(--accent); }
    .modal-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    /* Form elements */
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field > label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .input-wrap { position: relative; }
    input[type=text], input[type=password], input[type=number], textarea, select {
      width: 100%;
      padding: 9px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    select { cursor: pointer; appearance: none; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 36px; }
    .eye-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 15px; padding: 2px;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .model-pills {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
    }
    .pill {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
    }
    .pill:hover, .pill.active { border-color: var(--accent); color: var(--accent); }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 13px; }
    .toggle-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .toggle {
      position: relative; width: 40px; height: 22px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* Alert */
    .alert {
      padding: 10px 14px;
      border-radius: var(--r-sm);
      font-size: 12px;
      margin-top: 12px;
      animation: fadeIn .15s;
    }
    .alert-ok { background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3); color: var(--green); }
    .alert-err { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); color: var(--danger); }

    /* Model picker */
    .mp-wrap { position: relative; }
    .mp-trigger {
      width: 100%; padding: 9px 12px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: border-color .15s;
    }
    .mp-trigger:hover { border-color: var(--accent); }
    .mp-trigger.open { border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .mp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mp-chevron { margin-left: auto; font-size: 10px; opacity: .6; transition: transform .2s; }
    .mp-trigger.open .mp-chevron { transform: rotate(180deg); }
    .mp-panel {
      border: 1px solid var(--accent); border-top: none;
      border-radius: 0 0 var(--r-sm) var(--r-sm);
      background: var(--card); display: none;
      flex-direction: column; max-height: 260px; overflow: hidden;
    }
    .mp-panel.open { display: flex; }
    .mp-list { overflow-y: auto; flex: 1; padding: 4px 0; }
    .mp-provider-hdr {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px 4px; font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
      position: sticky; top: 0; background: var(--card);
    }
    .mp-provider-hdr-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .mp-model-row {
      padding: 5px 12px 5px 26px; font-size: 13px;
      cursor: pointer; color: var(--text); transition: background .1s;
    }
    .mp-model-row:hover { background: var(--hover); }
    .mp-model-row.active { color: var(--accent); font-weight: 600; }
    .mp-search-bar { padding: 7px 9px; border-top: 1px solid var(--border); flex-shrink: 0; }
    input.mp-search {
      width: 100%; padding: 6px 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 12px; outline: none;
    }
    input.mp-search:focus { border-color: var(--accent); }

    /* Model selector in header */
    .model-selector-wrap { position: relative; }
    .model-selector-btn {
      padding: 4px 8px 4px 10px;
      border-radius: 20px;
      background: var(--accent-bg);
      border: 1px solid rgba(88,166,255,.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all .12s;
    }
    .model-selector-btn:hover { border-color: var(--accent); }
    .model-selector-btn .chevron { font-size: 9px; opacity: .7; }
    .model-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 180px;
      background: var(--sb-bg);
      border: 1px solid var(--border);

    .model-dropdown-item {
      padding: 7px 10px;

<script>
/* ── Sidebar resize handle ────────────────────────────────────────────────── */
(function () {
  var MIN_W = 160, MAX_W = 480;
  var handle  = document.getElementById('resizeHandle');
  var sidebar = document.getElementById('sidebar');
  var startX = 0, startW = 0;

  // 恢复上次保存的宽度
  var saved = localStorage.getItem('sb-width');
  if (saved) {
    var sw = Math.min(MAX_W, Math.max(MIN_W, +saved));
    sidebar.style.width = sw + 'px';
    document.documentElement.style.setProperty('--sb-w', sw + 'px');
  }

  // 使用 Pointer Events + setPointerCapture：
  // capture 后 pointermove/pointerup 事件直接发给 handle，
  // 不需要在 document 层监听，在 WSLg/XWayland 下更可靠。
  handle.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
  });

  handle.addEventListener('pointermove', function(e) {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    var w = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
    sidebar.style.width = w + 'px';
    document.documentElement.style.setProperty('--sb-w', w + 'px');
  });

  handle.addEventListener('pointerup', function(e) {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    handle.releasePointerCapture(e.pointerId);
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
    localStorage.setItem('sb-width', sidebar.offsetWidth);
  });

  handle.addEventListener('pointercancel', function() {
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
  });
})();

/* ── Globals ──────────────────────────────────────────────────────────────── */
'use strict';

const S = {
  convId:    null,   // currently selected conversation id
  convs:     [],     // [{id, title, updated_at, message_count}]
  streaming: false,
  _editingConvId: null,  // conv settings modal state
  streamModel: '',       // model name of current stream
  // streaming DOM refs
  streamMsgEl:      null,
  streamContentEl:  null,
  streamReasonEl:   null,
  streamThinkBlock: null,
  streamBuf:        '',
  reasonBuf:        '',
};

/* ── API bridge helper ───────────────────────────────────────────────────── */
function api() { return window.pywebview?.api; }

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relativeTime(ts) {
  if (!ts) return '';
  const d = Date.now() / 1000 - ts;
  if (d < 60)   return '刚刚';
  if (d < 3600) return Math.floor(d/60) + ' 分钟前';
  if (d < 86400) return Math.floor(d/3600) + ' 小时前';
  return Math.floor(d/86400) + ' 天前';
}

function scrollBottom(smooth=true) {
  const c = document.getElementById('msgContainer');
  c.scrollTo({ top: c.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

/* ── Markdown rendering ──────────────────────────────────────────────────── */
function setupMarked() {
  if (!window.marked) return;
  const renderer = new marked.Renderer();

  renderer.code = (code, lang) => {
    const lbl = lang || 'text';
    let highlighted = esc(code);
    if (window.hljs) {
      try {
        highlighted = lang && hljs.getLanguage(lang)
          ? hljs.highlight(code, {language: lang}).value
          : hljs.highlightAuto(code).value;
      } catch(e) {}
    }
    const id = 'code_' + Math.random().toString(36).slice(2,8);
    return `<div class="md-pre">
      <div class="code-header">
        <span>${esc(lbl)}</span>
        <button class="copy-btn" onclick="copyCode('${id}')">复制</button>
      </div>
      <pre><code id="${id}">${highlighted}</code></pre>
    </div>`;
  };

  marked.setOptions({ renderer, breaks: true, gfm: true });

  // 流式渲染用简化 renderer：代码块跳过 hljs，避免每帧语法高亮
  const streamRenderer = new marked.Renderer();
  streamRenderer.code = (code, lang) => {
    const lbl = lang || 'text';
    return `<div class="md-pre">
      <div class="code-header"><span>${esc(lbl)}</span></div>
      <pre><code>${esc(code)}</code></pre>
    </div>`;
  };
  window._markedStream = txt => marked.parse(txt, { renderer: streamRenderer, breaks: true, gfm: true });
}

function renderMd(text) {
  if (!text) return '';
  try {
    return window.marked ? marked.parse(text) : '<pre>' + esc(text) + '</pre>';
  } catch(e) {
    return '<pre>' + esc(text) + '</pre>';
  }
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.closest('.md-pre')?.querySelector('.copy-btn');
    if (btn) { btn.textContent = '✓ 已复制'; setTimeout(() => btn.textContent = '复制', 2000); }
  });
}

/* ── Conversation list ───────────────────────────────────────────────────── */
async function loadConvs() {
  const convs = await api().list_conversations();
  S.convs = convs;
  renderConvList();
}

function renderConvList() {
  const el = document.getElementById('convList');
  if (!S.convs.length) {
    el.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:var(--muted)">暂无对话，点击 + 新建</div>';
    return;
  }

  // Group by date
  const today    = new Date(); today.setHours(0,0,0,0);
  const yday     = new Date(today); yday.setDate(yday.getDate()-1);
  const week     = new Date(today); week.setDate(week.getDate()-7);

  const groups = { '今天':[], '昨天':[], '最近 7 天':[], '更早':[] };
  for (const c of S.convs) {
    const d = new Date(c.updated_at * 1000); d.setHours(0,0,0,0);
    if (d >= today)       groups['今天'].push(c);
    else if (d >= yday)   groups['昨天'].push(c);
    else if (d >= week)   groups['最近 7 天'].push(c);
    else                  groups['更早'].push(c);
  }

  let html = '';
  for (const [label, items] of Object.entries(groups)) {
    if (!items.length) continue;
    html += `<div class="conv-section-label">${label}</div>`;
    for (const c of items) {
      const active = c.id === S.convId ? ' active' : '';
      html += `
        <div class="conv-item${active}" data-id="${esc(c.id)}" onclick="selectConv('${esc(c.id)}')">
          <div class="conv-info">
            <div class="conv-title">${esc(c.title)}</div>
            <div class="conv-date">${relativeTime(c.updated_at)}</div>
          </div>
          <div class="conv-actions">
            <button title="对话设置" onclick="openConvSettings(event,'${esc(c.id)}')">⚙</button>
          </div>
        </div>`;
    }
  }
  el.innerHTML = html;
}

async function newChat() {
  const conv = await api().new_conversation();
  S.convs.unshift(conv);
  renderConvList();
  await selectConv(conv.id, true);
}

async function selectConv(id, isNew=false) {
  if (S.streaming && id !== S.convId) {
    api().cancel_stream(S.convId);
    S.streaming = false;
  }
  S.convId = id;

  // Highlight active
  document.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  if (isNew) {
    clearMsgList();
    showEmpty(true);
    document.getElementById('headerClearBtn').hidden = true;
    updateTitle('新对话');
    return;
  }

  const conv = await api().get_conversation(id);
  if (!conv) return;
  updateTitle(conv.title);
  renderMessages(conv.messages || []);
  document.getElementById('headerClearBtn').hidden = false;
}

function updateTitle(t) {
  document.getElementById('chatTitle').textContent = t || '新对话';
}

function openConvSettings(e, id) {
  e.stopPropagation();
  S._editingConvId = id;
  const conv = S.convs.find(c => c.id === id);
  document.getElementById('csTitle').value        = conv?.title || '';
  document.getElementById('csSystemPrompt').value = conv?.system_prompt ?? '';
  document.getElementById('csTemp').value         = conv?.temperature != null ? conv.temperature : '';
  document.getElementById('convSettingsModal').style.display = 'flex';
}

function closeConvSettings() {
  document.getElementById('convSettingsModal').style.display = 'none';
  S._editingConvId = null;
}

async function saveConvSettings() {
  const id = S._editingConvId;
  if (!id) return;
  const title      = document.getElementById('csTitle').value.trim();
  const sysPrompt  = document.getElementById('csSystemPrompt').value;
  const tempStr    = document.getElementById('csTemp').value.trim();
  const temperature = tempStr !== '' ? parseFloat(tempStr) : null;

  await api().update_conversation(id, { title, system_prompt: sysPrompt, temperature });

  const conv = S.convs.find(c => c.id === id);
  if (conv) {
    if (title) conv.title = title;
    conv.system_prompt = sysPrompt;
    conv.temperature   = temperature;
  }
  renderConvList();
  if (id === S.convId) updateTitle(title || conv?.title || '');
  closeConvSettings();
}

async function deleteConvFromModal() {
  const id = S._editingConvId;
  if (!id) return;
  if (!confirm('确定删除这条对话？此操作无法撤销。')) return;
  closeConvSettings();
  await api().delete_conversation(id);
  S.convs = S.convs.filter(c => c.id !== id);
  renderConvList();
  if (id === S.convId) {
    S.convId = null;
    clearMsgList();
    showEmpty(true);
    updateTitle('AI Memory');
    document.getElementById('headerClearBtn').hidden = true;
  }
}

async function clearCurrentConv() {
  if (!S.convId || !confirm('确定清空当前对话内容？')) return;
  await api().clear_conversation(S.convId);
  clearMsgList();
  showEmpty(true);
  const conv = S.convs.find(c => c.id === S.convId);
  if (conv) { conv.message_count = 0; }
  renderConvList();
}

/* ── Message rendering ───────────────────────────────────────────────────── */
function clearMsgList() {
  document.getElementById('msgList').innerHTML = '';
}

function showEmpty(show) {
  let el = document.getElementById('emptyState');
  if (!el) return;
  if (show) {
    document.getElementById('msgList').appendChild(el);
  } else if (el.parentNode) {
    el.parentNode.removeChild(el);
  }
}

function renderMessages(messages) {
  const list = document.getElementById('msgList');
  list.innerHTML = '';
  showEmpty(false);
  for (const m of messages) {
    if (m.role === 'system') continue;
    list.appendChild(buildMsgEl(m));
  }
  scrollBottom(false);
}

function buildMsgEl(msg) {
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;
  row.dataset.msgId = msg.id || '';

  const avatarIcon = msg.role === 'user' ? 'U' : 'A';

  if (msg.role === 'user') {
    row.innerHTML = `
      <div class="msg-avatar">${avatarIcon}</div>
      <div class="msg-body">
        <div class="msg-bubble">${esc(msg.content || '')}</div>
        <div class="msg-actions">
          <button class="msg-act-btn" onclick="copyMsg(this)">复制</button>
        </div>
      </div>`;
  } else {
    const thinking = msg.reasoning_content
      ? `<div class="think-block">
           <div class="think-header" onclick="this.closest('.think-block').classList.toggle('open')">
             <span class="think-arrow" style="margin-left:0;margin-right:4px">▶</span><span>思考过程</span>
           </div>
           <div class="think-body">${esc(msg.reasoning_content)}</div>
         </div>`
      : '';
    const usage = (msg.usage && msg.usage.total_tokens)
      ? `<span style="font-size:11px;color:var(--muted);margin-top:6px;display:inline-block">
           ${msg.model || ''} · ${msg.usage.total_tokens} tokens
         </span>`
      : '';
    row.innerHTML = `
      <div class="msg-avatar">${avatarIcon}</div>
      <div class="msg-body">
        ${thinking}
        <div class="msg-bubble">
          <div class="md">${renderMd(msg.content || '')}</div>
          ${usage}
        </div>
        <div class="msg-actions">
          <button class="msg-act-btn" onclick="copyMsg(this)">复制</button>
          <button class="msg-act-btn" onclick="deleteMsg(this,'${esc(msg.id||'')}')">删除</button>
        </div>
      </div>`;
  }
  return row;
}

function copyMsg(btn) {
  const bubble = btn.closest('.msg-body')?.querySelector('.msg-bubble');
  const text = bubble?.innerText || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制', 2000);
  });
}

async function deleteMsg(btn, msgId) {
  if (!msgId || !S.convId) return;
  await api().delete_message(S.convId, msgId);
  btn.closest('.msg-row')?.remove();
}

/* ── Send message ────────────────────────────────────────────────────────── */
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || S.streaming) return;

  // Ensure conversation exists
  if (!S.convId) {
    const conv = await api().new_conversation();
    S.convs.unshift(conv);
    S.convId = conv.id;
    renderConvList();
    updateTitle(conv.title);
    showEmpty(false);
    document.getElementById('headerClearBtn').hidden = false;
  }

  input.value = '';
  input.style.height = 'auto';
  showEmpty(false);

  // Options from toolbar
  const wsActive  = document.getElementById('webSearchBtn').classList.contains('active');
  const ragActive = document.getElementById('ragBtn').classList.contains('active');
  const dtBtn     = document.getElementById('deepThinkBtn');
  const deepThink = dtBtn && dtBtn.style.display !== 'none' && dtBtn.classList.contains('active');
  const options = {
    tool_web_search: wsActive ? 'true' : undefined,
    tool_rag: ragActive,
    ...(deepThink ? { model: 'deepseek-reasoner' } : {}),
  };

  // Append user bubble immediately
  const userEntry = { id: null, role: 'user', content: text };
  const userEl = buildMsgEl(userEntry);
  document.getElementById('msgList').appendChild(userEl);
  scrollBottom();

  // Lock UI
  S.streaming = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('cancelBtn').classList.add('show');
  input.disabled = true;

  await api().send_message(S.convId, text, options);
}

function cancelStream() {
  if (S.convId) api().cancel_stream(S.convId);
}

function toggleTool(btn) {
  btn.classList.toggle('active');
}

function insertTip(el) {
  document.getElementById('msgInput').value = el.textContent;
  document.getElementById('msgInput').focus();
}

/* ── Streaming callbacks (called from Python via evaluate_js) ─────────────── */
window.__onStreamEvent = function(event) {
  const { type, conv_id } = event;

  switch (type) {

    case 'start': {
      if (conv_id !== S.convId) break;
      // Remove any pre-stream status indicator
      document.getElementById('preStreamStatus')?.remove();
      // Create assistant bubble placeholder
      const row = document.createElement('div');
      row.className = 'msg-row assistant';
      row.innerHTML = `
        <div class="msg-avatar">A</div>
        <div class="msg-body">
          <div class="think-block" hidden>
            <div class="think-header" onclick="this.closest('.think-block').classList.toggle('open')">
              <span class="think-arrow" style="margin-left:0;margin-right:4px">▶</span><span class="think-title">思考中…</span>
            </div>
            <div class="think-body"></div>
          </div>
          <div class="msg-bubble">
            <div class="md stream-content"></div>
          </div>
        </div>`;
      document.getElementById('msgList').appendChild(row);
      S.streamMsgEl      = row;
      S.streamContentEl  = row.querySelector('.stream-content');
      S.streamThinkBlock = row.querySelector('.think-block');
      S.streamReasonEl   = row.querySelector('.think-body');
      S.streamBuf        = '';
      S.reasonBuf        = '';
      S.streamModel      = event.model || '';
      S.streamContentEl.innerHTML = '<span class="cursor">▋</span>';
      scrollBottom();
      break;
    }

    case 'status': {
      if (conv_id !== S.convId) break;
      if (S.streamMsgEl) {
        // Stream already started — show chip inside the bubble
        let chip = S.streamMsgEl.querySelector('.status-chip');
        if (!chip) {
          chip = document.createElement('div');
          chip.className = 'status-chip';
          S.streamMsgEl.querySelector('.msg-body').insertBefore(
            chip, S.streamMsgEl.querySelector('.msg-bubble')
          );
        }
        chip.innerHTML = `<div class="spinner"></div>${esc(event.text)}`;
      } else {
        // Before stream starts — show a standalone pre-stream row
        let statusRow = document.getElementById('preStreamStatus');
        if (!statusRow) {
          statusRow = document.createElement('div');
          statusRow.id = 'preStreamStatus';
          statusRow.className = 'msg-row assistant';
          statusRow.innerHTML = '<div class="msg-avatar">A</div><div class="msg-body"><div class="status-chip"><div class="spinner"></div><span></span></div></div>';
          document.getElementById('msgList').appendChild(statusRow);
        }
        statusRow.querySelector('span').textContent = event.text;
        scrollBottom();
      }
      break;
    }

    case 'reasoning_chunk': {
      if (conv_id !== S.convId || !S.streamReasonEl) break;
      S.reasonBuf += event.text;
      S.streamReasonEl.textContent = S.reasonBuf;
      if (S.streamThinkBlock) S.streamThinkBlock.hidden = false;
      scrollBottom();
      break;
    }

    case 'content_chunk': {
      if (conv_id !== S.convId || !S.streamContentEl) break;
      // Remove status chip once content starts
      S.streamMsgEl?.querySelector('.status-chip')?.remove();
      S.streamBuf += event.text;
      // 流式实时 markdown 渲染（用轻量 streamRenderer，跳过 hljs）
      const _renderFn = window._markedStream || (t => '<pre>' + esc(t) + '</pre>');
      try {
        S.streamContentEl.innerHTML = _renderFn(S.streamBuf);
      } catch(e) {
        S.streamContentEl.innerHTML = esc(S.streamBuf);
      }
      // 追加光标到末尾元素内
      const _cur = document.createElement('span');
      _cur.className = 'cursor';
      _cur.textContent = '▋';
      S.streamContentEl.appendChild(_cur);
      scrollBottom();
      break;
    }

    case 'done':
    case 'cancelled': {
      if (conv_id !== S.convId) break;
      _finalizeStream(event.usage, event.model);
      break;
    }

    case 'error': {
      if (S.streamContentEl) {
        S.streamContentEl.innerHTML =
          `<span style="color:var(--danger)">⚠ ${esc(event.message)}</span>`;
        S.streamMsgEl?.querySelector('.status-chip')?.remove();
      } else {
        // Show as toast / append error row
        const row = document.createElement('div');
        row.className = 'msg-row assistant';
        row.innerHTML = `<div class="msg-avatar" style="background:rgba(248,81,73,.15);border-color:rgba(248,81,73,.3);color:var(--danger)">!</div>
          <div class="msg-body"><div class="msg-bubble" style="color:var(--danger)">
            ${esc(event.message)}</div></div>`;
        document.getElementById('msgList').appendChild(row);
      }
      _finalizeStream();
      break;
    }

    case 'title_update': {
      const c = S.convs.find(x => x.id === conv_id);
      if (c) c.title = event.title;
      renderConvList();
      if (conv_id === S.convId) updateTitle(event.title);
      break;
    }
  }
};

// 批量流式事件处理器（由 desktop_app.py _stream_thread 30ms 节流调用）
window.__onStreamBatch = function(events) {
  for (const ev of events) window.__onStreamEvent(ev);
};

function _finalizeStream(usage, model) {
  // Render markdown on final content
  if (S.streamContentEl) {
    const mdEl = S.streamContentEl;
    mdEl.innerHTML = renderMd(S.streamBuf) || '';
    // Append usage footer inside the bubble
    const mdModel = model || S.streamModel || '';
    if (usage && usage.total_tokens) {
      const foot = document.createElement('span');
      foot.style.cssText = 'font-size:11px;color:var(--muted);margin-top:6px;display:inline-block';
      foot.textContent = (mdModel ? mdModel + ' · ' : '') + usage.total_tokens + ' tokens';
      mdEl.closest('.msg-bubble')?.appendChild(foot);
    }
    // Mark think block as done
    if (S.streamThinkBlock && !S.streamThinkBlock.hidden) {
      const tt = S.streamThinkBlock.querySelector('.think-title');
      if (tt) tt.textContent = '思考过程';
    }
  }
  S.streamMsgEl      = null;
  S.streamContentEl  = null;
  S.streamThinkBlock = null;
  S.streamReasonEl   = null;
  document.getElementById('preStreamStatus')?.remove();
  S.smoothBuf        = '';
  S.reasonBuf        = '';
  S.streaming        = false;

  // Unlock UI
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('cancelBtn').classList.remove('show');
  document.getElementById('msgInput').disabled = false;
  document.getElementById('msgInput').focus();

  // Refresh conv list (message_count / updated_at)
  loadConvs().then(() => {
    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === S.convId);
    });
  });
}

/* ── Settings ────────────────────────────────────────────────────────────── */
const PROVIDER_URLS = {
  deepseek: 'https://api.deepseek.com',
  openai:   'https://api.openai.com',
  gemini:   'https://generativelanguage.googleapis.com/v1beta/openai',
  qwen:     'https://dashscope.aliyuncs.com/compatible-mode/v1',
  ollama:   'http://localhost:11434/v1',
  custom:   '',
};
const PROVIDER_COLORS = {
  deepseek: '#58a6ff', openai: '#10a37f', gemini: '#8b5cf6',
  qwen: '#f0883e', ollama: '#4ec9b0', custom: '#8b949e',
};
const PROVIDER_NAMES = {
  deepseek: 'DeepSeek', openai: 'OpenAI', gemini: 'Gemini',
  qwen: '通义千问', ollama: 'Ollama', custom: '自定义',
};
const PRESET_MODELS = {
  deepseek: ['deepseek-chat', 'deepseek-reasoner'],
  openai:   ['gpt-4.1', 'gpt-4.1-mini', 'gpt-4o', 'gpt-4o-mini', 'o3', 'o3-mini', 'o4-mini'],
  gemini:   ['gemini-2.5-pro', 'gemini-2.0-flash', 'gemini-2.0-flash-lite', 'gemini-1.5-pro', 'gemini-1.5-flash'],
  qwen:     ['qwen-max', 'qwen-max-latest', 'qwen-plus', 'qwen-turbo', 'qwen-long'],
  ollama:   [],
  custom:   [],
};
let _fetchedModels = {};  // { pid: [model, ...] }

function _onProviderChange(pid) {
  const isOllama   = pid === 'ollama';
  const isCustom   = pid === 'custom';
  const isDeepSeek = pid === 'deepseek';
  document.getElementById('customUrlField').style.display = isCustom ? '' : 'none';
  if (!isCustom) document.getElementById('sBaseUrl').value = PROVIDER_URLS[pid] || '';
  const keyInput = document.getElementById('sApiKey');
  const keyHint  = document.getElementById('sApiKeyHint');
  keyInput.disabled = isOllama;
  keyHint.style.display = isOllama ? '' : 'none';
  if (isOllama) keyInput.value = '';
  // 深思按钮：仅在 DeepSeek 提供商时显示
  const dtBtn = document.getElementById('deepThinkBtn');
  if (dtBtn) {
    dtBtn.style.display = isDeepSeek ? '' : 'none';
    if (!isDeepSeek) dtBtn.classList.remove('active');
  }
}

function _setPickerDisplay(pid, model) {
  document.getElementById('mpDot').style.background = PROVIDER_COLORS[pid] || '#8b949e';
  document.getElementById('mpLabel').textContent = (PROVIDER_NAMES[pid] || pid) + ' · ' + model;
}

async function openSettings() {
  const cfg      = await api().get_config();
  const provider = cfg.provider || 'deepseek';
  const model    = cfg.model    || 'deepseek-chat';
  document.getElementById('sModel').value          = model;
  document.getElementById('sPickedProvider').value = provider;
  _setPickerDisplay(provider, model);
  _onProviderChange(provider);
  if (provider === 'custom') document.getElementById('sBaseUrl').value = cfg.upstream_base_url || '';
  document.getElementById('sApiKey').value       = cfg.api_key || '';
  document.getElementById('sTemp').value         = cfg.temperature ?? 0.7;
  document.getElementById('sSystemPrompt').value = cfg.system_prompt || '';
  document.getElementById('sWebSearch').value    = cfg.tool_web_search || 'auto';
  document.getElementById('sRag').checked        = !!cfg.tool_rag;
  document.getElementById('connAlert').innerHTML      = '';
  document.getElementById('fetchModelsStatus').innerHTML = '';
  switchTab('api', document.querySelector('.modal-tab.active'));
  document.getElementById('settingsModal').style.display = 'flex';
}

function closeSettings() {
  closeModelPicker();
  document.getElementById('settingsModal').style.display = 'none';
}

function switchTab(name, btn) {
  document.querySelectorAll('.modal-tab').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  document.getElementById('tabApi').hidden    = name !== 'api';
  document.getElementById('tabTools').hidden  = name !== 'tools';
  document.getElementById('tabMemory').hidden = name !== 'memory';
}

/* ── Model picker panel ───────────────────────────────────────────────────── */
function _buildPickerList(filterText) {
  const list = document.getElementById('mpList');
  list.innerHTML = '';
  const ft = (filterText || '').toLowerCase();
  for (const [pid, presets] of Object.entries(PRESET_MODELS)) {
    const extra   = _fetchedModels[pid] || [];
    const all     = [...new Set([...presets, ...extra])];
    const matches = ft ? all.filter(m => m.toLowerCase().includes(ft)) : all;
    if (!matches.length && !['ollama','custom'].includes(pid)) continue;
    const hdr = document.createElement('div');
    hdr.className = 'mp-provider-hdr';
    hdr.innerHTML = `<span class="mp-provider-hdr-dot" style="background:${PROVIDER_COLORS[pid]}"></span>`
                  + `<span>${PROVIDER_NAMES[pid]}</span>`
                  + `<span style="margin-left:auto;opacity:.45;font-weight:400">${matches.length}</span>`;
    list.appendChild(hdr);
    if (!matches.length) {
      const hint = document.createElement('div');
      hint.style.cssText = 'padding:3px 28px 8px;font-size:12px;color:var(--muted)';
      hint.textContent   = pid === 'ollama' ? '请先点击"验证并刷新"获取本地模型' : '点击"验证并刷新"可获取完整列表';
      list.appendChild(hint);
      continue;
    }
    const curModel = document.getElementById('sModel').value;
    const curPid   = document.getElementById('sPickedProvider').value;
    for (const m of matches) {
      const row = document.createElement('div');
      row.className   = 'mp-model-row' + (m === curModel && pid === curPid ? ' active' : '');
      row.textContent = m;
      row.dataset.pid = pid; row.dataset.model = m;
      row.onclick = () => _pickFromPicker(pid, m);
      list.appendChild(row);
    }
  }
}

function filterModels(val) { _buildPickerList(val); }

function _pickFromPicker(pid, model) {
  document.getElementById('sModel').value          = model;
  document.getElementById('sPickedProvider').value = pid;
  _setPickerDisplay(pid, model);
  _onProviderChange(pid);
  updateModelSelector(model);
  closeModelPicker();
}

function toggleModelPicker(e) {
  e.stopPropagation();
  const panel   = document.getElementById('mpPanel');
  const trigger = document.getElementById('mpTrigger');
  if (panel.classList.contains('open')) {
    closeModelPicker();
  } else {
    _buildPickerList('');
    document.getElementById('mpSearch').value = '';
    panel.classList.add('open');
    trigger.classList.add('open');
    setTimeout(() => document.getElementById('mpList').scrollTop = 0, 10);
  }
}

function closeModelPicker() {
  document.getElementById('mpPanel')?.classList.remove('open');
  document.getElementById('mpTrigger')?.classList.remove('open');
}

/* ── Fetch / validate models ──────────────────────────────────────────────── */
async function fetchAndShowModels() {
  const btn = document.getElementById('fetchModelsBtn');
  const spinner = document.getElementById('fetchModelsSpinner');
  const status  = document.getElementById('fetchModelsStatus');
  btn.disabled = true;
  spinner.style.display = 'inline-block';
  status.innerHTML = '';
  await _doSaveConfig(false);
  try {
    const res = await api().test_connection();
    if (!res.ok) {
      status.innerHTML = `<span style="color:var(--danger)">✗ ${esc(res.message || '连接失败')}</span>`;
      btn.disabled = false; spinner.style.display = 'none'; return;
    }
  } catch (e) {
    status.innerHTML = `<span style="color:var(--danger)">✗ ${esc(String(e))}</span>`;
    btn.disabled = false; spinner.style.display = 'none'; return;
  }
  try {
    const models = await api().list_upstream_models();
    const pid    = document.getElementById('sPickedProvider').value || 'deepseek';
    _fetchedModels[pid] = models;
    _populateModelDropdown(models, document.getElementById('sModel').value);
    status.innerHTML = `<span style="color:var(--green)">✓ 已获取 ${models.length} 个模型</span>`;
  } catch (_) {
    status.innerHTML = `<span style="color:var(--muted)">已连接，但获取模型列表失败</span>`;
  } finally {
    btn.disabled = false; spinner.style.display = 'none';
  }
}

function togglePw(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '显' : '隐';
}

async function testConn() {
  const btn = document.getElementById('testConnBtn');
  btn.textContent = '测试中…';
  btn.disabled    = true;
  await _doSaveConfig(false);
  const res = await api().test_connection();
  const al  = document.getElementById('connAlert');
  if (res.ok) {
    al.innerHTML = `<div class="alert alert-ok">✓ ${res.message || '连接成功'}</div>`;
    try {
      const models = await api().list_upstream_models();
      const pid = document.getElementById('sPickedProvider').value || 'deepseek';
      _fetchedModels[pid] = models;
      _populateModelDropdown(models, document.getElementById('sModel').value);
    } catch (_) {}
  } else {
    al.innerHTML = `<div class="alert alert-err">✗ ${esc(res.message || '连接失败')}</div>`;
  }
  setTimeout(() => { btn.textContent = '测试连接'; btn.disabled = false; }, 2000);
}

async function saveSettings() { await _doSaveConfig(true); }

async function _doSaveConfig(close=true) {
  const pid     = document.getElementById('sPickedProvider').value || 'deepseek';
  const baseUrl = pid === 'custom'
    ? document.getElementById('sBaseUrl').value.trim()
    : (PROVIDER_URLS[pid] || '');
  const updates = {
    provider:          pid,
    upstream_base_url: baseUrl,
    api_key:           document.getElementById('sApiKey').value.trim(),
    model:             document.getElementById('sModel').value.trim(),
    temperature:       parseFloat(document.getElementById('sTemp').value),
    system_prompt:     document.getElementById('sSystemPrompt').value.trim(),
    tool_web_search:   document.getElementById('sWebSearch').value,
    tool_rag:          document.getElementById('sRag').checked,
  };
  await api().save_config(updates);
  updateModelSelector(updates.model);
  if (close) closeSettings();
}

function updateModelSelector(model) {
  const wrap  = document.getElementById('modelSelectorWrap');
  const label = document.getElementById('modelSelectorLabel');
  if (model) {
    label.textContent = model;
    wrap.style.display = '';
    document.querySelectorAll('.model-dropdown-item').forEach(el => {
      el.classList.toggle('active', el.dataset.model === model);
    });
  } else {
    wrap.style.display = 'none';
  }
}

function _populateModelDropdown(models, curModel) {
  const dd = document.getElementById('modelDropdown');
  dd.innerHTML = '';
  if (!models.length) { dd.innerHTML = '<div class="model-dropdown-empty">暂无可用模型</div>'; return; }
  for (const m of models) {
    const el = document.createElement('div');
    el.className   = 'model-dropdown-item' + (m === curModel ? ' active' : '');
    el.dataset.model = m;
    el.textContent  = m;
    el.onclick = () => {
      const pid = document.getElementById('sPickedProvider')?.value || 'deepseek';
      _pickFromPicker(pid, m);
      api().save_config({ model: m });
      closeModelDropdown();
    };
    dd.appendChild(el);
  }
}

function toggleModelDropdown(e) {
  e.stopPropagation();
  document.getElementById('modelDropdown').classList.toggle('open');
}

function closeModelDropdown() {
  document.getElementById('modelDropdown').classList.remove('open');
}

// Close pickers when clicking outside
document.addEventListener('click', () => { closeModelDropdown(); closeModelPicker(); });

/* ── Memory tab ──────────────────────────────────────────────────────────── */
async function addMemory() {
  const text   = document.getElementById('mText').value.trim();
  const title  = document.getElementById('mTitle').value.trim();
  const source = document.getElementById('mSource').value.trim();
  const al = document.getElementById('memAlert');
  if (!text) { al.innerHTML = '<div class="alert alert-err">请输入内容</div>'; return; }
  const res = await api().add_to_memory(text, title, source);
  if (res.ok) {
    al.innerHTML = '<div class="alert alert-ok">✓ 已添加到记忆库</div>';
    document.getElementById('mText').value  = '';
    document.getElementById('mTitle').value = '';
    document.getElementById('mSource').value = '';
  } else {
    al.innerHTML = `<div class="alert alert-err">✗ ${esc(res.error)}</div>`;
  }
  setTimeout(() => al.innerHTML = '', 4000);
}

/* ── Textarea auto-resize + keyboard shortcut ─────────────────────────────── */
const msgInput = document.getElementById('msgInput');
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 200) + 'px';
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.altKey) {
    e.preventDefault();
    sendMessage();
  }
  // Shift+Enter：浏览器默认行为（插入换行），不拦截
});

/* ── Init ─────────────────────────────────────────────────────────────────── */
async function init() {
  setupMarked();
  await loadConvs();
  const cfg = await api().get_config();
  updateModelSelector(cfg.model || '');
  _setPickerDisplay(cfg.provider || 'deepseek', cfg.model || 'deepseek-chat');
  _onProviderChange(cfg.provider || 'deepseek');
  // If API key missing, open settings
  if (!cfg.api_key) {
    openSettings();
    return;
  }
  // Auto-select most recent conversation
  if (S.convs.length) {
    await selectConv(S.convs[0].id);
  }
}

if (window.pywebview) {
  init();
} else {
  window.addEventListener('pywebviewready', init);
}
</script>
