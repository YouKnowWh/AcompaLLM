<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcompaLLM</title>
  <script>
    document.documentElement.style.zoom = 1;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    /* ── Design Tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:         #0d1117;
      --sb-bg:      #161b22;
      --card:       #1c2333;
      --hover:      #21262d;
      --border:     #30363d;
      --accent:     #58a6ff;
      --accent-bg:  rgba(88,166,255,.12);
      --green:      #3fb950;
      --warn:       #f0883e;
      --danger:     #f85149;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --user-bubble:#1a3350;
      --r:          10px;
      --r-sm:       6px;
      --sb-w:       195px;
    }
    html {
      font-size: 15px;
      height: 100%;
    }
    #frame { display: flex; flex-direction: column; height: 100%; }

    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   'Noto Sans CJK SC', 'Noto Sans SC', 'Noto Sans CJK',
                   'WenQuanYi Micro Hei', 'WenQuanYi Zen Hei',
                   'PingFang SC', 'Microsoft YaHei',
                   'Source Han Sans CN',
                   'Noto Color Emoji', 'Segoe UI Emoji', 'Apple Color Emoji',
                   sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.6;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    [hidden] { display: none !important; }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sb-w);
      min-width: 120px;
      max-width: 480px;
      background: var(--sb-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      user-select: none;
      overflow: hidden;
    }
    #resizeHandle {
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background .15s;
      z-index: 20;
      touch-action: none;   /* 防止触摸手势取消 pointer capture */
    }
    #resizeHandle:hover, #resizeHandle.dragging { background: var(--accent); }
    .sb-header {
      padding: 16px 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 20px; }
    .logo-text { font-size: 15px; font-weight: 700; color: var(--accent); }

    #newChatBtn {
      width: 32px; height: 32px;
      background: var(--accent-bg);
      border: 1px solid rgba(88,166,255,.25);
      border-radius: var(--r-sm);
      color: var(--accent);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 300;
      transition: background .15s;
      flex-shrink: 0;
    }
    #newChatBtn:hover { background: rgba(88,166,255,.22); }

    #convList {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
    }
    .conv-section-label {
      font-size: 11px;
      color: var(--muted);
      padding: 8px 6px 4px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background .12s;
      position: relative;
      margin-bottom: 2px;
    }
    .conv-item:hover { background: var(--hover); }
    .conv-item.active { background: var(--accent-bg); }
    .conv-item .conv-icon { font-size: 14px; flex-shrink: 0; opacity: .7; }
    .conv-item .conv-info { flex: 1; overflow: hidden; }
    .conv-item .conv-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .conv-item.active .conv-title { color: var(--accent); }
    .conv-item .conv-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .conv-item .conv-actions {
      display: none;
      gap: 4px;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
    }
    .conv-item:hover .conv-actions { display: flex; }
    .conv-actions button {
      width: 26px; height: 26px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .conv-actions button:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Titlebar ───────────────────────────────────────────────────────── */
    #titlebar {
      height: 36px; min-height: 36px;
      background: var(--sb-bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      -webkit-app-region: drag;
      flex-shrink: 0; user-select: none;
    }
    .tb-logo {
      display: flex; align-items: center; gap: 6px;
      padding: 0 0 0 12px;
      color: var(--accent); font-size: 13px; font-weight: 700;
    }
    .tb-logo svg { width: 16px; height: 16px; flex-shrink: 0; }
    .tb-spacer { flex: 1; }
    .tb-btn {
      -webkit-app-region: no-drag;
      width: 46px; height: 36px;
      background: none; border: none; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s; flex-shrink: 0;
    }
    .tb-btn:hover { background: var(--hover); color: var(--text); }
    .tb-btn.tb-close:hover { background: #c42b1c; color: #fff; }
    .tb-btn svg { width: 10px; height: 10px; pointer-events: none; }

    /* ── Icon bar ───────────────────────────────────────────────────────── */
    #iconBar {
      width: 44px; background: var(--sb-bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; padding: 8px 0;
      flex-shrink: 0; gap: 2px;
    }
    .ib-btn {
      width: 36px; height: 36px;
      background: none; border: none; border-radius: var(--r-sm);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s; flex-shrink: 0;
    }
    .ib-btn:hover { background: var(--hover); color: var(--text); }
    .ib-btn.active { background: var(--accent-bg); color: var(--accent); }
    .ib-btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
    .ib-btn svg { width: 18px; height: 18px; pointer-events: none; }
    .ib-spacer { flex: 1; }
    .ib-sep { width: 24px; height: 1px; background: var(--border); margin: 4px 0; }
    .ib-logo {
      width: 36px; height: 36px; margin-bottom: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ib-logo svg { width: 22px; height: 22px; }

    /* ── Sidebar panels ─────────────────────────────────────────────────── */
    .sb-panel { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .sb-panel-hd {
      padding: 9px 10px 9px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .sb-panel-title { font-size: 13px; font-weight: 600; color: var(--muted); }

    /* Settings sub-nav in sidebar */
    #sbPanelSettings { overflow: hidden; }
    .sp-nav { display: flex; flex-direction: column; padding: 6px 0; }
    .sp-nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; font-size: 13px;
      color: var(--muted); cursor: pointer;
      border-radius: 0; transition: background .12s, color .12s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .sp-nav-item:hover { background: var(--hover); color: var(--text); }
    .sp-nav-item.active { background: var(--accent-bg); color: var(--accent); }
    .sp-nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .7; }
    .sp-nav-item.active svg { opacity: 1; }

    /* Settings view in main area */
    #settingsView {
      display: none; flex: 1; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }
    #settingsView.visible { display: flex; }
    .sv-header {
      height: 52px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px;
      font-size: 15px; font-weight: 600; flex-shrink: 0;
    }
    .sv-body {
      flex: 1; overflow-y: auto; padding: 24px;
      max-width: 600px;
    }
    .sv-footer {
      padding: 12px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0;
    }

    /* ── Main area ──────────────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    #chatView { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    .chat-header {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }
    #chatTitle {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--accent-bg);
      border: 1px solid rgba(88,166,255,.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    #headerClearBtn {
      padding: 5px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
    }
    #headerClearBtn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Messages ────────────────────────────────────────────────────────── */
    #msgContainer {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    #msgList {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 100%;
    }

    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 2px;
      letter-spacing: 0;
    }
    .msg-row.user .msg-avatar {
      background: rgba(88,166,255,.25);
      border: 1px solid rgba(88,166,255,.4);
      color: #58a6ff;
    }
    .msg-row.assistant .msg-avatar {
      background: rgba(63,185,80,.18);
      border: 1px solid rgba(63,185,80,.35);
      color: #3fb950;
    }

    .msg-body { flex: 1; min-width: 0; }
    .msg-row.user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

    /* User bubble */
    .msg-row.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(88,166,255,.2);
      border-radius: 16px 4px 16px 16px;
      padding: 12px 16px;
      max-width: 72%;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.65;
    }

    /* Assistant bubble */
    .msg-row.assistant .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* Status chip (during stream) */
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 10px;
      background: var(--hover);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .status-chip .spinner {
      width: 10px; height: 10px;
      border: 1.5px solid rgba(255,255,255,.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Thinking block */
    .think-block {
      border: 1px solid rgba(88,166,255,.2);
      border-radius: var(--r-sm);
      margin-bottom: 10px;
      overflow: hidden;
      background: rgba(88,166,255,.04);
    }
    .think-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      user-select: none;
      transition: background .12s;
    }
    .think-header:hover { background: rgba(88,166,255,.06); }
    .think-arrow { margin-left: auto; transition: transform .2s; font-size: 10px; }
    .think-block.open .think-arrow { transform: rotate(90deg); }
    .think-body {
      display: none;
      padding: 0 12px 12px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
    }
    .think-block.open .think-body { display: block; }

    /* Blinking cursor during stream */
    .cursor { display: inline-block; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* Tool call blocks (inside assistant message) */
    .tool-block {
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      margin-bottom: 8px;
      font-size: 13px;
      overflow: hidden;
    }
    .tool-block-hd {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      cursor: pointer;
      user-select: none;
      transition: background .12s;
    }
    .tool-block-hd:hover { background: var(--hover); }
    .tb-label { flex: 1; font-weight: 500; color: var(--text); font-size: 13px; }
    .tb-ok  { color: var(--green);  display: flex; align-items: center; }
    .tb-err { color: var(--danger); font-size: 13px; }
    .tb-arrow { font-size: 10px; opacity: .5; transition: transform .18s; margin-left: 2px; }
    .tool-block.open .tb-arrow { transform: rotate(90deg); }
    .tool-block-body {
      display: none;
      padding: 4px 12px 12px;
      border-top: 1px solid var(--border);
    }
    .tool-block.open .tool-block-body { display: block; }
    .tb-query { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.6; }
    .tb-query em { color: var(--text); font-style: normal; }
    .tb-results {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }
    .tb-result-card {
      min-width: 168px;
      max-width: 200px;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 12px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color .12s;
    }
    .tb-result-card:hover { border-color: var(--accent); }
    .rc-idx { color: var(--accent); font-weight: 600; margin-right: 3px; }
    .rc-title {
      display: block; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .rc-url {
      display: block; color: var(--muted); font-size: 11px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* Settings tool category header */
    .tool-cat-hd {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
      color: var(--muted);
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    /* Message actions (always visible) */
    .msg-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .msg-act-btn {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--sb-bg);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: all .12s;
    }
    .msg-act-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Markdown styles ─────────────────────────────────────────────────── */
    .md h1,.md h2,.md h3,.md h4 {
      font-weight: 700;
      margin: 1em 0 .4em;
      line-height: 1.35;
      color: var(--text);
    }
    .md h1 { font-size: 1.4em; }
    .md h2 { font-size: 1.2em; }
    .md h3 { font-size: 1.05em; }
    .md p { margin: .55em 0; }
    .md ul,.md ol { padding-left: 1.6em; margin: .5em 0; }
    .md li { margin: .25em 0; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 14px;
      margin: .6em 0;
      color: var(--muted);
      background: var(--accent-bg);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
    }
    .md table { border-collapse: collapse; width: 100%; margin: .7em 0; font-size: 13px; }
    .md th,.md td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; }
    .md th { background: var(--hover); font-weight: 600; }
    .md code {
      background: rgba(255,255,255,.07);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: .88em;
    }
    .md pre {
      position: relative;
      background: #010409;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      margin: .7em 0;
      overflow: hidden;
    }
    .md pre code {
      display: block;
      padding: 14px 16px;
      overflow-x: auto;
      background: transparent;
      border: none;
      font-size: 13px;
      line-height: 1.55;
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #0d1117;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
    }
    .copy-btn {
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #161b22;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      transition: all .12s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
    .md strong { font-weight: 700; }
    .md em { font-style: italic; }

    /* Empty state */
    #emptyState {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      user-select: none;
    }
    .empty-icon { font-size: 48px; opacity: .5; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text); opacity: .6; }
    .empty-hint { font-size: 13px; }
    .empty-tips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .tip-chip {
      padding: 8px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
    }
    .tip-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Input area ──────────────────────────────────────────────────────── */
    #inputArea {
      border-top: 1px solid var(--border);
      padding: 12px 20px 16px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .input-toolbar {
      display: flex;
      gap: 6px;
      margin: 0 auto 8px;
      max-width: 780px;
    }
    .tool-toggle {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
      line-height: 1.4;
    }
    .tool-toggle:hover { border-color: var(--muted); color: var(--text); }
    .tool-toggle.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 780px;
      margin: 0 auto;
    }
    #msgInput {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      padding: 10px 14px;
      resize: none;
      outline: none;
      max-height: 200px;
      overflow-y: auto;
      transition: border-color .15s;
    }
    #msgInput:focus { border-color: var(--accent); }
    #msgInput::placeholder { color: var(--muted); }
    #sendBtn {
      width: 40px; height: 40px;
      background: var(--accent);
      border: none;
      border-radius: var(--r-sm);
      color: #0d1117;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      transition: filter .12s;
      display: flex; align-items: center; justify-content: center;
    }
    #sendBtn:hover:not(:disabled) { filter: brightness(1.15); }
    #sendBtn:disabled { opacity: .4; cursor: not-allowed; }
    #cancelBtn {
      width: 40px; height: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all .12s;
    }
    #cancelBtn.show { display: flex; }
    #cancelBtn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Settings Modal ──────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      animation: fadeIn .15s ease;
    }
    .modal-panel {
      background: var(--sb-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 560px;
      max-width: 96vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-header span { font-size: 15px; font-weight: 700; }
    .close-btn {
      width: 28px; height: 28px;
      background: var(--hover);
      border: none;
      border-radius: 50%;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .close-btn:hover { background: var(--danger); color: #fff; }
    .modal-tabs {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-tab {
      padding: 6px 14px;
      border-radius: var(--r-sm);
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: all .12s;
    }
    .modal-tab:hover { background: var(--hover); color: var(--text); }
    .modal-tab.active { background: var(--accent-bg); color: var(--accent); }
    .modal-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    /* Form elements */
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field > label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .input-wrap { position: relative; }
    input[type=text], input[type=password], input[type=number], textarea, select {
      width: 100%;
      padding: 9px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    select { cursor: pointer; appearance: none; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 36px; }
    .pw-wrap input[type=password]::-ms-reveal,
    .pw-wrap input[type=password]::-ms-clear { display: none; }
    .eye-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 15px; padding: 2px;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .model-pills {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
    }
    .pill {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
    }
    .pill:hover, .pill.active { border-color: var(--accent); color: var(--accent); }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 13px; }
    .toggle-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .toggle {
      position: relative; width: 40px; height: 22px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* Alert */
    .alert {
      padding: 10px 14px;
      border-radius: var(--r-sm);
      font-size: 12px;
      margin-top: 12px;
      animation: fadeIn .15s;
    }
    .alert-ok { background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3); color: var(--green); }
    .alert-err { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); color: var(--danger); }

    /* Model picker */
    .mp-wrap { position: relative; }
    .mp-trigger {
      width: 100%; padding: 9px 12px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: border-color .15s;
    }
    .mp-trigger:hover { border-color: var(--accent); }
    .mp-trigger.open { border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .mp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mp-chevron { margin-left: auto; font-size: 10px; opacity: .6; transition: transform .2s; }
    .mp-trigger.open .mp-chevron { transform: rotate(180deg); }
    .mp-panel {
      border: 1px solid var(--accent); border-top: none;
      border-radius: 0 0 var(--r-sm) var(--r-sm);
      background: var(--card); display: none;
      flex-direction: column; max-height: 260px; overflow: hidden;
    }
    .mp-panel.open { display: flex; }
    .mp-list { overflow-y: auto; flex: 1; padding: 4px 0; }
    .mp-provider-hdr {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px 4px; font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
      position: sticky; top: 0; background: var(--card);
    }
    .mp-provider-hdr-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .mp-model-row {
      padding: 5px 12px 5px 26px; font-size: 13px;
      cursor: pointer; color: var(--text); transition: background .1s;
    }
    .mp-model-row:hover { background: var(--hover); }
    .mp-model-row.active { color: var(--accent); font-weight: 600; }
    .mp-provider-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; color: var(--text); transition: background .1s;
    }
    .mp-provider-row:hover { background: var(--hover); }
    .mp-provider-row.active { color: var(--accent); }
    .mp-row-hint { margin-left: auto; font-size: 11px; color: var(--muted); font-weight: 400; }
    .mp-search-bar { padding: 7px 9px; border-top: 1px solid var(--border); flex-shrink: 0; }
    input.mp-search {
      width: 100%; padding: 6px 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 12px; outline: none;
    }
    input.mp-search:focus { border-color: var(--accent); }

    /* Model selector in header */
    .model-selector-wrap { position: relative; }
    .model-selector-btn {
      padding: 4px 8px 4px 10px;
      border-radius: 20px;
      background: var(--accent-bg);
      border: 1px solid rgba(88,166,255,.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all .12s;
    }
    .model-selector-btn:hover { border-color: var(--accent); }
    .model-selector-btn .chevron { font-size: 9px; opacity: .7; }
    .model-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 180px;
      background: var(--sb-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      z-index: 200;
      display: none;
      animation: fadeIn .1s ease;
    }
    .model-dropdown.open { display: block; }
    .model-dropdown-item {
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: background .1s;
      white-space: nowrap;
    }
    .model-dropdown-item:hover { background: var(--hover); }
    .model-dropdown-item.active { color: var(--accent); font-weight: 600; }
    .model-dropdown-empty { padding: 8px 10px; font-size: 12px; color: var(--muted); text-align: center; }


    /* Buttons */
    .btn-primary {
      padding: 8px 18px; border-radius: var(--r-sm); border: none;
      background: var(--accent); color: #0d1117; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: filter .12s;
    }
    .btn-primary:hover { filter: brightness(1.12); }
    .btn-secondary {
      padding: 8px 16px; border-radius: var(--r-sm);
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: 13px; cursor: pointer; transition: all .12s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger {
      padding: 8px 16px; border-radius: var(--r-sm);
      border: 1px solid rgba(248,81,73,.3); background: rgba(248,81,73,.1);
      color: var(--danger); font-size: 13px; cursor: pointer; transition: all .12s;
    }
    .btn-danger:hover { background: rgba(248,81,73,.2); }
    /* ── 知识库管理 ─────────────────────────────────── */
    .kb-topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .kb-topbar-title { font-weight:600; font-size:15px; }
    .kb-add-form { background:var(--card); border:1px solid var(--border); border-radius:var(--r-sm); padding:14px 14px 12px; margin-bottom:14px; }
    .kb-add-form-title { font-size:13px; font-weight:600; margin-bottom:10px; }
    /* ── 拖拽上传区 ─────────────────────────────────── */
    .kb-drop-zone { border:2px dashed var(--border); border-radius:var(--r-sm); padding:22px 16px; text-align:center; cursor:pointer; transition:border-color .15s, background .15s; }
    .kb-drop-zone:hover, .kb-drop-zone.drag-over { border-color:var(--accent); background:var(--accent-bg); }
    .kb-drop-icon { font-size:26px; color:var(--muted); margin-bottom:6px; }
    .kb-drop-text { font-size:13px; color:var(--text); }
    .kb-drop-hint { font-size:11px; color:var(--muted); margin-top:4px; }
    .kb-file-chip { display:inline-flex; align-items:center; gap:5px; background:var(--hover); border:1px solid var(--border); border-radius:4px; padding:3px 8px; font-size:12px; margin:3px 3px 0 0; max-width:100%; overflow:hidden; }
    .kb-file-chip span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
    .kb-file-chip button { background:none; border:none; color:var(--muted); cursor:pointer; padding:0 0 0 2px; font-size:13px; line-height:1; flex-shrink:0; }
    .kb-file-chip button:hover { color:var(--danger); }
    /* ── 文件导入行（选文件列表） -------------------------------------- */
    .kb-file-row { border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 10px; margin-top:6px; }
    .kb-file-row-top { display:flex; align-items:center; gap:8px; }
    .kb-file-row-name { flex:1; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
    .kb-file-row-del { background:none; border:none; color:var(--muted); cursor:pointer; padding:0; font-size:12px; line-height:1; flex-shrink:0; }
    .kb-file-row-del:hover { color:var(--danger); }
    .kb-file-bar { height:4px; border-radius:2px; background:var(--border); margin-top:6px; overflow:hidden; }
    .kb-file-bar-fill { height:100%; border-radius:2px; }
    .kb-file-bar-fill.loading { width:100%; background:linear-gradient(90deg,var(--accent-bg) 20%,var(--accent) 50%,var(--accent-bg) 80%); background-size:200% 100%; animation:kb-shimmer 1.2s linear infinite; }
    .kb-file-bar-fill.done { width:100%; background:var(--green,#2da44e); }
    @keyframes kb-shimmer { 0%{background-position:200% 0} 100%{background-position:0% 0} }
    .kb-file-meta { font-size:11px; color:var(--muted); margin-top:4px; }
    .kb-file-err  { font-size:11px; color:var(--danger); margin-top:4px; }
    .kb-card { border:1px solid var(--border); border-radius:var(--r-sm); overflow:hidden; margin-bottom:10px; }
    .kb-card-hd { display:flex; align-items:center; gap:8px; padding:10px 12px; cursor:pointer; user-select:none; background:var(--card); }
    .kb-card-hd:hover { background:var(--hover); }
    .kb-chevron { font-size:10px; color:var(--muted); transition:transform .18s; flex-shrink:0; }
    .kb-card-hd.open .kb-chevron { transform:rotate(90deg); }
    .kb-card-name { font-size:13px; font-weight:500; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .kb-card-badge { background:var(--accent-bg); color:var(--accent); font-size:11px; border-radius:10px; padding:1px 8px; white-space:nowrap; flex-shrink:0; }
    .kb-card-acts { display:flex; gap:4px; flex-shrink:0; }
    .kb-card-body { border-top:1px solid var(--border); padding:0 12px; background:var(--bg); }
    .kb-src-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
    .kb-src-row:last-of-type { border-bottom:none; }
    .kb-src-icon { font-size:15px; flex-shrink:0; }
    .kb-src-info { flex:1; min-width:0; }
    .kb-src-name { font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .kb-src-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .kb-src-del { background:none; border:none; color:var(--muted); cursor:pointer; padding:2px 5px; border-radius:4px; font-size:14px; line-height:1; }
    .kb-src-del:hover { color:var(--danger); background:rgba(248,81,73,.12); }
    .kb-card-footer { padding:8px 0; }
    .kb-more-btn { font-size:12px; color:var(--accent); cursor:pointer; border:none; background:none; padding:0; }
    .kb-more-btn:hover { text-decoration:underline; }
    .kb-empty { color:var(--muted); font-size:13px; text-align:center; padding:28px 0; }
  </style>
</head>
<body>
<div id="frame">

  <!-- ── Titlebar ─────────────────────────────────────────────────────────── -->
  <div id="titlebar">
    <div class="tb-logo">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13z"/>
        <path d="M5.5 8.5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5S9.38 11 8 11s-2.5-1.12-2.5-2.5z"/>
      </svg>
      <span>AcompaLLM</span>
    </div>
    <div class="tb-spacer"></div>
    <button class="tb-btn" title="最小化" onclick="api()?.win_minimize()">
      <svg viewBox="0 0 10 10" fill="currentColor"><rect x="0" y="4.5" width="10" height="1"/></svg>
    </button>
    <button class="tb-btn" id="tbMaxBtn" title="最大化" onclick="tbToggleMax()">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x=".5" y=".5" width="9" height="9"/></svg>
    </button>
    <button class="tb-btn tb-close" title="关闭" onclick="api()?.win_close()">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
      </svg>
    </button>
  </div>

  <div id="app">

  <!-- ── Icon bar ───────────────────────────────────────────────────────────── -->
  <div id="iconBar">
    <!-- 品牌图标（点阵 AI 风格，不可点击） -->
    <div class="ib-logo" title="AcompaLLM">
      <svg viewBox="0 0 20 20" fill="none" stroke="var(--accent)" stroke-width="1.4">
        <circle cx="4"  cy="4"  r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="10" cy="4"  r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="16" cy="4"  r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="4"  cy="10" r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="10" cy="10" r="2"   fill="none" stroke="var(--accent)"/>
        <circle cx="16" cy="10" r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="4"  cy="16" r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="10" cy="16" r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="16" cy="16" r="1.4" fill="var(--accent)" stroke="none"/>
        <line x1="4" y1="4"  x2="10" y2="10" stroke-opacity=".4"/>
        <line x1="16" y1="4"  x2="10" y2="10" stroke-opacity=".4"/>
        <line x1="4" y1="16" x2="10" y2="10" stroke-opacity=".4"/>
        <line x1="16" y1="16" x2="10" y2="10" stroke-opacity=".4"/>
      </svg>
    </div>
    <!-- 对话 -->
    <button class="ib-btn active" data-panel="conv" title="对话" onclick="selectSidebarPanel('conv')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 4.5A1.5 1.5 0 0 1 4.5 3h11A1.5 1.5 0 0 1 17 4.5v8A1.5 1.5 0 0 1 15.5 14H7l-4 3V4.5z"/>
      </svg>
    </button>
    <div class="ib-spacer"></div>
    <!-- 知识库（开发中） -->
    <button class="ib-btn" disabled title="知识库（即将推出）">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h12v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4z"/>
        <path d="M4 4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2"/>
        <line x1="7" y1="9" x2="13" y2="9"/><line x1="7" y1="12" x2="11" y2="12"/>
      </svg>
    </button>
    <div class="ib-sep"></div>
    <!-- API控制台（开发中） -->
    <button class="ib-btn" disabled title="API 控制台（即将推出）">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="5,7 9,10 5,13"/>
        <line x1="11" y1="13" x2="15" y2="13"/>
      </svg>
    </button>
    <!-- 设置 -->
    <button class="ib-btn" data-panel="settings" title="设置" onclick="openSettings()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="10" cy="10" r="2.5"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <!-- 对话列表面板 -->
    <div id="sbPanelConv" class="sb-panel">
      <div class="sb-panel-hd">
        <span class="sb-panel-title">对话</span>
        <button id="newChatBtn" title="新对话" onclick="newChat()">+</button>
      </div>
      <div id="convList"></div>
    </div>

<script>
/* ── Sidebar resize handle ────────────────────────────────────────────────── */
(function () {
  var MIN_W = 160, MAX_W = 480;
  var handle  = document.getElementById('resizeHandle');
  var sidebar = document.getElementById('sidebar');
  var startX = 0, startW = 0;

  // 恢复上次保存的宽度
  var saved = localStorage.getItem('sb-width');
  if (saved) {
    var sw = Math.min(MAX_W, Math.max(MIN_W, +saved));
    sidebar.style.width = sw + 'px';
    document.documentElement.style.setProperty('--sb-w', sw + 'px');
  }

  // 使用 Pointer Events + setPointerCapture：
  // capture 后 pointermove/pointerup 事件直接发给 handle，
  // 不需要在 document 层监听，在 WSLg/XWayland 下更可靠。
  handle.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
  });

  handle.addEventListener('pointermove', function(e) {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    var w = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
    sidebar.style.width = w + 'px';
    document.documentElement.style.setProperty('--sb-w', w + 'px');
  });

  handle.addEventListener('pointerup', function(e) {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    handle.releasePointerCapture(e.pointerId);
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
    localStorage.setItem('sb-width', sidebar.offsetWidth);
  });

  handle.addEventListener('pointercancel', function() {
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
  });
})();

/* ── Globals ──────────────────────────────────────────────────────────────── */
'use strict';

const S = {
  convId:    null,   // currently selected conversation id
  convs:     [],     // [{id, title, updated_at, message_count}]
  streaming: false,
  _editingConvId: null,  // conv settings modal state
  streamModel: '',       // model name of current stream
  // streaming DOM refs
  streamMsgEl:      null,
  streamContentEl:  null,
  streamReasonEl:   null,
  streamThinkBlock: null,
  toolBlocksEl:     null,   // container for tool-call blocks
  streamBuf:        '',
  reasonBuf:        '',
};

/* ── API bridge helper ───────────────────────────────────────────────────── */
function api() { return window.pywebview?.api; }

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relativeTime(ts) {
  if (!ts) return '';
  const d = Date.now() / 1000 - ts;
  if (d < 60)   return '刚刚';
  if (d < 3600) return Math.floor(d/60) + ' 分钟前';
  if (d < 86400) return Math.floor(d/3600) + ' 小时前';
  return Math.floor(d/86400) + ' 天前';
}

function scrollBottom(force=false) {
  const c = document.getElementById('msgContainer');
  if (!c) return;
  // 如果用户已向上滑动（距底部超过 80px）且不是强制模式，不自动滚动
  if (!force && c.scrollHeight - c.scrollTop - c.clientHeight > 80) return;
  c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });
}

/* ── Markdown rendering ──────────────────────────────────────────────────── */
function setupMarked() {
  if (!window.marked) return;
  const renderer = new marked.Renderer();

  renderer.code = (code, lang) => {
    const lbl = lang || 'text';
    let highlighted = esc(code);
    if (window.hljs) {
      try {
        highlighted = lang && hljs.getLanguage(lang)
          ? hljs.highlight(code, {language: lang}).value
          : hljs.highlightAuto(code).value;
      } catch(e) {}
    }
    const id = 'code_' + Math.random().toString(36).slice(2,8);
    return `<div class="md-pre">
      <div class="code-header">
        <span>${esc(lbl)}</span>
        <button class="copy-btn" onclick="copyCode('${id}')">复制</button>
      </div>
      <pre><code id="${id}">${highlighted}</code></pre>
    </div>`;
  };

  marked.setOptions({ renderer, breaks: true, gfm: true });

  // 流式渲染用简化 renderer：代码块跳过 hljs，避免每帧语法高亮
  const streamRenderer = new marked.Renderer();
  streamRenderer.code = (code, lang) => {
    const lbl = lang || 'text';
    return `<div class="md-pre">
      <div class="code-header"><span>${esc(lbl)}</span></div>
      <pre><code>${esc(code)}</code></pre>
    </div>`;
  };
  window._markedStream = txt => marked.parse(txt, { renderer: streamRenderer, breaks: true, gfm: true });
}

function renderMd(text) {
  if (!text) return '';
  try {
    return window.marked ? marked.parse(text) : '<pre>' + esc(text) + '</pre>';
  } catch(e) {
    return '<pre>' + esc(text) + '</pre>';
  }
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.closest('.md-pre')?.querySelector('.copy-btn');
    if (btn) { btn.textContent = '✓ 已复制'; setTimeout(() => btn.textContent = '复制', 2000); }
  });
}

/* ── Conversation list ───────────────────────────────────────────────────── */
async function loadConvs() {
  const convs = await api().list_conversations();
  S.convs = convs;
  renderConvList();
}

function renderConvList() {
  const el = document.getElementById('convList');
  if (!S.convs.length) {
    el.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:var(--muted)">暂无对话，点击 + 新建</div>';
    return;
  }

  // Group by date
  const today    = new Date(); today.setHours(0,0,0,0);
  const yday     = new Date(today); yday.setDate(yday.getDate()-1);
  const week     = new Date(today); week.setDate(week.getDate()-7);

  const groups = { '今天':[], '昨天':[], '最近 7 天':[], '更早':[] };
  for (const c of S.convs) {
    const d = new Date(c.updated_at * 1000); d.setHours(0,0,0,0);
    if (d >= today)       groups['今天'].push(c);
    else if (d >= yday)   groups['昨天'].push(c);
    else if (d >= week)   groups['最近 7 天'].push(c);
    else                  groups['更早'].push(c);
  }

  let html = '';
  for (const [label, items] of Object.entries(groups)) {
    if (!items.length) continue;
    html += `<div class="conv-section-label">${label}</div>`;
    for (const c of items) {
      const active = c.id === S.convId ? ' active' : '';
      html += `
        <div class="conv-item${active}" data-id="${esc(c.id)}" onclick="selectConv('${esc(c.id)}')">
          <div class="conv-info">
            <div class="conv-title">${esc(c.title)}</div>
            <div class="conv-date">${relativeTime(c.updated_at)}</div>
          </div>
          <div class="conv-actions">
            <button title="对话设置" onclick="openConvSettings(event,'${esc(c.id)}')">⚙</button>
          </div>
        </div>`;
    }
  }
  el.innerHTML = html;
}

async function newChat() {
  const conv = await api().new_conversation();
  S.convs.unshift(conv);
  renderConvList();
  await selectConv(conv.id, true);
}

async function selectConv(id, isNew=false) {
  if (S.streaming && id !== S.convId) {
    api().cancel_stream(S.convId);
    S.streaming = false;
  }
  S.convId = id;

  // Highlight active
  document.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  if (isNew) {
    clearMsgList();
    showEmpty(true);
    document.getElementById('headerClearBtn').hidden = true;
    updateTitle('新对话');
    return;
  }

  const conv = await api().get_conversation(id);
  if (!conv) return;
  updateTitle(conv.title);
  renderMessages(conv.messages || []);
  document.getElementById('headerClearBtn').hidden = false;
}

function updateTitle(t) {
  document.getElementById('chatTitle').textContent = t || '新对话';
}

function openConvSettings(e, id) {
  e.stopPropagation();
  S._editingConvId = id;
  const conv = S.convs.find(c => c.id === id);
  document.getElementById('csTitle').value        = conv?.title || '';
  document.getElementById('csSystemPrompt').value = conv?.system_prompt ?? '';
  document.getElementById('csTemp').value         = conv?.temperature != null ? conv.temperature : '';
  document.getElementById('convSettingsModal').style.display = 'flex';
}

function closeConvSettings() {
  document.getElementById('convSettingsModal').style.display = 'none';
  S._editingConvId = null;
}

async function saveConvSettings() {
  const id = S._editingConvId;
  if (!id) return;
  const title      = document.getElementById('csTitle').value.trim();
  const sysPrompt  = document.getElementById('csSystemPrompt').value;
  const tempStr    = document.getElementById('csTemp').value.trim();
  const temperature = tempStr !== '' ? parseFloat(tempStr) : null;

  await api().update_conversation(id, { title, system_prompt: sysPrompt, temperature });

  const conv = S.convs.find(c => c.id === id);
  if (conv) {
    if (title) conv.title = title;
    conv.system_prompt = sysPrompt;
    conv.temperature   = temperature;
  }
  renderConvList();
  if (id === S.convId) updateTitle(title || conv?.title || '');
  closeConvSettings();
}

async function deleteConvFromModal() {
  const id = S._editingConvId;
  if (!id) return;
  if (!confirm('确定删除这条对话？此操作无法撤销。')) return;
  closeConvSettings();
  await api().delete_conversation(id);
  S.convs = S.convs.filter(c => c.id !== id);
  renderConvList();
  if (id === S.convId) {
    S.convId = null;
    clearMsgList();
    showEmpty(true);
    updateTitle('AcompaLLM');
    document.getElementById('headerClearBtn').hidden = true;
  }
}

async function clearCurrentConv() {
  if (!S.convId || !confirm('确定清空当前对话内容？')) return;
  await api().clear_conversation(S.convId);
  clearMsgList();
  showEmpty(true);
  const conv = S.convs.find(c => c.id === S.convId);
  if (conv) { conv.message_count = 0; }
  renderConvList();
}

/* ── Message rendering ───────────────────────────────────────────────────── */
function clearMsgList() {
  document.getElementById('msgList').innerHTML = '';
}

function showEmpty(show) {
  let el = document.getElementById('emptyState');
  if (!el) return;
  if (show) {
    document.getElementById('msgList').appendChild(el);
  } else if (el.parentNode) {
    el.parentNode.removeChild(el);
  }
}

function renderMessages(messages) {
  const list = document.getElementById('msgList');
  list.innerHTML = '';
  showEmpty(false);
  for (const m of messages) {
    if (m.role === 'system') continue;
    list.appendChild(buildMsgEl(m));
  }
  scrollBottom(true);
}

function buildMsgEl(msg) {
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;
  row.dataset.msgId = msg.id || '';

  const avatarIcon = msg.role === 'user' ? 'U' : 'A';

  if (msg.role === 'user') {
    row.innerHTML = `
      <div class="msg-avatar">${avatarIcon}</div>
      <div class="msg-body">
        <div class="msg-bubble">${esc(msg.content || '')}</div>
        <div class="msg-actions">
          <button class="msg-act-btn" onclick="copyMsg(this)">复制</button>
        </div>
      </div>`;
  } else {
    const thinking = msg.reasoning_content
      ? `<div class="think-block">
           <div class="think-header" onclick="this.closest('.think-block').classList.toggle('open')">
             <span class="think-arrow" style="margin-left:0;margin-right:4px">▶</span><span>思考过程</span>
           </div>
           <div class="think-body">${esc(msg.reasoning_content)}</div>
         </div>`
      : '';
    const usage = (msg.usage && msg.usage.total_tokens)
      ? `<span style="font-size:11px;color:var(--muted);margin-top:6px;display:inline-block">
           ${msg.model || ''} · ${msg.usage.total_tokens} tokens
         </span>`
      : '';
    row.innerHTML = `
      <div class="msg-avatar">${avatarIcon}</div>
      <div class="msg-body">
        ${thinking}
        <div class="msg-bubble">
          <div class="md">${renderMd(msg.content || '')}</div>
          ${usage}
        </div>
        <div class="msg-actions">
          <button class="msg-act-btn" onclick="copyMsg(this)">复制</button>
          <button class="msg-act-btn" onclick="deleteMsg(this,'${esc(msg.id||'')}')">删除</button>
        </div>
      </div>`;
  }
  return row;
}

function copyMsg(btn) {
  const bubble = btn.closest('.msg-body')?.querySelector('.msg-bubble');
  const text = bubble?.innerText || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制', 2000);
  });
}

async function deleteMsg(btn, msgId) {
  if (!msgId || !S.convId) return;
  await api().delete_message(S.convId, msgId);
  btn.closest('.msg-row')?.remove();
}

/* ── Send message ────────────────────────────────────────────────────────── */
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || S.streaming) return;

  // Ensure conversation exists
  if (!S.convId) {
    const conv = await api().new_conversation();
    S.convs.unshift(conv);
    S.convId = conv.id;
    renderConvList();
    updateTitle(conv.title);
    showEmpty(false);
    document.getElementById('headerClearBtn').hidden = false;
  }

  input.value = '';
  input.style.height = 'auto';
  showEmpty(false);

  // Options from toolbar
  const wsActive  = document.getElementById('webSearchBtn').classList.contains('active');
  const ragActive = document.getElementById('ragBtn').classList.contains('active');
  const dtBtn     = document.getElementById('deepThinkBtn');
  const deepThink = dtBtn && dtBtn.style.display !== 'none' && dtBtn.classList.contains('active');
  const options = {
    tool_web_search: wsActive ? 'true' : undefined,
    tool_rag: ragActive,
    deep_think: deepThink || undefined,
  };

  // Append user bubble immediately
  const userEntry = { id: null, role: 'user', content: text };
  const userEl = buildMsgEl(userEntry);
  document.getElementById('msgList').appendChild(userEl);
  scrollBottom(true);

  // Lock UI
  S.streaming = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('cancelBtn').classList.add('show');
  input.disabled = true;

  await api().send_message(S.convId, text, options);
}

function cancelStream() {
  if (S.convId) api().cancel_stream(S.convId);
}

function toggleTool(btn) {
  btn.classList.toggle('active');
}

function insertTip(el) {
  document.getElementById('msgInput').value = el.textContent;
  document.getElementById('msgInput').focus();
}

/* ── Streaming callbacks (called from Python via evaluate_js) ─────────────── */
window.__onStreamEvent = function(event) {
  const { type, conv_id } = event;

  switch (type) {

    case 'start': {
      if (conv_id !== S.convId) break;
      // Remove any pre-stream status indicator
      document.getElementById('preStreamStatus')?.remove();
      // Create assistant bubble placeholder
      const row = document.createElement('div');
      row.className = 'msg-row assistant';
      row.innerHTML = `
        <div class="msg-avatar">A</div>
        <div class="msg-body">
          <div class="msg-bubble">
            <div class="md stream-content"></div>
          </div>
        </div>`;
      document.getElementById('msgList').appendChild(row);
      S.streamMsgEl      = row;
      S.streamContentEl  = row.querySelector('.stream-content');
      S.streamThinkBlock = null;  // created lazily on first reasoning_chunk
      S.streamReasonEl   = null;
      // tool blocks container: inserted before the bubble
      const _toolsCont = document.createElement('div');
      _toolsCont.className = 'tool-blocks-wrap';
      row.querySelector('.msg-body').insertBefore(_toolsCont, row.querySelector('.msg-bubble'));
      S.toolBlocksEl     = _toolsCont;
      // hide bubble until first content arrives
      row.querySelector('.msg-bubble').hidden = true;
      S.streamBuf        = '';
      S.reasonBuf        = '';
      S.streamModel      = event.model || '';
      S.streamContentEl.innerHTML = '';
      scrollBottom(true);
      break;
    }

    case 'status': {
      if (conv_id !== S.convId) break;
      if (S.streamMsgEl) {
        // Stream already started — show chip inside the bubble
        let chip = S.streamMsgEl.querySelector('.status-chip');
        if (!chip) {
          chip = document.createElement('div');
          chip.className = 'status-chip';
          S.streamMsgEl.querySelector('.msg-body').insertBefore(
            chip, S.streamMsgEl.querySelector('.msg-bubble')
          );
        }
        chip.innerHTML = `<div class="spinner"></div>${esc(event.text)}`;
      } else {
        // Before stream starts — show a standalone pre-stream row
        let statusRow = document.getElementById('preStreamStatus');
        if (!statusRow) {
          statusRow = document.createElement('div');
          statusRow.id = 'preStreamStatus';
          statusRow.className = 'msg-row assistant';
          statusRow.innerHTML = '<div class="msg-avatar">A</div><div class="msg-body"><div class="status-chip"><div class="spinner"></div><span></span></div></div>';
          document.getElementById('msgList').appendChild(statusRow);
        }
        statusRow.querySelector('span').textContent = event.text;
        scrollBottom();
      }
      break;
    }

    case 'tool_start': {
      if (conv_id !== S.convId || !S.toolBlocksEl) break;
      const _TOOL_META = {
        web_search: {
          label: '联网搜索',
          icon: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><circle cx="5.5" cy="5.5" r="4"/><line x1="8.5" y1="8.5" x2="12" y2="12"/></svg>'
        },
        rag: {
          label: '知识库检索',
          icon: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><rect x="2" y="1" width="10" height="12" rx="1"/><line x1="4" y1="5" x2="10" y2="5"/><line x1="4" y1="8" x2="8" y2="8"/></svg>'
        },
      };
      const _meta = _TOOL_META[event.tool] || { label: event.tool, icon: '⚙️' };
      const _block = document.createElement('div');
      _block.className = 'tool-block';
      _block.dataset.tool = event.tool;
      _block.innerHTML = `
        <div class="tool-block-hd" onclick="this.closest('.tool-block').classList.toggle('open')">
          <span class="tb-icon" style="opacity:.65;display:flex;align-items:center">${_meta.icon}</span>
          <span class="tb-label">${_meta.label}</span>
          <div style="width:11px;height:11px;border:1.5px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0" class="tb-spinner"></div>
          <span class="tb-arrow">▶</span>
        </div>
        <div class="tool-block-body"></div>`;
      S.toolBlocksEl.appendChild(_block);
      scrollBottom();
      break;
    }

    case 'tool_done': {
      if (conv_id !== S.convId || !S.toolBlocksEl) break;
      const _b = S.toolBlocksEl.querySelector(`.tool-block[data-tool="${event.tool}"]`);
      if (!_b) break;
      _b.querySelector('.tb-spinner')?.remove();
      const _hd = _b.querySelector('.tool-block-hd');
      const _ok = document.createElement('span');
      _ok.className = 'tb-ok';
      _ok.innerHTML = '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg>';
      _hd.insertBefore(_ok, _hd.querySelector('.tb-arrow'));
      if (event.results && event.results.length) {
        const _body = _b.querySelector('.tool-block-body');
        if (event.tool === 'web_search') {
          const _q = esc(event.query || '');
          const _cards = event.results.map((r, i) => {
            const _url = r.url || '';
            const _title = esc((r.title || '未知标题').slice(0, 46));
            const _domain = _url.replace(/^https?:\/\//, '').split('/')[0].replace(/^www\./, '').split('?')[0];
            return `<div class="tb-result-card" onclick="window.open(${JSON.stringify(_url)},'_blank')">
              <span class="rc-idx">${i+1}.</span><span class="rc-title">${_title}</span>
              <span class="rc-url">${esc(_domain || _url)}</span>
            </div>`;
          }).join('');
          _body.innerHTML = `<div class="tb-query">搜索查询：<em>${_q}</em></div><div class="tb-results">${_cards}</div>`;
        } else if (event.tool === 'rag') {
          _body.innerHTML = `<div class="tb-query">已召回 <em>${event.results.length}</em> 个相关片段</div>`;
        }
        _b.classList.add('open');
      }
      scrollBottom();
      break;
    }

    case 'tool_error': {
      if (conv_id !== S.convId || !S.toolBlocksEl) break;
      const _be = S.toolBlocksEl.querySelector(`.tool-block[data-tool="${event.tool}"]`);
      if (_be) {
        _be.querySelector('.tb-spinner')?.remove();
        const _he = _be.querySelector('.tool-block-hd');
        const _ee = document.createElement('span');
        _ee.className = 'tb-err';
        _ee.textContent = '✗';
        _he.insertBefore(_ee, _he.querySelector('.tb-arrow'));
        if (event.error) {
          const _bdy = _be.querySelector('.tool-block-body');
          _bdy.innerHTML = `<div class="tb-query" style="color:var(--danger)">${esc(event.error)}</div>`;
          _be.classList.add('open');
        }
      }
      break;
    }

    case 'reasoning_chunk': {
      if (conv_id !== S.convId) break;
      // Create think-block lazily so it appears AFTER any tool blocks already in the stream
      if (!S.streamThinkBlock && S.toolBlocksEl) {
        const _tb = document.createElement('div');
        _tb.className = 'think-block';
        _tb.innerHTML = `
          <div class="think-header" onclick="this.closest('.think-block').classList.toggle('open')">
            <span class="think-arrow" style="margin-left:0;margin-right:4px">▶</span><span class="think-title">思考中…</span>
          </div>
          <div class="think-body"></div>`;
        S.toolBlocksEl.appendChild(_tb);
        S.streamThinkBlock = _tb;
        S.streamReasonEl   = _tb.querySelector('.think-body');
      }
      if (!S.streamReasonEl) break;
      S.reasonBuf += event.text;
      S.streamReasonEl.textContent = S.reasonBuf;
      scrollBottom();
      break;
    }

    case 'content_chunk': {
      if (conv_id !== S.convId || !S.streamContentEl) break;
      // Remove status chip once content starts
      S.streamMsgEl?.querySelector('.status-chip')?.remove();
      // Show bubble on first chunk
      const _bubble = S.streamMsgEl?.querySelector('.msg-bubble');
      if (_bubble && _bubble.hidden) _bubble.hidden = false;
      S.streamBuf += event.text;
      // 流式实时 markdown 渲染（用轻量 streamRenderer，跳过 hljs）
      const _renderFn = window._markedStream || (t => '<pre>' + esc(t) + '</pre>');
      try {
        S.streamContentEl.innerHTML = _renderFn(S.streamBuf);
      } catch(e) {
        S.streamContentEl.innerHTML = esc(S.streamBuf);
      }
      // 追加光标到末尾元素内
      const _cur = document.createElement('span');
      _cur.className = 'cursor';
      _cur.textContent = '▋';
      S.streamContentEl.appendChild(_cur);
      scrollBottom();
      break;
    }

    case 'done':
    case 'cancelled': {
      if (conv_id !== S.convId) break;
      _finalizeStream(event.usage, event.model);
      break;
    }

    case 'error': {
      if (S.streamContentEl) {
        S.streamContentEl.innerHTML =
          `<span style="color:var(--danger)">⚠ ${esc(event.message)}</span>`;
        S.streamMsgEl?.querySelector('.status-chip')?.remove();
      } else {
        // Show as toast / append error row
        const row = document.createElement('div');
        row.className = 'msg-row assistant';
        row.innerHTML = `<div class="msg-avatar" style="background:rgba(248,81,73,.15);border-color:rgba(248,81,73,.3);color:var(--danger)">!</div>
          <div class="msg-body"><div class="msg-bubble" style="color:var(--danger)">
            ${esc(event.message)}</div></div>`;
        document.getElementById('msgList').appendChild(row);
      }
      _finalizeStream();
      break;
    }

    case 'title_update': {
      const c = S.convs.find(x => x.id === conv_id);
      if (c) c.title = event.title;
      renderConvList();
      if (conv_id === S.convId) updateTitle(event.title);
      break;
    }
  }
};

// 批量流式事件处理器（由 desktop_app.py _stream_thread 30ms 节流调用）
window.__onStreamBatch = function(events) {
  for (const ev of events) window.__onStreamEvent(ev);
};

function _finalizeStream(usage, model) {
  // Render markdown on final content
  if (S.streamContentEl) {
    const mdEl = S.streamContentEl;
    mdEl.innerHTML = renderMd(S.streamBuf) || '';
    // Append usage footer inside the bubble
    const mdModel = model || S.streamModel || '';
    if (usage && usage.total_tokens) {
      const foot = document.createElement('span');
      foot.style.cssText = 'font-size:11px;color:var(--muted);margin-top:6px;display:inline-block';
      foot.textContent = (mdModel ? mdModel + ' · ' : '') + usage.total_tokens + ' tokens';
      mdEl.closest('.msg-bubble')?.appendChild(foot);
    }
    // Mark think block as done
    if (S.streamThinkBlock && !S.streamThinkBlock.hidden) {
      const tt = S.streamThinkBlock.querySelector('.think-title');
      if (tt) tt.textContent = '思考过程';
    }
  }
  S.streamMsgEl      = null;
  S.streamContentEl  = null;
  S.streamThinkBlock = null;
  S.streamReasonEl   = null;
  S.toolBlocksEl     = null;
  document.getElementById('preStreamStatus')?.remove();
  S.smoothBuf        = '';
  S.reasonBuf        = '';
  S.streaming        = false;

  // Unlock UI
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('cancelBtn').classList.remove('show');
  document.getElementById('msgInput').disabled = false;
  document.getElementById('msgInput').focus();

  // Refresh conv list (message_count / updated_at)
  loadConvs().then(() => {
    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === S.convId);
    });
  });
}

function selectSidebarPanel(id) {
  document.getElementById('sbPanelConv').style.display     = id === 'conv'     ? '' : 'none';
  document.getElementById('sbPanelSettings').style.display = id === 'settings' ? '' : 'none';
  // main 区切换

function switchSettingsTab(name, btn) {
  // 导航项选中状态
  document.querySelectorAll('#sbPanelSettings .sp-nav-item').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  // 标题
  const titles = { api: 'API 配置', tools: '工具', memory: '知识库' };
  const hdr = document.getElementById('svHeader');
  if (hdr) hdr.textContent = titles[name] || name;
  // 内容面板
  document.getElementById('tabApi').hidden    = name !== 'api';
  document.getElementById('tabTools').hidden  = name !== 'tools';
  document.getElementById('tabMemory').hidden = name !== 'memory';
  // 切换到知识库 tab 时自动刷新集合列表
  if (name === 'memory') kbLoadList();
  // 连接/保存按钮：api tab 才显示测试连接，memory tab 隐藏整个footer
  const footer = document.querySelector('.sv-footer');
  if (footer) footer.style.display = name === 'memory' ? 'none' : '';
  const testConnBtn = document.getElementById('testConnBtn');
  if (testConnBtn) testConnBtn.style.display = name === 'api' ? '' : 'none';
}

async function fetchAndShowModels() {
  const btn = document.getElementById('fetchModelsBtn');
  const spinner = document.getElementById('fetchModelsSpinner');
  const status  = document.getElementById('fetchModelsStatus');
  btn.disabled = true;
  spinner.style.display = 'inline-block';
  status.innerHTML = '';
  await _doSaveConfig(false);
  try {
    const res = await api().test_connection();
    if (!res.ok) {
      status.innerHTML = `<span style="color:var(--danger)">✗ ${esc(res.message || '连接失败')}</span>`;
      btn.disabled = false; spinner.style.display = 'none'; return;
    }
  } catch (e) {
    status.innerHTML = `<span style="color:var(--danger)">✗ ${esc(String(e))}</span>`;
    btn.disabled = false; spinner.style.display = 'none'; return;
  }
  try {
    const models = await api().list_upstream_models();
    const pid    = document.getElementById('sPickedProvider').value || 'deepseek';
    _fetchedModels[pid] = models;
    _populateModelDropdown(models, document.getElementById('sModel').value);
    status.innerHTML = `<span style="color:var(--green)">✓ 已获取 ${models.length} 个模型</span>`;
  } catch (_) {
    status.innerHTML = `<span style="color:var(--muted)">已连接，但获取模型列表失败</span>`;
  } finally {
    btn.disabled = false; spinner.style.display = 'none';
  }
}

async function _doSaveConfig(close=true) {
  const pid     = document.getElementById('sPickedProvider').value || 'deepseek';
  const baseUrl = pid === 'custom'
    ? document.getElementById('sBaseUrl').value.trim()
    : (PROVIDER_URLS[pid] || '');
  const updates = {
    provider:          pid,
    upstream_base_url: baseUrl,
    api_key:           document.getElementById('sApiKey').value.trim(),
    model:             document.getElementById('sModel').value.trim(),
    temperature:       parseFloat(document.getElementById('sTemp').value),
    system_prompt:     document.getElementById('sSystemPrompt').value.trim(),
    tool_web_search:        document.getElementById('sWebSearch').value,
    tool_web_search_engine: document.getElementById('sWebEngine').value,
    tool_tavily_key:        document.getElementById('sTavilyKey').value.trim(),
    tool_bing_key:          document.getElementById('sBingKey').value.trim(),
    tool_brave_key:         document.getElementById('sBraveKey').value.trim(),
    tool_serp_key:          document.getElementById('sSerpKey').value.trim(),
    tool_rag:               document.getElementById('sRag').checked,

function updateModelSelector(model) {
  const wrap  = document.getElementById('modelSelectorWrap');
  const label = document.getElementById('modelSelectorLabel');
  if (model) {
    label.textContent = model;
    wrap.style.display = '';
    document.querySelectorAll('.model-dropdown-item').forEach(el => {
      el.classList.toggle('active', el.dataset.model === model);
    });
  } else {
    wrap.style.display = 'none';
  }
}

function _populateModelDropdown(models, curModel) {
  const dd = document.getElementById('modelDropdown');
  dd.innerHTML = '';
  if (!models.length) { dd.innerHTML = '<div class="model-dropdown-empty">暂无可用模型</div>'; return; }
  for (const m of models) {
    const el = document.createElement('div');
    el.className   = 'model-dropdown-item' + (m === curModel ? ' active' : '');
    el.dataset.model = m;
    el.textContent  = m;
    el.onclick = () => {
      const pid = document.getElementById('sPickedProvider')?.value || 'deepseek';
      _pickFromPicker(pid, m);
      api().save_config({ model: m });
      closeModelDropdown();
    };
    dd.appendChild(el);
  }
}

let _kbTargetName = null;   // null=新建  string=追加到已有集合
let _kbEmbedModel  = 'BAAI/bge-small-zh-v1.5';
let _kbFiles       = [];    // [{path, status:'pending'|'loading'|'done'|'error', chunks, addedAt, error}]

function kbShowAddForm(colName, evt) {
