<script>
/* ── Sidebar resize handle ────────────────────────────────────────────────── */
(function () {
  var MIN_W = 160, MAX_W = 480;
  var handle  = document.getElementById('resizeHandle');
  var sidebar = document.getElementById('sidebar');
  var startX = 0, startW = 0;

  // 恢复上次保存的宽度
  var saved = localStorage.getItem('sb-width');
  if (saved) {
    var sw = Math.min(MAX_W, Math.max(MIN_W, +saved));
    sidebar.style.width = sw + 'px';
    document.documentElement.style.setProperty('--sb-w', sw + 'px');
  }

  // 使用 Pointer Events + setPointerCapture：
  // capture 后 pointermove/pointerup 事件直接发给 handle，
  // 不需要在 document 层监听，在 WSLg/XWayland 下更可靠。
  handle.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
  });

  handle.addEventListener('pointermove', function(e) {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    var w = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
    sidebar.style.width = w + 'px';
    document.documentElement.style.setProperty('--sb-w', w + 'px');
  });

  handle.addEventListener('pointerup', function(e) {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    handle.releasePointerCapture(e.pointerId);
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
    localStorage.setItem('sb-width', sidebar.offsetWidth);
  });

  handle.addEventListener('pointercancel', function() {
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
  });
})();

/* ── Globals ──────────────────────────────────────────────────────────────── */
'use strict';

const S = {
  convId:    null,   // currently selected conversation id
  convs:     [],     // [{id, title, updated_at, message_count}]
  streaming: false,
  kbNames:   [],     // 当前对话绑定的知识库名称列表（持久化到 conv JSON）
  _editingConvId: null,  // conv settings modal state
  streamModel: '',       // model name of current stream
  // streaming DOM refs
  streamMsgEl:      null,
  streamContentEl:  null,
  streamReasonEl:   null,
  streamThinkBlock: null,
  toolBlocksEl:     null,   // container for tool-call blocks
  streamBuf:        '',
  reasonBuf:        '',
  // regen / version navigation
  turnVersions:    {},   // { userMsgId: [{row, msgId}, ...] }  — in-session regen history
  _verChoice:      {},   // { userMsgId: idx } — user’s manual version selection
  streamUserMsgId: null, // user_message_id carried by current stream’s start event
  _regenUserMsgId: null, // set by regenMsg(), consumed by sendMessage()
};

/* ── API bridge helper ───────────────────────────────────────────────────── */
function api() { return window.pywebview?.api; }

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relativeTime(ts) {
  if (!ts) return '';
  const d = Date.now() / 1000 - ts;
  if (d < 60)   return '刚刚';
  if (d < 3600) return Math.floor(d/60) + ' 分钟前';
  if (d < 86400) return Math.floor(d/3600) + ' 小时前';
  return Math.floor(d/86400) + ' 天前';
}

function scrollBottom(force=false) {
  const c = document.getElementById('msgContainer');
  if (!c) return;
  // 如果用户已向上滑动（距底部超过 80px）且不是强制模式，不自动滚动
  if (!force && c.scrollHeight - c.scrollTop - c.clientHeight > 80) return;
  c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });
}

/* ── Markdown rendering ──────────────────────────────────────────────────── */
function setupMarked() {
  if (!window.marked) return;
  const renderer = new marked.Renderer();

  renderer.code = (code, lang) => {
    const lbl = lang || 'text';
    let highlighted = esc(code);
    if (window.hljs) {
      try {
        highlighted = lang && hljs.getLanguage(lang)
          ? hljs.highlight(code, {language: lang}).value
          : hljs.highlightAuto(code).value;
      } catch(e) {}
    }
    const id = 'code_' + Math.random().toString(36).slice(2,8);
    return `<div class="md-pre">
      <div class="code-header">
        <span>${esc(lbl)}</span>
        <button class="copy-btn" onclick="copyCode('${id}')">复制</button>
      </div>
      <pre><code id="${id}">${highlighted}</code></pre>
    </div>`;
  };

  marked.setOptions({ renderer, breaks: true, gfm: true });

  // 流式渲染用简化 renderer：代码块跳过 hljs，避免每帧语法高亮
  const streamRenderer = new marked.Renderer();
  streamRenderer.code = (code, lang) => {
    const lbl = lang || 'text';
    return `<div class="md-pre">
      <div class="code-header"><span>${esc(lbl)}</span></div>
      <pre><code>${esc(code)}</code></pre>
    </div>`;
  };
  window._markedStream = txt => _postMd(marked.parse(txt, { renderer: streamRenderer, breaks: true, gfm: true }));
}

function _postMd(html) {
  // marked v9（CommonMark 严格模式）对紧邻标点符号的 **…** 处理有缺陷，
  // 常见于中文弯引号 "…" 包住的加粗文字。做一次后处理兜底转换。
  return html.replace(/\*\*([^*<\n]+?)\*\*/g, '<strong>$1</strong>');
}

function renderMd(text) {
  if (!text) return '';
  try {
    const html = window.marked ? marked.parse(text) : '<pre>' + esc(text) + '</pre>';
    return _postMd(html);
  } catch(e) {
    return '<pre>' + esc(text) + '</pre>';
  }
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.closest('.md-pre')?.querySelector('.copy-btn');
    if (btn) { btn.textContent = '✓ 已复制'; setTimeout(() => btn.textContent = '复制', 2000); }
  });
}

/* ── Conversation list ───────────────────────────────────────────────────── */
async function loadConvs() {
  const convs = await api().list_conversations();
  S.convs = convs;
  renderConvList();
}

function renderConvList() {
  const el = document.getElementById('convList');
  if (!S.convs.length) {
    el.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:var(--muted)">暂无对话，点击 + 新建</div>';
    return;
  }

  // Group by date
  const today    = new Date(); today.setHours(0,0,0,0);
  const yday     = new Date(today); yday.setDate(yday.getDate()-1);
  const week     = new Date(today); week.setDate(week.getDate()-7);

  const groups = { '今天':[], '昨天':[], '最近 7 天':[], '更早':[] };
  for (const c of S.convs) {
    const d = new Date(c.updated_at * 1000); d.setHours(0,0,0,0);
    if (d >= today)       groups['今天'].push(c);
    else if (d >= yday)   groups['昨天'].push(c);
    else if (d >= week)   groups['最近 7 天'].push(c);
    else                  groups['更早'].push(c);
  }

  let html = '';
  for (const [label, items] of Object.entries(groups)) {
    if (!items.length) continue;
    html += `<div class="conv-section-label">${label}</div>`;
    for (const c of items) {
      const active = c.id === S.convId ? ' active' : '';
      html += `
        <div class="conv-item${active}" data-id="${esc(c.id)}" onclick="selectConv('${esc(c.id)}')">
          <div class="conv-info">
            <div class="conv-title">${esc(c.title)}</div>
            <div class="conv-date">${relativeTime(c.updated_at)}</div>
          </div>
          <div class="conv-actions">
            <button title="对话设置" onclick="openConvSettings(event,'${esc(c.id)}')">⚙</button>
          </div>
        </div>`;
    }
  }
  el.innerHTML = html;
}

async function newChat() {
  const conv = await api().new_conversation();
  S.convs.unshift(conv);
  renderConvList();
  await selectConv(conv.id, true);
}

async function selectConv(id, isNew=false) {
  if (S.streaming && id !== S.convId) {
    api().cancel_stream(S.convId);
    S.streaming = false;
  }
  S.convId = id;

  // Highlight active
  document.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  if (isNew) {
    clearMsgList();
    showEmpty(true);
    document.getElementById('headerClearBtn').hidden = true;
    updateTitle('新对话');
    return;
  }

  const conv = await api().get_conversation(id);
  if (!conv) return;
  updateTitle(conv.title);
  renderMessages(conv.messages || []);
  document.getElementById('headerClearBtn').hidden = false;
  // 恢复该对话绑定的知识库列表
  S.kbNames = Array.isArray(conv.kb_names) ? conv.kb_names : [];
  _updateRagBtn();
}

function updateTitle(t) {
  document.getElementById('chatTitle').textContent = t || '新对话';
}

function openConvSettings(e, id) {
  e.stopPropagation();
  S._editingConvId = id;
  const conv = S.convs.find(c => c.id === id);
  document.getElementById('csTitle').value        = conv?.title || '';
  document.getElementById('csSystemPrompt').value = conv?.system_prompt ?? '';
  document.getElementById('csTemp').value         = conv?.temperature != null ? conv.temperature : '';
  document.getElementById('convSettingsModal').style.display = 'flex';
}

function closeConvSettings() {
  document.getElementById('convSettingsModal').style.display = 'none';
  S._editingConvId = null;
}

async function saveConvSettings() {
  const id = S._editingConvId;
  if (!id) return;
  const title      = document.getElementById('csTitle').value.trim();
  const sysPrompt  = document.getElementById('csSystemPrompt').value;
  const tempStr    = document.getElementById('csTemp').value.trim();
  const temperature = tempStr !== '' ? parseFloat(tempStr) : null;

  await api().update_conversation(id, { title, system_prompt: sysPrompt, temperature });

  const conv = S.convs.find(c => c.id === id);
  if (conv) {
    if (title) conv.title = title;
    conv.system_prompt = sysPrompt;
    conv.temperature   = temperature;
  }
  renderConvList();
  if (id === S.convId) updateTitle(title || conv?.title || '');
  closeConvSettings();
}

async function deleteConvFromModal() {
  const id = S._editingConvId;
  if (!id) return;
  if (!confirm('确定删除这条对话？此操作无法撤销。')) return;
  closeConvSettings();
  await api().delete_conversation(id);
  S.convs = S.convs.filter(c => c.id !== id);
  renderConvList();
  if (id === S.convId) {
    S.convId = null;
    clearMsgList();
    showEmpty(true);
    updateTitle('AcompaLLM');
    document.getElementById('headerClearBtn').hidden = true;
  }
}

async function clearCurrentConv() {
  if (!S.convId || !confirm('确定清空当前对话内容？')) return;
  await api().clear_conversation(S.convId);
  clearMsgList();
  showEmpty(true);
  const conv = S.convs.find(c => c.id === S.convId);
  if (conv) { conv.message_count = 0; }
  renderConvList();
}

/* ── Message rendering ───────────────────────────────────────────────────── */
function clearMsgList() {
  document.getElementById('msgList').innerHTML = '';
  // 清空版本导航状态，避免切换对话后的 stale DOM 引用
  S.turnVersions = {};
  S._verChoice   = {};
}

function showEmpty(show) {
  let el = document.getElementById('emptyState');
  if (!el) return;
  if (show) {
    document.getElementById('msgList').appendChild(el);
  } else if (el.parentNode) {
    el.parentNode.removeChild(el);
  }
}

function renderMessages(messages) {
  const list = document.getElementById('msgList');
  list.innerHTML = '';
  showEmpty(false);
  for (const m of messages) {
    if (m.role === 'system') continue;
    list.appendChild(buildMsgEl(m));
  }
  scrollBottom(true);
}

function buildMsgEl(msg) {
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;
  row.dataset.msgId = msg.id || '';

  const avatarIcon = msg.role === 'user' ? 'U' : 'A';

  if (msg.role === 'user') {
    row.innerHTML = `
      <div class="msg-avatar">${avatarIcon}</div>
      <div class="msg-body">
        <div class="msg-bubble">${esc(msg.content || '')}</div>
        <div class="msg-actions">
          <button class="msg-act-btn" onclick="copyMsg(this)">复制</button>
          <button class="msg-act-btn" onclick="regenFromUserMsg(this,'${esc(msg.id||'')}')">重新发送</button>
          <button class="msg-act-btn" onclick="deleteMsg(this,'${esc(msg.id||'')}')">删除</button>
        </div>
      </div>`;
  } else {
    const thinking = msg.reasoning_content
      ? `<div class="think-block">
           <div class="think-header" onclick="this.closest('.think-block').classList.toggle('open')">
             <span class="think-arrow" style="margin-left:0;margin-right:4px">▶</span><span>思考过程</span>
           </div>
           <div class="think-body">${esc(msg.reasoning_content)}</div>
         </div>`
      : '';
    const usage = (msg.usage && msg.usage.total_tokens)
      ? `<span style="font-size:11px;color:var(--muted);margin-top:6px;display:inline-block">
           ${msg.model || ''} · ${msg.usage.total_tokens} tokens
         </span>`
      : '';

    // ── 历史工具块还原 ────────────────────────────────────────────────────
    let toolBlocksHtml = '';
    for (const tr of (msg.tool_results || [])) {
      if (tr.tool === 'web_search') {
        const cards = (tr.results || []).map((r, i) => {
          const _url   = r.url || '';
          const _title = esc((r.title || '未知标题').slice(0, 46));
          const _domain = _url.replace(/^https?:\/\//, '').split('/')[0].replace(/^www\./, '').split('?')[0];
          return `<div class="tb-result-card" onclick="window.open(${JSON.stringify(_url)},'_blank')">
            <span class="rc-idx">${i+1}.</span><span class="rc-title">${_title}</span>
            <span class="rc-url">${esc(_domain || _url)}</span>
          </div>`;
        }).join('');
        toolBlocksHtml += `
          <div class="tool-block" data-tool="web_search">
            <div class="tool-block-hd" onclick="this.closest('.tool-block').classList.toggle('open')">
              <span class="tb-icon">&#128269;</span>
              <span class="tb-label">联网搜索</span>
              <span class="tb-ok"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg></span>
              <span class="tb-arrow">&#9656;</span>
            </div>
            <div class="tool-block-body">
              <div class="tb-query">搜索查询：<em>${esc(tr.query || '')}</em></div>
              <div class="tb-results">${cards}</div>
            </div>
          </div>`;
      } else if (tr.tool === 'kb_search') {
        let roundsHtml = '';
        for (let ri = 0; ri < (tr.rounds || []).length; ri++) {
          const rd = tr.rounds[ri];
          const hitCards = (rd.hits || []).map((h, i) => {
            const _src = esc((h.source || '').split(/[\/\\]/).pop() || h.source || '');
            const _ci  = h.chunk_index != null ? ` #${h.chunk_index}` : '';
            const _bt  = esc((h.body || '').slice(0, 120));
            return `<div class="tb-result-card">
              <span class="rc-idx">${i+1}.</span>
              <span class="rc-title">${_src}${_ci}</span>
              <span class="rc-url">${esc(h.kb_name || '')}</span>
              <span class="rc-body">${_bt}\u2026</span>
            </div>`;
          }).join('');
          roundsHtml += `
            <div class="tb-round">
              <div class="tb-round-hd" onclick="this.closest('.tb-round').classList.toggle('open')">
                <span style="opacity:.7;font-size:11px">&#128269;</span>
                <span class="tb-round-label">第${ri+1}轮 &middot; ${esc(rd.query || '')}</span>
                <span class="tb-round-sub">${esc(rd.kb_name || '')} &rarr; ${rd.hit_count || 0} 条</span>
                <span class="tb-round-arrow">&#9656;</span>
              </div>
              ${hitCards ? `<div class="tb-round-body"><div class="tb-results">${hitCards}</div></div>` : ''}
            </div>`;
        }
        toolBlocksHtml += `
          <div class="tool-block" data-tool="kb_search">
            <div class="tool-block-hd" onclick="this.closest('.tool-block').classList.toggle('open')">
              <span class="tb-icon">&#9744;</span>
              <span class="tb-label">知识库检索</span>
              <span class="tb-ok"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg></span>
              <span class="tb-arrow">&#9656;</span>
            </div>
            <div class="tool-block-body">${roundsHtml}</div>
          </div>`;
      }
    }
    const toolWrap = toolBlocksHtml
      ? `<div class="tool-blocks-wrap">${toolBlocksHtml}</div>`
      : '';

    row.innerHTML = `
      <div class="msg-avatar">${avatarIcon}</div>
      <div class="msg-body">
        ${thinking}
        ${toolWrap}
        <div class="msg-bubble">
          <div class="md">${renderMd(msg.content || '')}</div>
          ${usage}
        </div>
        <div class="msg-actions">
          <button class="msg-act-btn" onclick="copyMsg(this)">复制</button>
          <button class="msg-act-btn" onclick="regenMsg(this,'${esc(msg.id||'')}')">重新生成</button>
          <button class="msg-act-btn" onclick="deleteMsg(this,'${esc(msg.id||'')}')">删除</button>
        </div>
      </div>`;
  }
  return row;
}

function copyMsg(btn) {
  const bubble = btn.closest('.msg-body')?.querySelector('.msg-bubble');
  const text = bubble?.innerText || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制', 2000);
  });
}

async function deleteMsg(btn, msgId) {
  if (!msgId || !S.convId) return;
  const row = btn.closest('.msg-row');
  if (!row) return;

  if (row.classList.contains('user')) {
    // 删除整个对话轮次：用户消息 + 该轮所有 AI 版本（含已 stash 的历史版本）
    if (S.streaming && S.streamUserMsgId === msgId) return; // 正在流式时不允许

    // 收集该轮所有 AI 行（向后遍历，遇到下一条用户消息截止）
    const aiRows = [];
    let probe = row.nextElementSibling;
    while (probe && !probe.classList.contains('user')) {
      if (probe.classList.contains('assistant')) aiRows.push(probe);
      probe = probe.nextElementSibling;
    }
    // stash 版本中可能有 display:none 的历史行（已包含在 aiRows 中，因为它们仍是 DOM 兄弟）

    // 从后端逐条删除 AI 消息
    for (const ar of aiRows) {
      const aid = ar.dataset.msgId;
      if (aid) await api().delete_message(S.convId, aid);
    }
    // 删除用户消息
    await api().delete_message(S.convId, msgId);

    // 清理 JS 状态
    delete S.turnVersions[msgId];
    delete S._verChoice[msgId];

    // 移除 DOM 元素
    for (const ar of aiRows) ar.remove();
    row.remove();
  } else {
    // AI 消息：只删这一条
    await api().delete_message(S.convId, msgId);
    row.remove();
  }
}

// 取消行专用：删除（无 aiMsgId 可删后端，仅移除 DOM 和版本状态）
function deleteCancelledMsg(btn) {
  const row = btn.closest('.msg-row');
  if (!row) return;
  const uid = row.dataset.cancelledForUser;
  if (uid && S.turnVersions[uid]) {
    const idx = S.turnVersions[uid].findIndex(v => v.row === row);
    if (idx !== -1) S.turnVersions[uid].splice(idx, 1);
    // 仅剩 1 条时移除版本导航栏，变回普通单条消息
    if (S.turnVersions[uid].length === 1) {
      S.turnVersions[uid][0].row.querySelector('.ver-nav-bar')?.remove();
      delete S.turnVersions[uid];
    } else if (S.turnVersions[uid].length === 0) {
      delete S.turnVersions[uid];
    }
    delete S._verChoice[uid];
  }
  row.remove();
}

// 取消行专用：重新生成（删除取消行，重跑同一用户问题）
async function regenCancelledMsg(btn) {
  if (S.streaming || !S.convId) return;
  const row = btn.closest('.msg-row');
  if (!row) return;
  const uid = row.dataset.cancelledForUser;
  const userRow = uid ? document.querySelector(`.msg-row.user[data-msg-id="${uid}"]`) : null;
  const userText = userRow?.querySelector('.msg-bubble')?.innerText?.trim() || '';
  if (!userText) return;
  deleteCancelledMsg(btn); // 先清理 DOM 和版本状态
  S._regenUserMsgId = uid || null;
  document.getElementById('msgInput').value = userText;
  sendMessage();
}

async function regenMsg(btn, msgId) {
  if (S.streaming || !S.convId || !msgId) return;
  const aiRow = btn.closest('.msg-row');
  if (!aiRow) return;

  // Find the nearest user message row above this AI response
  let userRow = aiRow.previousElementSibling;
  while (userRow && !userRow.classList.contains('user')) {
    userRow = userRow.previousElementSibling;
  }
  if (!userRow) return;

  const userMsgId = userRow.dataset.msgId;
  const userText  = userRow.querySelector('.msg-bubble')?.innerText?.trim() || '';
  if (!userText) return;

  // Delete only the AI message from backend; keep the user message
  await api().delete_message(S.convId, msgId);

  // Stash this version (hidden) for version navigation
  // 防止重复 push：aiRow 可能已经在 turnVersions 里（第二次 regen 同一行时）
  if (!S.turnVersions[userMsgId]) S.turnVersions[userMsgId] = [];
  if (!S.turnVersions[userMsgId].some(v => v.row === aiRow)) {
    S.turnVersions[userMsgId].push({ row: aiRow, msgId });
  }
  aiRow.classList.add('ver-hidden');

  // Clear manual choice so the new version auto-shows after stream finishes
  delete S._verChoice[userMsgId];
  // Trigger a new stream - skip re-saving the user message
  S._regenUserMsgId = userMsgId;
  document.getElementById('msgInput').value = userText;
  sendMessage();
}

/* ── Version navigation (‹ n / N ›) ─────────────────────────────────────── */

// 用户消息下方"重新发送"按钮：找到对应的 AI 行，复用 regenMsg 逻辑
async function regenFromUserMsg(btn, userMsgId) {
  if (S.streaming || !S.convId) return;
  const userRow = btn.closest('.msg-row');
  if (!userRow) return;
  const userText = userRow.querySelector('.msg-bubble')?.innerText?.trim() || '';
  if (!userText) return;

  // 向后查找紧接着的 AI 行（遇到下一条用户消息截止）
  let aiRow = null;
  let probe = userRow.nextElementSibling;
  while (probe) {
    if (probe.classList.contains('user')) break;
    if (probe.classList.contains('assistant')) { aiRow = probe; break; }
    probe = probe.nextElementSibling;
  }

  if (aiRow) {
    const aiMsgId = aiRow.dataset.msgId;
    if (!aiMsgId) return; // 仍在流式中，无法操作
    const fakeBtn = { closest: () => aiRow };
    regenMsg(fakeBtn, aiMsgId);
  } else {
    // 无 AI 回复，直接重发
    S._regenUserMsgId = userMsgId;
    document.getElementById('msgInput').value = userText;
    sendMessage();
  }
}

// Called after a new regen response finishes streaming.
// Ensures every version row has a .ver-nav-bar at the top of its .msg-body.
function _attachVersionNav(userMsgId) {
  const versions = S.turnVersions[userMsgId];
  if (!versions || versions.length < 2) return;
  // Respect user’s manual choice if still valid; otherwise show latest
  const choice = S._verChoice[userMsgId];
  const currentIdx = (typeof choice === 'number' && choice < versions.length) ? choice : versions.length - 1;
  versions.forEach((v, i) => {
    v.row.classList.toggle('ver-hidden', i !== currentIdx);
    _refreshVerNavBar(v.row, userMsgId, i, versions.length);
  });
}

// Create or update the .ver-nav-bar at the TOP of an AI row's .msg-body.
function _refreshVerNavBar(aiRow, userMsgId, idx, total) {
  const msgBody = aiRow.querySelector('.msg-body');
  if (!msgBody) return;
  let nav = msgBody.querySelector('.ver-nav-bar');
  if (!nav) {
    nav = document.createElement('div');
    nav.className = 'ver-nav-bar';
    msgBody.insertBefore(nav, msgBody.firstChild);
  }
  // userMsgId 始终是 "msg_" + hex，不含单引号，可安全嵌入 onclick 属性
  const prev = idx > 0       ? `onclick="_switchVersion('${userMsgId}',${idx - 1})"` : 'disabled';
  const next = idx < total-1 ? `onclick="_switchVersion('${userMsgId}',${idx + 1})"` : 'disabled';
  nav.innerHTML =
    `<button class="ver-nav-btn" ${prev}>‹</button>` +
    `<span>${idx + 1}\u00a0/\u00a0${total}</span>` +
    `<button class="ver-nav-btn" ${next}>›</button>`;
}

// Switch to the target version index for a given user turn.
// Also works during streaming: the streaming row is treated as the last implicit version.
function _switchVersion(userMsgId, targetIdx) {
  const versions = S.turnVersions[userMsgId];
  if (!versions) return;

  // The streaming row (if active for this turn) counts as an extra version at the end
  const isStreamingThisTurn = S.streaming && S.streamUserMsgId === userMsgId && S.streamMsgEl;
  const totalCount  = versions.length + (isStreamingThisTurn ? 1 : 0);
  const streamingIdx = versions.length; // index of the streaming row

  if (targetIdx < 0 || targetIdx >= totalCount) return;

  // Remember user’s manual selection
  S._verChoice[userMsgId] = targetIdx;

  // Show/hide committed versions
  versions.forEach((v, i) => {
    const show = (i === targetIdx);
    v.row.classList.toggle('ver-hidden', !show);
    if (show) _refreshVerNavBar(v.row, userMsgId, i, totalCount);
  });

  // Show/hide the currently-streaming row
  if (isStreamingThisTurn) {
    S.streamMsgEl.classList.toggle('ver-hidden', targetIdx !== streamingIdx);
  }
}

/* ── Send message ────────────────────────────────────────────────────────── */
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || S.streaming) return;

  // Ensure conversation exists
  if (!S.convId) {
    const conv = await api().new_conversation();
    S.convs.unshift(conv);
    S.convId = conv.id;
    renderConvList();
    updateTitle(conv.title);
    showEmpty(false);
    document.getElementById('headerClearBtn').hidden = false;
  }

  input.value = '';
  input.style.height = 'auto';
  showEmpty(false);

  // Options from toolbar
  const wsActive  = document.getElementById('webSearchBtn').classList.contains('active');
  const dtBtn     = document.getElementById('deepThinkBtn');
  const deepThink = dtBtn && dtBtn.style.display !== 'none' && dtBtn.classList.contains('active');
  const options = {
    tool_web_search: wsActive ? 'true' : undefined,
    kb_names: S.kbNames.length ? S.kbNames : undefined,
    deep_think: deepThink || undefined,
  };
  // Regen mode: skip re-saving the user message (it already exists in the conv)
  let _isRegen = false;
  if (S._regenUserMsgId) {
    options.skip_user_save       = true;
    options.existing_user_msg_id = S._regenUserMsgId;
    _isRegen = true;
    S._regenUserMsgId = null;
  }

  // Append user bubble immediately (skip in regen mode — existing bubble stays)
  if (!_isRegen) {
    const userEntry = { id: null, role: 'user', content: text };
    const userEl = buildMsgEl(userEntry);
    document.getElementById('msgList').appendChild(userEl);
    scrollBottom(true);
  }

  // Lock UI
  S.streaming = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('cancelBtn').classList.add('show');
  input.disabled = true;

  await api().send_message(S.convId, text, options);
}

function cancelStream() {
  if (S.convId) api().cancel_stream(S.convId);
}

function toggleTool(btn) {
  btn.classList.toggle('active');
  // 持久化工具按钮状态
  const id = btn.id;
  if (id) localStorage.setItem('toolActive_' + id, btn.classList.contains('active') ? '1' : '0');
}

/* ── KB selector popup ─────────────────────────────────────────────────────── */
function _updateRagBtn() {
  const btn = document.getElementById('ragBtn');
  if (!btn) return;
  btn.classList.toggle('active', S.kbNames.length > 0);
  btn.title = S.kbNames.length
    ? `知识库检索（已绑定：${S.kbNames.join('、')}）`
    : '知识库检索';
}

async function kbSelectorToggle() {
  const popup = document.getElementById('kbSelectorPopup');
  if (popup.style.display !== 'none') { kbSelectorClose(); return; }

  // 加载所有知识库
  const list = document.getElementById('kbSelList');
  list.innerHTML = '<div class="kb-sel-empty">加载中…</div>';
  popup.style.display = 'block';

  const cols = await api().kb_list();
  if (!cols || !cols.length) {
    list.innerHTML = '<div class="kb-sel-empty">暂无知识库，请先在设置中导入文档</div>';
    return;
  }
  list.innerHTML = cols.map(c => {
    const checked = S.kbNames.includes(c.display_name) ? 'checked' : '';
    const nm = esc(c.display_name);
    return `<label class="kb-sel-item">
      <input type="checkbox" value="${nm}" ${checked}>
      <span title="${nm}">${nm}</span>
      <span style="color:var(--muted);font-size:11px;margin-left:auto;flex-shrink:0">${c.count}块</span>
    </label>`;
  }).join('');

  // 点击外部关闭
  setTimeout(() => document.addEventListener('click', _kbSelOutside, { once: true }), 0);
}

function _kbSelOutside(e) {
  const popup = document.getElementById('kbSelectorPopup');
  if (popup && !popup.contains(e.target) && e.target.id !== 'ragBtn') {
    popup.style.display = 'none';
  }
}

function kbSelectorClose() {
  document.getElementById('kbSelectorPopup').style.display = 'none';
  document.removeEventListener('click', _kbSelOutside);
}

async function kbSelectorSave() {
  const checks = document.querySelectorAll('#kbSelList input[type=checkbox]:checked');
  S.kbNames = Array.from(checks).map(c => c.value);
  kbSelectorClose();
  _updateRagBtn();
  // 持久化到对话 JSON（对话不存在时跳过，发消息时会随 options 传入）
  if (S.convId) {
    await api().conv_set_kb_names(S.convId, S.kbNames);
  }
}

function insertTip(el) {
  document.getElementById('msgInput').value = el.textContent;
  document.getElementById('msgInput').focus();
}

/* ── Streaming callbacks (called from Python via evaluate_js) ─────────────── */
window.__onStreamEvent = function(event) {
  const { type, conv_id } = event;

  switch (type) {

    case 'start': {
      if (conv_id !== S.convId) break;
      // Remove any pre-stream status indicator
      document.getElementById('preStreamStatus')?.remove();
      // Create assistant bubble placeholder
      const row = document.createElement('div');
      row.className = 'msg-row assistant';
      row.innerHTML = `
        <div class="msg-avatar">A</div>
        <div class="msg-body">
          <div class="msg-bubble">
            <div class="md stream-content"></div>
          </div>
        </div>`;
      document.getElementById('msgList').appendChild(row);
      S.streamMsgEl      = row;
      S.streamContentEl  = row.querySelector('.stream-content');
      S.streamThinkBlock = null;  // created lazily on first reasoning_chunk
      S.streamReasonEl   = null;
      // tool blocks container: inserted before the bubble
      const _toolsCont = document.createElement('div');
      _toolsCont.className = 'tool-blocks-wrap';
      row.querySelector('.msg-body').insertBefore(_toolsCont, row.querySelector('.msg-bubble'));
      S.toolBlocksEl     = _toolsCont;
      // hide bubble until first content arrives
      row.querySelector('.msg-bubble').hidden = true;
      S.streamBuf        = '';
      S.reasonBuf        = '';
      S.streamModel      = event.model || '';
      S.streamUserMsgId  = event.user_message_id || null;
      // Backfill the user row's data-msg-id if it was just created without one
      // (sendMessage builds user rows with id=null before the backend assigns an id)
      if (S.streamUserMsgId) {
        const _rows = Array.from(document.getElementById('msgList').querySelectorAll('.msg-row.user'));
        const _lastUser = _rows[_rows.length - 1];
        if (_lastUser && !_lastUser.dataset.msgId) {
          _lastUser.dataset.msgId = S.streamUserMsgId;
        }
      }
      // Regen: insert provisional version nav bar ABOVE tool blocks immediately on stream start
      if (S.streamUserMsgId && S.turnVersions[S.streamUserMsgId]?.length > 0) {
        const _vIdx   = S.turnVersions[S.streamUserMsgId].length; // 0-based index of this new response
        const _vTotal = _vIdx + 1;
        // streamUserMsgId 始终是 "msg_" + hex，单引号包裹可安全嵌入 onclick
        const _uid    = S.streamUserMsgId;
        const _vNav   = document.createElement('div');
        _vNav.className = 'ver-nav-bar';
        _vNav.innerHTML =
          `<button class="ver-nav-btn" onclick="_switchVersion('${_uid}',${_vIdx - 1})">&#8249;</button>` +
          `<span>${_vIdx + 1} / ${_vTotal}…</span>` +
          `<button class="ver-nav-btn" disabled>&#8250;</button>`;
        row.querySelector('.msg-body').insertBefore(_vNav, _toolsCont);
      }
      // 预插入占位按钮：流式期间复制可用，其余等流式结束后激活
      const _phActs = document.createElement('div');
      _phActs.className = 'msg-actions';
      _phActs.innerHTML =
        `<button class="msg-act-btn" onclick="copyMsg(this)">复制</button>` +
        `<button class="msg-act-btn" disabled>重新生成</button>` +
        `<button class="msg-act-btn" disabled>删除</button>`;
      row.querySelector('.msg-body').appendChild(_phActs);
      S.streamContentEl.innerHTML = '';
      scrollBottom(true);
      break;
    }

    case 'status': {
      if (conv_id !== S.convId) break;
      if (S.streamMsgEl) {
        // Stream already started — show chip inside the bubble
        let chip = S.streamMsgEl.querySelector('.status-chip');
        if (!chip) {
          chip = document.createElement('div');
          chip.className = 'status-chip';
          S.streamMsgEl.querySelector('.msg-body').insertBefore(
            chip, S.streamMsgEl.querySelector('.msg-bubble')
          );
        }
        chip.innerHTML = `<div class="spinner"></div>${esc(event.text)}`;
      } else {
        // Before stream starts — show a standalone pre-stream row
        let statusRow = document.getElementById('preStreamStatus');
        if (!statusRow) {
          statusRow = document.createElement('div');
          statusRow.id = 'preStreamStatus';
          statusRow.className = 'msg-row assistant';
          statusRow.innerHTML = '<div class="msg-avatar">A</div><div class="msg-body"><div class="status-chip"><div class="spinner"></div><span></span></div></div>';
          document.getElementById('msgList').appendChild(statusRow);
        }
        statusRow.querySelector('span').textContent = event.text;
        scrollBottom();
      }
      break;
    }

    case 'tool_start': {
      if (conv_id !== S.convId || !S.toolBlocksEl) break;
      const _TOOL_META = {
        web_search: {
          label: '联网搜索',
          icon: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><circle cx="5.5" cy="5.5" r="4"/><line x1="8.5" y1="8.5" x2="12" y2="12"/></svg>'
        },
        kb_search: {
          label: '知识库检索',
          icon: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><rect x="2" y="1" width="10" height="12" rx="1"/><line x1="4" y1="5" x2="10" y2="5"/><line x1="4" y1="8" x2="8" y2="8"/></svg>'
        },
        rag: {
          label: '知识库检索',
          icon: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><rect x="2" y="1" width="10" height="12" rx="1"/><line x1="4" y1="5" x2="10" y2="5"/><line x1="4" y1="8" x2="8" y2="8"/></svg>'
        },
      };
      const _meta = _TOOL_META[event.tool] || { label: event.tool, icon: '⚙️' };
      const _block = document.createElement('div');
      _block.className = 'tool-block';
      _block.dataset.tool = event.tool;
      _block.innerHTML = `
        <div class="tool-block-hd" onclick="this.closest('.tool-block').classList.toggle('open')">
          <span class="tb-icon" style="opacity:.65;display:flex;align-items:center">${_meta.icon}</span>
          <span class="tb-label">${_meta.label}</span>
          <div style="width:11px;height:11px;border:1.5px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0" class="tb-spinner"></div>
          <span class="tb-arrow">▶</span>
        </div>
        <div class="tool-block-body"></div>`;
      S.toolBlocksEl.appendChild(_block);
      scrollBottom();
      break;
    }

    case 'tool_done': {
      if (conv_id !== S.convId || !S.toolBlocksEl) break;
      const _b = S.toolBlocksEl.querySelector(`.tool-block[data-tool="${event.tool}"]`);
      if (!_b) break;
      _b.querySelector('.tb-spinner')?.remove();
      const _hd = _b.querySelector('.tool-block-hd');
      const _ok = document.createElement('span');
      _ok.className = 'tb-ok';
      _ok.innerHTML = '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg>';
      _hd.insertBefore(_ok, _hd.querySelector('.tb-arrow'));
      if (event.results && event.results.length) {
        const _body = _b.querySelector('.tool-block-body');
        if (event.tool === 'web_search') {
          const _q = esc(event.query || '');
          const _cards = event.results.map((r, i) => {
            const _url = r.url || '';
            const _title = esc((r.title || '未知标题').slice(0, 46));
            const _domain = _url.replace(/^https?:\/\//, '').split('/')[0].replace(/^www\./, '').split('?')[0];
            return `<div class="tb-result-card" onclick="window.open(${JSON.stringify(_url)},'_blank')">
              <span class="rc-idx">${i+1}.</span><span class="rc-title">${_title}</span>
              <span class="rc-url">${esc(_domain || _url)}</span>
            </div>`;
          }).join('');
          _body.innerHTML = `<div class="tb-query">搜索查询：<em>${_q}</em></div><div class="tb-results">${_cards}</div>`;
        } else if (event.tool === 'kb_search') {
          const _cards = event.results.map((r, i) => {
            const _kb  = esc(r.kb_name || '');
            const _src = esc((r.source || '').split(/[\\/]/).pop() || r.source || '');
            const _ci  = r.chunk_index != null ? ` #${r.chunk_index}` : '';
            const _body_text = esc((r.body || '').slice(0, 120));
            return `<div class="tb-result-card">
              <span class="rc-idx">${i+1}.</span>
              <span class="rc-title">${_src}${_ci}</span>
              <span class="rc-url">${_kb}</span>
              <span class="rc-body">${_body_text}…</span>
            </div>`;
          }).join('');
          // 用 appendChild 追加结果卡片，保留已有的 .tb-round 搜索轮次块
          const _resultsDiv = document.createElement('div');
          _resultsDiv.className = 'tb-results';
          _resultsDiv.innerHTML = _cards;
          _body.appendChild(_resultsDiv);
        } else if (event.tool === 'rag') {
          _body.innerHTML = `<div class="tb-query">已召回 <em>${event.results.length}</em> 个相关片段</div>`;
        }
        _b.classList.add('open');
      }
      scrollBottom();
      break;
    }

    case 'tool_error': {
      if (conv_id !== S.convId || !S.toolBlocksEl) break;
      const _be = S.toolBlocksEl.querySelector(`.tool-block[data-tool="${event.tool}"]`);
      if (_be) {
        _be.querySelector('.tb-spinner')?.remove();
        const _he = _be.querySelector('.tool-block-hd');
        const _ee = document.createElement('span');
        _ee.className = 'tb-err';
        _ee.textContent = '✗';
        _he.insertBefore(_ee, _he.querySelector('.tb-arrow'));
        if (event.error) {
          const _bdy = _be.querySelector('.tool-block-body');
          _bdy.innerHTML = `<div class="tb-query" style="color:var(--danger)">${esc(event.error)}</div>`;
          _be.classList.add('open');
        }
      }
      break;
    }

    case 'kb_tool_done': {
      // 每次 search_kb 调用追加一个可折叠小工具块到 kb_search 工具块 body
      if (conv_id !== S.convId || !S.toolBlocksEl) break;
      const _kb_b = S.toolBlocksEl.querySelector('.tool-block[data-tool="kb_search"]');
      if (!_kb_b) break;
      const _kb_body = _kb_b.querySelector('.tool-block-body');
      const _roundNum = _kb_body.querySelectorAll('.tb-round').length + 1;
      const _hit    = event.hit_count || 0;
      const _hits   = event.hits || [];
      let _cardsHtml = '';
      if (_hits.length) {
        _cardsHtml = `<div class="tb-results">` +
          _hits.map((h, i) => {
            const _src = esc((h.source || '').split(/[\/\\]/).pop() || h.source || '');
            const _ci  = h.chunk_index != null ? ` #${h.chunk_index}` : '';
            const _bt  = esc((h.body || '').slice(0, 120));
            return `<div class="tb-result-card">` +
              `<span class="rc-idx">${i+1}.</span>` +
              `<span class="rc-title">${_src}${_ci}</span>` +
              `<span class="rc-url">${esc(h.kb_name || '')}</span>` +
              `<span class="rc-body">${_bt}\u2026</span>` +
              `</div>`;
          }).join('') +
        `</div>`;
      }
      const _round  = document.createElement('div');
      _round.className = 'tb-round';
      _round.innerHTML =
        `<div class="tb-round-hd" onclick="this.closest('.tb-round').classList.toggle('open')">` +
          `<span style="opacity:.7;font-size:11px">&#128269;</span>` +
          `<span class="tb-round-label">第${_roundNum}轮 &middot; ${esc(event.query || '')}</span>` +
          `<span class="tb-round-sub">${esc(event.kb_name || '')} &rarr; ${_hit} 条</span>` +
          `<span class="tb-round-arrow">&#9656;</span>` +
        `</div>` +
        (_cardsHtml ? `<div class="tb-round-body">${_cardsHtml}</div>` : '');
      _kb_body.appendChild(_round);
      _kb_b.classList.add('open');
      scrollBottom();
      break;
    }

    case 'fallback_notice': {
      // 工具调用失败时在消息顶部插一行提示
      if (conv_id !== S.convId || !S.streamContentEl) break;
      const _fn = document.createElement('div');
      _fn.className = 'fallback-notice';
      _fn.textContent = event.message || '知识库检索不可用，已直接回答';
      S.streamContentEl.insertBefore(_fn, S.streamContentEl.firstChild);
      break;
    }

    case 'reasoning_chunk': {
      if (conv_id !== S.convId) break;
      // Create think-block lazily so it appears AFTER any tool blocks already in the stream
      if (!S.streamThinkBlock && S.toolBlocksEl) {
        const _tb = document.createElement('div');
        _tb.className = 'think-block';
        _tb.innerHTML = `
          <div class="think-header" onclick="this.closest('.think-block').classList.toggle('open')">
            <span class="think-arrow" style="margin-left:0;margin-right:4px">▶</span><span class="think-title">思考中…</span>
          </div>
          <div class="think-body"></div>`;
        S.toolBlocksEl.appendChild(_tb);
        S.streamThinkBlock = _tb;
        S.streamReasonEl   = _tb.querySelector('.think-body');
      }
      if (!S.streamReasonEl) break;
      S.reasonBuf += event.text;
      S.streamReasonEl.textContent = S.reasonBuf;
      scrollBottom();
      break;
    }

    case 'content_chunk': {
      if (conv_id !== S.convId || !S.streamContentEl) break;
      // Remove status chip once content starts
      S.streamMsgEl?.querySelector('.status-chip')?.remove();
      // Show bubble on first chunk
      const _bubble = S.streamMsgEl?.querySelector('.msg-bubble');
      if (_bubble && _bubble.hidden) _bubble.hidden = false;
      S.streamBuf += event.text;
      // 流式实时 markdown 渲染（用轻量 streamRenderer，跳过 hljs）
      const _renderFn = window._markedStream || (t => '<pre>' + esc(t) + '</pre>');
      try {
        S.streamContentEl.innerHTML = _renderFn(S.streamBuf);
      } catch(e) {
        S.streamContentEl.innerHTML = esc(S.streamBuf);
      }
      // 追加光标到末尾元素内
      const _cur = document.createElement('span');
      _cur.className = 'cursor';
      _cur.textContent = '▋';
      S.streamContentEl.appendChild(_cur);
      scrollBottom();
      break;
    }

    case 'done':
    case 'cancelled': {
      if (conv_id !== S.convId) break;
      _finalizeStream(event.usage, event.model, event.message_id);
      break;
    }

    case 'error': {
      if (S.streamContentEl) {
        // Error mid-stream: replace content with a plain notice
        S.streamContentEl.innerHTML = `⚠ ${esc(event.message)}`;
        S.streamMsgEl?.querySelector('.status-chip')?.remove();
      } else {
        // No stream started: show as a neutral system row (not red !)
        const row = document.createElement('div');
        row.className = 'msg-row system';
        row.innerHTML = `<div class="msg-avatar">⚠</div>
          <div class="msg-body"><div class="msg-bubble">${esc(event.message)}</div></div>`;
        document.getElementById('msgList').appendChild(row);
      }
      _finalizeStream();
      break;
    }

    case 'title_update': {
      const c = S.convs.find(x => x.id === conv_id);
      if (c) c.title = event.title;
      renderConvList();
      if (conv_id === S.convId) updateTitle(event.title);
      break;
    }
  }
};

// 批量流式事件处理器（由 desktop_app.py _stream_thread 30ms 节流调用）
window.__onStreamBatch = function(events) {
  for (const ev of events) window.__onStreamEvent(ev);
};

function _finalizeStream(usage, model, aiMsgId) {
  // Render markdown on final content
  if (S.streamContentEl) {
    const mdEl = S.streamContentEl;
    mdEl.innerHTML = renderMd(S.streamBuf) || '';
    // Append usage footer inside the bubble
    const mdModel = model || S.streamModel || '';
    if (usage && usage.total_tokens) {
      const foot = document.createElement('span');
      foot.style.cssText = 'font-size:11px;color:var(--muted);margin-top:6px;display:inline-block';
      foot.textContent = (mdModel ? mdModel + ' · ' : '') + usage.total_tokens + ' tokens';
      mdEl.closest('.msg-bubble')?.appendChild(foot);
    }
    // Mark think block as done
    if (S.streamThinkBlock && !S.streamThinkBlock.hidden) {
      const tt = S.streamThinkBlock.querySelector('.think-title');
      if (tt) tt.textContent = '思考过程';
    }
  }

  // 清理未完成的工具块 spinner（如 KB 搜索期间用户取消）
  S.toolBlocksEl?.querySelectorAll('.tb-spinner').forEach(s => s.remove());

  // 激活/更新动作按钮
  if (S.streamMsgEl) {
    const msgBody = S.streamMsgEl.querySelector('.msg-body');
    // 取到流式期间预插入的占位 msg-actions，或新建
    let actions = msgBody?.querySelector('.msg-actions');
    if (!actions) {
      actions = document.createElement('div');
      actions.className = 'msg-actions';
      msgBody?.appendChild(actions);
    }
    const _uId = S.streamUserMsgId;
    if (aiMsgId) {
      S.streamMsgEl.dataset.msgId = aiMsgId;
      actions.innerHTML =
        `<button class="msg-act-btn" onclick="copyMsg(this)">复制</button>` +
        `<button class="msg-act-btn" onclick="regenMsg(this,'${aiMsgId}')">重新生成</button>` +
        `<button class="msg-act-btn" onclick="deleteMsg(this,'${aiMsgId}')">删除</button>`;
      // Version navigation: link this response to prior regen versions
      if (_uId && S.turnVersions[_uId] && S.turnVersions[_uId].length > 0) {
        S.turnVersions[_uId].push({ row: S.streamMsgEl, msgId: aiMsgId });
        _attachVersionNav(_uId);
      }
    } else {
      // 已取消：标记父用户消息 ID，供 regenCancelledMsg/deleteCancelledMsg 使用
      if (_uId) S.streamMsgEl.dataset.cancelledForUser = _uId;
      actions.innerHTML =
        `<button class="msg-act-btn" onclick="copyMsg(this)">复制</button>` +
        `<button class="msg-act-btn" onclick="regenCancelledMsg(this)">重新生成</button>` +
        `<button class="msg-act-btn" onclick="deleteCancelledMsg(this)">删除</button>`;
      // 若是 regen 取消，必须把取消行注册到 turnVersions，
      // 否则 _switchVersion 切到旧版本时无法隐藏该行，导致两行同时可见
      if (_uId && S.turnVersions[_uId]?.length > 0) {
        if (!S.turnVersions[_uId].some(v => v.row === S.streamMsgEl)) {
          S.turnVersions[_uId].push({ row: S.streamMsgEl, msgId: null });
        }
        // 保持显示取消行为当前版本（用户可用 ‹ 切回旧版本）
        S._verChoice[_uId] = S.turnVersions[_uId].length - 1;
        _attachVersionNav(_uId);
      }
    }
  }

  S.streamMsgEl      = null;
  S.streamContentEl  = null;
  S.streamThinkBlock = null;
  S.streamReasonEl   = null;
  S.toolBlocksEl     = null;
  S.streamUserMsgId  = null;
  document.getElementById('preStreamStatus')?.remove();
  S.smoothBuf        = '';
  S.reasonBuf        = '';
  S.streaming        = false;

  // Unlock UI
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('cancelBtn').classList.remove('show');
  document.getElementById('msgInput').disabled = false;
  document.getElementById('msgInput').focus();

  // Refresh conv list (message_count / updated_at)
  loadConvs().then(() => {
    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === S.convId);
    });
  });
}

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  status.innerHTML = '';
  await _doSaveConfig(false);

    if (!res.ok) {
      status.innerHTML = `<span style="color:var(--danger)">✗ ${esc(res.message || '连接失败')}</span>`;
      btn.disabled = false; spinner.style.display = 'none'; return;

    status.innerHTML = `<span style="color:var(--danger)">✗ ${esc(String(e))}</span>`;
    btn.disabled = false; spinner.style.display = 'none'; return;
  }
  try {
    const models = await api().list_upstream_models();
    const pid    = document.getElementById('sPickedProvider').value || 'deepseek';
    _fetchedModels[pid] = models;
    _populateModelDropdown(models, document.getElementById('sModel').value);
    status.innerHTML = `<span style="color:var(--green)">✓ 已获取 ${models.length} 个模型</span>`;
  } catch (_) {
    status.innerHTML = `<span style="color:var(--muted)">已连接，但获取模型列表失败</span>`;
  } finally {
    btn.disabled = false; spinner.style.display = 'none';
  }
}

async function _doSaveConfig(close=true) {
  const pid     = document.getElementById('sPickedProvider').value || 'deepseek';
  const baseUrl = pid === 'custom'
    ? document.getElementById('sBaseUrl').value.trim()
    : (PROVIDER_URLS[pid] || '');
  const updates = {
    provider:          pid,
    upstream_base_url: baseUrl,
    api_key:           document.getElementById('sApiKey').value.trim(),
    model:             document.getElementById('sModel').value.trim(),
    temperature:       parseFloat(document.getElementById('sTemp').value),
    system_prompt:     document.getElementById('sSystemPrompt').value.trim(),
    tool_web_search:        document.getElementById('sWebSearch').value,
    tool_web_search_engine: document.getElementById('sWebEngine').value,
    tool_tavily_key:        document.getElementById('sTavilyKey').value.trim(),
    tool_bing_key:          document.getElementById('sBingKey').value.trim(),
    tool_brave_key:         document.getElementById('sBraveKey').value.trim(),
    tool_serp_key:          document.getElementById('sSerpKey').value.trim(),
    tool_rag:               document.getElementById('sRag').checked,
  };
  await api().save_config(updates);
  updateModelSelector(updates.model);
  if (close) closeSettings();
}

function updateModelSelector(model) {
  const wrap  = document.getElementById('modelSelectorWrap');
  const label = document.getElementById('modelSelectorLabel');
  if (model) {
    label.textContent = model;
    wrap.style.display = '';
    document.querySelectorAll('.model-dropdown-item').forEach(el => {
      el.classList.toggle('active', el.dataset.model === model);
    });
  } else {
    wrap.style.display = 'none';
  }
}

function _populateModelDropdown(models, curModel) {
  const dd = document.getElementById('modelDropdown');
  dd.innerHTML = '';
  if (!models.length) { dd.innerHTML = '<div class="model-dropdown-empty">暂无可用模型</div>'; return; }
  for (const m of models) {
    const el = document.createElement('div');
    el.className   = 'model-dropdown-item' + (m === curModel ? ' active' : '');
    el.dataset.model = m;
    el.textContent  = m;
    el.onclick = () => {
      const pid = document.getElementById('sPickedProvider')?.value || 'deepseek';
      _pickFromPicker(pid, m);
      api().save_config({ model: m });
      closeModelDropdown();
    };
    dd.appendChild(el);
  }
}

function toggleModelDropdown(e) {
  e.stopPropagation();
  document.getElementById('modelDropdown').classList.toggle('open');
}

function closeModelDropdown() {
  document.getElementById('modelDropdown').classList.remove('open');
}

  const source = document.getElementById('mSource')?.value.trim();
  const al = document.getElementById('memAlert');
  if (!text) { if (al) al.innerHTML = '<div class="alert alert-err">请输入内容</div>'; return; }
  const res = await api().add_to_memory(text, title, source);
  if (res.ok) {
    if (al) al.innerHTML = '<div class="alert alert-ok">✓ 已添加到知识库</div>';
  } else {
    if (al) al.innerHTML = `<div class="alert alert-err">✗ ${esc(res.error)}</div>`;
  }
  setTimeout(() => { if (al) al.innerHTML = ''; }, 4000);
}

/* ── 知识库管理 ───────────────────────────────────────────────────────────── */
let _kbTargetName = null;   // null=新建  string=追加到已有集合
let _kbEmbedModel  = 'BAAI/bge-small-zh-v1.5';
let _kbFiles       = [];    // [{path, status:'pending'|'loading'|'done'|'error', chunks, addedAt, error}]

function kbShowAddForm(colName, evt) {
  if (evt) evt.stopPropagation();
  _kbTargetName = colName;
  _kbFiles = [];
  kbRenderFileList();
  document.getElementById('kbAlert').innerHTML = '';
  document.getElementById('kbUrl').value = '';
  const title = document.getElementById('kbAddFormTitle');
  if (colName) {
    title.textContent = `导入文档到"${colName}"`;
    document.getElementById('kbStep1').hidden = true;
    document.getElementById('kbStep2').hidden = false;
  } else {
    title.textContent = '新建知识库';
    document.getElementById('kbAddName').value = '';
    document.getElementById('kbEmbedModel').value = 'BAAI/bge-small-zh-v1.5';
    document.getElementById('kbStep1Alert').innerHTML = '';
    document.getElementById('kbStep1').hidden = false;
    document.getElementById('kbStep2').hidden = true;
  }
  const form = document.getElementById('kbAddForm');
  form.hidden = false;
  form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function kbNextStep() {
  const name    = document.getElementById('kbAddName').value.trim();
  const alertEl = document.getElementById('kbStep1Alert');
  if (!name) {
    alertEl.innerHTML = `<span style="color:var(--danger)">请填写知识库名称</span>`;
    return;
  }
  alertEl.innerHTML = '';
  _kbEmbedModel = document.getElementById('kbEmbedModel').value;
  document.getElementById('kbAddFormTitle').textContent = `导入文档到"${name}"`;
  document.getElementById('kbStep1').hidden = true;
  document.getElementById('kbStep2').hidden = false;
}

function kbHideAddForm() {
  document.getElementById('kbAddForm').hidden = true;
  _kbTargetName = null;
  _kbFiles = [];
}

/* 拖拽区事件 */
function kbDragOver(e) {
  e.preventDefault();
  document.getElementById('kbDropZone').classList.add('drag-over');
}
function kbDragLeave(e) {
  document.getElementById('kbDropZone').classList.remove('drag-over');
}
function kbDrop(e) {
  e.preventDefault();
  document.getElementById('kbDropZone').classList.remove('drag-over');
  const files   = Array.from(e.dataTransfer.files || []);
  const allowed = ['.txt', '.md', '.pdf', '.docx'];
  files.forEach(f => {
    const ext = f.name.slice(f.name.lastIndexOf('.')).toLowerCase();
    if (allowed.includes(ext) && f.path && !_kbFiles.some(x => x.path === f.path)) {
      _kbFiles.push({ path: f.path, status: 'pending', chunks: 0, addedAt: '', error: '' });
    }
  });
  kbRenderFileList();
  _kbAutoFillName();
}

/* 点击区域 → 打开文件对话框 */
async function kbClickDrop() {
  const paths = await api().open_file_dialog();
  if (!paths || paths.length === 0) return;
  paths.forEach(p => {
    if (p && !_kbFiles.some(x => x.path === p))
      _kbFiles.push({ path: p, status: 'pending', chunks: 0, addedAt: '', error: '' });
  });
  kbRenderFileList();
  _kbAutoFillName();
}

function _kbAutoFillName() {
  if (_kbTargetName) return;
  const nameEl = document.getElementById('kbAddName');
  if (nameEl && !nameEl.value.trim() && _kbFiles.length) {
    const base = _kbFiles[0].path.split(/[/\\]/).pop() || '';
    nameEl.value = base.replace(/\.[^.]+$/, '');
  }
}

function kbRenderFileList() {
  const el = document.getElementById('kbFileList');
  if (!el) return;
  if (_kbFiles.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = _kbFiles.map((f, i) => {
    const name      = f.path.split(/[/\\]/).pop() || f.path;
    const isDone    = f.status === 'done';
    const isLoading = f.status === 'loading';
    const isError   = f.status === 'error';
    const icon      = isDone    ? `<span style="color:var(--green,#2da44e)">&#10003;</span>`
                    : isError   ? `<span style="color:var(--danger)">&#9888;</span>`
                    : '&#128196;';
    const delBtn    = f.status === 'pending'
      ? `<button class="kb-file-row-del" onclick="kbRemoveFile(${i})" title="移除">&times;</button>` : '';
    let below = '';
    if (isLoading) {
      below = `<div class="kb-file-bar"><div class="kb-file-bar-fill loading"></div></div>`;
    } else if (isDone) {
      below = `<div class="kb-file-bar"><div class="kb-file-bar-fill done"></div></div>
               <div class="kb-file-meta">${esc(f.addedAt)} &middot; ${f.chunks} 块</div>`;
    } else if (isError) {
      below = `<div class="kb-file-err">&#10007; ${esc(f.error)}</div>`;
    }
    return `<div class="kb-file-row">
      <div class="kb-file-row-top">
        <span style="font-size:13px;flex-shrink:0">${icon}</span>
        <span class="kb-file-row-name" title="${esc(f.path)}">${esc(name)}</span>
        ${delBtn}
      </div>${below}
    </div>`;
  }).join('');
}

function kbRemoveFile(idx) {
  _kbFiles.splice(idx, 1);
  kbRenderFileList();
}

async function kbIngest() {
  const al   = document.getElementById('kbAlert');
  const btn  = document.getElementById('kbIngestBtn');
  const name = _kbTargetName || document.getElementById('kbAddName').value.trim();
  const url  = document.getElementById('kbUrl').value.trim();
  const embedModel = _kbTargetName ? '' : _kbEmbedModel;
  if (!name && !url) { al.innerHTML = `<span style="color:var(--danger)">请填写知识库名称</span>`; return; }
  if (!_kbFiles.length && !url) { al.innerHTML = `<span style="color:var(--danger)">请选择文件或填写 URL</span>`; return; }
  let allOk = true, totalChunks = 0, kbName = name;
  try {
    btn.disabled = true;
    al.innerHTML = '';
    for (let i = 0; i < _kbFiles.length; i++) {
      if (_kbFiles[i].status !== 'pending') continue;
      _kbFiles[i].status = 'loading';
      kbRenderFileList();
      const res = await api().kb_ingest_file(_kbFiles[i].path, name, embedModel);
      if (res.ok) {
        _kbFiles[i].status  = 'done';
        _kbFiles[i].chunks  = res.chunks || 0;
        _kbFiles[i].addedAt = res.added_at || new Date().toLocaleDateString('zh-CN');
        totalChunks += _kbFiles[i].chunks;
        kbName = res.name;
      } else {
        _kbFiles[i].status = 'error';
        _kbFiles[i].error  = res.error || '导入失败';
        allOk = false;
      }
      kbRenderFileList();
    }
    // URL 导入
    if (url) {
      al.innerHTML = '&#9203; 正在导入 URL…';
      const res = await api().kb_ingest_url(url, name || url, embedModel);
      if (res.ok) { totalChunks += (res.chunks || 0); kbName = res.name; }
      else { allOk = false; al.innerHTML = `<span style="color:var(--danger)">✗ ${esc(res.error)}</span>`; }
    }
    if (allOk) {
      al.innerHTML = totalChunks > 0
        ? `<span style="color:var(--green,#2da44e)">✓ 全部导入完成，共 ${totalChunks} 块</span>`
        : `<span style="color:var(--green,#2da44e)">✓ 导入完成</span>`;
      if (url) document.getElementById('kbUrl').value = '';
      await kbLoadList();
      if (kbName) {
        const sid  = kbSafeId(kbName);
        const body = document.getElementById('kbBody_' + sid);
        const hd   = document.querySelector(`#kbCard_${sid} .kb-card-hd`);
        if (body && body.hidden) { body.hidden = false; if (hd) hd.classList.add('open'); }
        if (body) await kbLoadSources(kbName, sid);
      }
    }
  } catch(e) {
    al.innerHTML = `<span style="color:var(--danger)">✗ ${esc(String(e))}</span>`;
  } finally {
    btn.disabled = false;
  }
}

function kbSafeId(name) {
  return name.replace(/[^a-zA-Z0-9]/g, '_');
}

/* ── 内联导入区（卡片体内嵌） ─────────────────────────────────────────────── */
const _kbInlineFiles = new Map(); // sid → [{path,status,chunks,addedAt,error}]

function kbToggleInline(sid, name, btnEl) {
  if (btnEl) btnEl.blur();
  const el = document.getElementById('kbInline_' + sid);
  if (!el) return;
  const opening = el.hidden;
  el.hidden = !el.hidden;
  if (opening) {
    _kbInlineFiles.set(sid, []);
    kbInlineRenderFiles(sid);
    const al = document.getElementById('kbInlineAlert_' + sid);
    if (al) al.innerHTML = '';
  }
}

function kbHideInline(sid) {
  const el = document.getElementById('kbInline_' + sid);
  if (el) el.hidden = true;
  _kbInlineFiles.delete(sid);
}

function kbInlineDragOver(e, sid) {
  e.preventDefault();
  document.getElementById('kbInlineDrop_' + sid)?.classList.add('drag-over');
}

function kbInlineDragLeave(e, sid) {
  document.getElementById('kbInlineDrop_' + sid)?.classList.remove('drag-over');
}

async function kbInlineDrop(e, sid, name) {
  e.preventDefault();
  document.getElementById('kbInlineDrop_' + sid)?.classList.remove('drag-over');

  // 第一级：标准 dataTransfer.files
  let fileArr = Array.from(e.dataTransfer.files || []);
  // 第二级：部分 WebView2 版本 files 为空但 items 有内容
  if (!fileArr.length && e.dataTransfer.items) {
    fileArr = Array.from(e.dataTransfer.items)
      .filter(i => i.kind === 'file')
      .map(i => i.getAsFile())
      .filter(Boolean);
  }
  // 第三级：WebView2 完全拦截外部拖拽 → 自动弹出原生文件选择框
  if (!fileArr.length) {
    await kbInlineClickDrop(sid, name);
    return;
  }

  const allowed = ['.txt', '.md', '.pdf', '.docx'];
  const cur     = _kbInlineFiles.get(sid) || [];
  fileArr.forEach(f => {
    const ext = f.name.slice(f.name.lastIndexOf('.')).toLowerCase();
    if (!allowed.includes(ext)) return;
    // f.path 在 WebView2 中可能为 undefined（浏览器安全限制），退回到 f.name 作 key
    const key = f.path || f.name;
    if (!cur.some(x => x.path === key))
      cur.unshift({ path: key, _fileObj: f.path ? null : f,
                   status: 'pending', chunks: 0, addedAt: '', error: '', done: 0, total: 0 });
  });
  _kbInlineFiles.set(sid, cur);
  kbInlineRenderFiles(sid);
}

async function kbInlineClickDrop(sid, name) {
  const paths = await api()?.open_file_dialog();
  if (!paths || paths.length === 0) return;
  const cur = _kbInlineFiles.get(sid) || [];
  paths.forEach(p => {
    if (p && !cur.some(x => x.path === p))
      cur.unshift({ path: p, status: 'pending', chunks: 0, addedAt: '', error: '', done: 0, total: 0 });
  });
  _kbInlineFiles.set(sid, cur);
  kbInlineRenderFiles(sid);
}

function kbInlineRenderFiles(sid) {
  const el = document.getElementById('kbInlineFileList_' + sid);
  if (!el) return;
  const files = _kbInlineFiles.get(sid) || [];
  if (files.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = files.map((f, i) => {
    const fname = f.path.split(/[\/\\]/).pop() || f.path;
    let below = '';
    if (f.status === 'loading') {
      if (f.total > 0) {
        const pct = Math.round(f.done / f.total * 100);
        below = `<div class="kb-file-bar"><div class="kb-file-bar-fill" style="width:${pct}%;background:var(--accent);transition:width .25s"></div></div>
                 <div class="kb-file-meta">${f.done} / ${f.total} 块</div>`;
      } else {
        below = `<div class="kb-file-bar"><div class="kb-file-bar-fill loading"></div></div>`;
      }
    } else if (f.status === 'done')
      below = `<div class="kb-file-bar"><div class="kb-file-bar-fill done"></div></div>
               <div class="kb-file-meta">${esc(f.addedAt)} &middot; ${f.chunks} 块</div>`;
    else if (f.status === 'error')
      below = `<div class="kb-file-err">&#10007; ${esc(f.error)}</div>`;
    const delBtn = f.status !== 'loading'
      ? `<button class="kb-file-row-del" onclick="kbInlineRemoveFile('${sid}',${i})" title="移除">&times;</button>` : '';
    return `<div class="kb-file-row">
      <div class="kb-file-row-top">
        ${delBtn}
        <span class="kb-file-row-name" title="${esc(f.path)}">${esc(fname)}</span>
      </div>${below}</div>`;
  }).join('');
}

function kbInlineRemoveFile(sid, idx) {
  const cur = _kbInlineFiles.get(sid) || [];
  cur.splice(idx, 1);
  _kbInlineFiles.set(sid, cur);
  kbInlineRenderFiles(sid);
}

function _fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(r.result.split(',')[1]);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);
  });
}

async function kbInlineIngest(sid, name) {
  const al  = document.getElementById('kbInlineAlert_' + sid);
  const btn = document.getElementById('kbInlineIngestBtn_' + sid);
  const files = _kbInlineFiles.get(sid) || [];
  if (!files.length) {
    if (al) al.innerHTML = '<span style="color:var(--danger)">请选择文件</span>';
    return;
  }
  let allOk = true, totalChunks = 0;
  try {
    if (btn) btn.disabled = true;
    if (al) al.innerHTML = '';
    for (let i = 0; i < files.length; i++) {
      if (files[i].status !== 'pending') continue;
      files[i].status = 'loading';
      kbInlineRenderFiles(sid);
      let res;
      if (files[i]._fileObj) {
        // WebView2 不暴露 file.path —— 读取内容传给 Python 写临时文件
        const b64 = await _fileToBase64(files[i]._fileObj);
        res = await api().kb_ingest_bytes(files[i].path, b64, name, '');
      } else {
        res = await api().kb_ingest_file(files[i].path, name, '');
      }
      if (res.ok) {
        files[i].status  = 'done';
        files[i].chunks  = res.chunks || 0;
        files[i].addedAt = res.added_at || new Date().toLocaleDateString('zh-CN');
        totalChunks += files[i].chunks;
      } else {
        files[i].status = 'error';
        files[i].error  = res.error || '导入失败';
        allOk = false;
      }
      kbInlineRenderFiles(sid);
    }
    if (allOk) {
      if (al) al.innerHTML = totalChunks > 0
        ? `<span style="color:var(--green,#2da44e)">✓ 导入完成，共 ${totalChunks} 块</span>`
        : `<span style="color:var(--green,#2da44e)">✓ 导入完成</span>`;
      await kbLoadList();
      const body = document.getElementById('kbBody_' + sid);
      const hd   = document.querySelector(`#kbCard_${sid} .kb-card-hd`);
      if (body && body.hidden) { body.hidden = false; if (hd) hd.classList.add('open'); }
      if (body) await kbLoadSources(name, sid);
    }
  } catch(e) {
    if (al) al.innerHTML = `<span style="color:var(--danger)">✗ ${esc(String(e))}</span>`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

window.__onKbProgress = function(data) {
  for (const [sid, files] of _kbInlineFiles) {
    const f = files.find(x => x.path === data.path);
    if (f) { f.done = data.done; f.total = data.total; kbInlineRenderFiles(sid); break; }
  }
};

async function kbToggleCard(safeId, name, hdEl) {
  const body = document.getElementById('kbBody_' + safeId);
  if (!body) return;
  const isOpen = !body.hidden;
  body.hidden = isOpen;
  if (hdEl) hdEl.classList.toggle('open', !isOpen);
  if (!isOpen) await kbLoadSources(name, safeId);
}

async function kbLoadSources(name, safeId) {
  const body = document.getElementById('kbBody_' + safeId);
  if (!body) return;
  body.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0">加载中…</div>';
  try {
    const srcs = await api().kb_list_sources(name);
    let html = '';
    if (!srcs || srcs.length === 0) {
      html = '<div style="color:var(--muted);font-size:12px;padding:8px 0">暂无文件记录</div>';
    } else {
      const nameJsonE = esc(JSON.stringify(name));
      html = srcs.map(s => {
        const icon     = s.source && s.source.startsWith('http') ? '🌐' : '📄';
        const dispName = esc(s.name || s.source);
        const srcJsonE = esc(JSON.stringify(s.source));
        const countBadge = `<button class="kb-chunk-badge" onclick="kbShowChunks(${nameJsonE},${srcJsonE},event)">${s.count} 块</button>`;
        const meta     = [s.added_at, countBadge].filter(Boolean).join(' · ');
        return `<div class="kb-src-row">
          <span class="kb-src-icon">${icon}</span>
          <div class="kb-src-info">
            <div class="kb-src-name" title="${esc(s.source)}">${dispName}</div>
            <div class="kb-src-meta">${meta}</div>
          </div>
          <button class="kb-src-del" title="删除此来源的所有块"
            onclick="kbDeleteSrc(${nameJsonE},${srcJsonE},event)">🗑</button>
        </div>`;
      }).join('');
    }
    const nameJsonE = esc(JSON.stringify(name));
    html += `<div class="kb-card-footer">
      <button class="kb-more-btn" onclick="kbToggleInline('${safeId}',${nameJsonE},this)">↑ 导入文档</button>
      <div id="kbInline_${safeId}" hidden class="kb-inline-import">
        <div class="kb-drop-zone" id="kbInlineDrop_${safeId}"
             onclick="kbInlineClickDrop('${safeId}',${nameJsonE})"
             ondragover="kbInlineDragOver(event,'${safeId}')"
             ondragleave="kbInlineDragLeave(event,'${safeId}')"
             ondrop="kbInlineDrop(event,'${safeId}',${nameJsonE})">
          <div class="kb-drop-icon">↑</div>
          <div class="kb-drop-text">拖放文件或点击浏览</div>
          <div class="kb-drop-hint">支持 .txt .md .pdf .docx</div>
        </div>
        <div id="kbInlineFileList_${safeId}" style="margin-top:6px"></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn-primary" id="kbInlineIngestBtn_${safeId}" onclick="kbInlineIngest('${safeId}',${nameJsonE})">开始导入</button>
          <button class="btn-secondary" onclick="kbHideInline('${safeId}')">取消</button>
        </div>
        <div id="kbInlineAlert_${safeId}" style="margin-top:6px;font-size:12px"></div>
      </div>
    </div>`;
    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:8px 0">${esc(String(e))}</div>`;
  }
}

function kbHideChunkModal() {
  document.getElementById('kbChunkModal').style.display = 'none';
}

async function kbShowChunks(nameJson, srcJson, evt) {
  if (evt) evt.stopPropagation();
  const name   = JSON.parse(nameJson);
  const source = JSON.parse(srcJson);
  const modal  = document.getElementById('kbChunkModal');
  const body   = document.getElementById('kbChunkModalBody');
  const title  = document.getElementById('kbChunkModalTitle');
  if (!modal) return;
  const fileName = String(source).split(/[/\\]/).pop() || source;
  title.textContent = fileName + ' — 分块预览';
  body.innerHTML = '<div style="color:var(--muted);padding:12px">加载中…</div>';
  modal.style.display = 'flex';
  try {
    const chunks = await api().kb_peek_chunks(name, source, 100);
    if (!chunks || chunks.length === 0) {
      body.innerHTML = '<div style="color:var(--muted);padding:12px">无分块数据</div>';
      return;
    }
    body.innerHTML = chunks.map((c, i) => {
      const raw     = (c.body || '');
      const preview = raw.slice(0, 100).replace(/\n/g, ' ');
      const isLong  = raw.length > 100;
      return `<div class="kb-chunk-item">
        <span class="kb-chunk-idx">#${c.chunk_index != null ? c.chunk_index : i}</span>
        <span class="kb-chunk-preview">${esc(preview)}${isLong ? '…' : ''}</span>
      </div>`;
    }).join('');
  } catch(e) {
    body.innerHTML = `<div style="color:var(--danger);padding:12px">${esc(String(e))}</div>`;
  }
}

async function kbDeleteSrc(colName, source, evt) {
  if (evt) evt.stopPropagation();
  const display = String(source).split(/[/\\]/).pop() || source;
  if (!confirm(`确认删除"${display}"的所有文本块？`)) return;
  const res = await api().kb_delete_source(colName, source);
  if (res && res.ok !== false) {
    await kbLoadList();
    const sid  = kbSafeId(colName);
    const body = document.getElementById('kbBody_' + sid);
    if (body && !body.hidden) await kbLoadSources(colName, sid);
  }
}

async function kbDeleteCol(name, evt) {
  if (evt) evt.stopPropagation();
  if (!confirm(`确认删除知识库"${name}"？此操作不可撤销。`)) return;
  const res = await api().kb_delete(name);
  if (res.ok) kbLoadList();
}

async function kbLoadList() {
  const el    = document.getElementById('kbColList');
  const empty = document.getElementById('kbEmpty');
  if (!el) return;
  try {
    const cols = await api().kb_list();
    if (!cols || cols.length === 0) {
      el.innerHTML = '';
      if (empty) empty.hidden = false;
      return;
    }
    if (empty) empty.hidden = true;
    // 记住当前展开的卡片
    const openSids = new Set(
      [...document.querySelectorAll('.kb-card-hd.open')].map(h => h.dataset.sid)
    );
    el.innerHTML = cols.map(c => {
      const sid      = kbSafeId(c.display_name);
      const safeName = esc(c.display_name);
      const nameJson = JSON.stringify(c.display_name);
      const isOpen   = openSids.has(sid);
      const nj = esc(nameJson);
      return `<div class="kb-card" id="kbCard_${sid}">
        <div class="kb-card-hd ${isOpen ? 'open' : ''}" data-sid="${sid}"
             onclick="kbToggleCard('${sid}',${nj},this)">
          <span class="kb-chevron">▶</span>
          <span class="kb-card-name" title="${safeName}">${safeName}</span>
          <span class="kb-card-badge">${c.count} 块</span>
          <div class="kb-card-acts" onclick="event.stopPropagation()">
            <button class="btn-danger" style="font-size:11px;padding:2px 8px"
              onclick="kbDeleteCol(${nj},event)">删除</button>
          </div>
        </div>
        <div class="kb-card-body" id="kbBody_${sid}" ${isOpen ? '' : 'hidden'}></div>
      </div>`;
    }).join('');
    // 重新渲染已展开的卡片内容
    for (const sid of openSids) {
      const info = cols.find(c => kbSafeId(c.display_name) === sid);
      if (info) await kbLoadSources(info.display_name, sid);
    }
  } catch(e) {
    el.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:10px 0">${esc(String(e))}</div>`;
  }
}

/* ── Textarea auto-resize + keyboard shortcut ─────────────────────────────── */
const msgInput = document.getElementById('msgInput');
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 200) + 'px';
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.altKey) {
    e.preventDefault();
    sendMessage();
  }
  // Shift+Enter：浏览器默认行为（插入换行），不拦截
});

/* ── Init ─────────────────────────────────────────────────────────────────── */
async function init() {
  setupMarked();
  await loadConvs();
  const cfg = await api().get_config();
  updateModelSelector(cfg.model || '');
  _setPickerDisplay(cfg.provider || 'deepseek', cfg.model || 'deepseek-chat');
  _onProviderChange(cfg.provider || 'deepseek');
  // 恢复工具按钮持久化状态
  for (const id of ['webSearchBtn', 'deepThinkBtn']) {
    const btn = document.getElementById(id);
    if (!btn) continue;
    const saved = localStorage.getItem('toolActive_' + id);
    if (saved === '1') btn.classList.add('active');
    else if (saved === '0') btn.classList.remove('active');
  }
  // If API key missing, open settings
  if (!cfg.api_key) {
    openSettings();
    return;
  }
  // Auto-select most recent conversation
  if (S.convs.length) {
    await selectConv(S.convs[0].id);
  }
}

/* ── Titlebar controls ──────────────────────────────────────────────────── */
let _tbMaximized = false;
function tbToggleMax() {
  _tbMaximized = !_tbMaximized;
  api()?.win_maximize();
  const btn = document.getElementById('tbMaxBtn');
  if (btn) {
    btn.innerHTML = _tbMaximized
      ? `<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x=".5" y="2.5" width="7" height="7"/><path d="M2.5.5h7v7"/></svg>`
      : `<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x=".5" y=".5" width="9" height="9"/></svg>`;
  }
}

if (window.pywebview) {
  init();
} else {
  window.addEventListener('pywebviewready', init);
}
</script>

  <div class="kb-chunk-modal-box" onclick="event.stopPropagation()">

      <span id="kbChunkModalTitle">分块预览</span>
      <button onclick="kbHideChunkModal()" title="关闭">✕</button>
    </div>
    <div id="kbChunkModalBody" class="kb-chunk-modal-body"></div>
  </div>
</div>
