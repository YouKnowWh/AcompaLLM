<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcompaLLM</title>
  <script>
    document.documentElement.style.zoom = 1;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    /* ── Design Tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:         #0d1117;
      --sb-bg:      #161b22;
      --card:       #1c2333;
      --hover:      #21262d;
      --border:     #30363d;
      --accent:     #58a6ff;
      --accent-bg:  rgba(88,166,255,.12);
      --green:      #3fb950;
      --warn:       #f0883e;
      --danger:     #f85149;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --user-bubble:#1a3350;
      --r:          10px;
      --r-sm:       6px;
      --sb-w:       195px;
    }
    html {
      font-size: 15px;
      height: 100%;
    }
    #frame { display: flex; flex-direction: column; height: 100%; }

    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   'Noto Sans CJK SC', 'Noto Sans SC', 'Noto Sans CJK',
                   'WenQuanYi Micro Hei', 'WenQuanYi Zen Hei',
                   'PingFang SC', 'Microsoft YaHei',
                   'Source Han Sans CN',
                   'Noto Color Emoji', 'Segoe UI Emoji', 'Apple Color Emoji',
                   sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.6;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    [hidden] { display: none !important; }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sb-w);
      min-width: 120px;
      max-width: 480px;
      background: var(--sb-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      user-select: none;
      overflow: hidden;
    }
    #resizeHandle {
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background .15s;
      z-index: 20;
      touch-action: none;   /* 防止触摸手势取消 pointer capture */
    }
    #resizeHandle:hover, #resizeHandle.dragging { background: var(--accent); }
    .sb-header {
      padding: 16px 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 20px; }
    .logo-text { font-size: 15px; font-weight: 700; color: var(--accent); }

    #newChatBtn {
      width: 32px; height: 32px;
      background: var(--accent-bg);
      border: 1px solid rgba(88,166,255,.25);
      border-radius: var(--r-sm);
      color: var(--accent);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 300;
      transition: background .15s;
      flex-shrink: 0;
    }
    #newChatBtn:hover { background: rgba(88,166,255,.22); }

    #convList {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
    }
    .conv-section-label {
      font-size: 11px;
      color: var(--muted);
      padding: 8px 6px 4px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background .12s;
      position: relative;
      margin-bottom: 2px;
    }
    .conv-item:hover { background: var(--hover); }
    .conv-item.active { background: var(--accent-bg); }
    .conv-item .conv-icon { font-size: 14px; flex-shrink: 0; opacity: .7; }
    .conv-item .conv-info { flex: 1; overflow: hidden; }
    .conv-item .conv-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .conv-item.active .conv-title { color: var(--accent); }
    .conv-item .conv-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .conv-item .conv-actions {
      display: none;
      gap: 4px;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
    }
    .conv-item:hover .conv-actions { display: flex; }
    .conv-actions button {
      width: 26px; height: 26px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .conv-actions button:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Titlebar ───────────────────────────────────────────────────────── */
    #titlebar {
      height: 36px; min-height: 36px;
      background: var(--sb-bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      -webkit-app-region: drag;
      flex-shrink: 0; user-select: none;
    }
    .tb-logo {
      display: flex; align-items: center; gap: 6px;
      padding: 0 0 0 12px;
      color: var(--accent); font-size: 13px; font-weight: 700;
    }
    .tb-logo svg { width: 16px; height: 16px; flex-shrink: 0; }
    .tb-spacer { flex: 1; }
    .tb-drag-area { display:flex; align-items:center; flex:1; min-width:0; overflow:hidden; }
    .tb-btn {
      -webkit-app-region: no-drag;
      width: 46px; height: 36px;
      background: none; border: none; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s; flex-shrink: 0;
    }
    .tb-btn:hover { background: var(--hover); color: var(--text); }
    .tb-btn.tb-close:hover { background: #c42b1c; color: #fff; }
    .tb-btn svg { width: 10px; height: 10px; pointer-events: none; }

    /* ── Icon bar ───────────────────────────────────────────────────────── */
    #iconBar {
      width: 44px; background: var(--sb-bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; padding: 8px 0;
      flex-shrink: 0; gap: 2px;
    }
    .ib-btn {
      width: 36px; height: 36px;
      background: none; border: none; border-radius: var(--r-sm);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s; flex-shrink: 0;
    }
    .ib-btn:hover { background: var(--hover); color: var(--text); }
    .ib-btn.active { background: var(--accent-bg); color: var(--accent); }
    .ib-btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
    .ib-btn svg { width: 18px; height: 18px; pointer-events: none; }
    .ib-spacer { flex: 1; }
    .ib-sep { width: 24px; height: 1px; background: var(--border); margin: 4px 0; }
    .ib-logo {
      width: 36px; height: 36px; margin-bottom: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ib-logo svg { width: 22px; height: 22px; }

    /* ── Sidebar panels ─────────────────────────────────────────────────── */
    .sb-panel { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .sb-panel-hd {
      padding: 9px 10px 9px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .sb-panel-title { font-size: 13px; font-weight: 600; color: var(--muted); }

    /* Settings sub-nav in sidebar */
    #sbPanelSettings { overflow: hidden; }
    .sp-nav { display: flex; flex-direction: column; padding: 6px 0; }
    .sp-nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; font-size: 13px;
      color: var(--muted); cursor: pointer;
      border-radius: 0; transition: background .12s, color .12s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .sp-nav-item:hover { background: var(--hover); color: var(--text); }
    .sp-nav-item.active { background: var(--accent-bg); color: var(--accent); }
    .sp-nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .7; }
    .sp-nav-item.active svg { opacity: 1; }

    /* Settings view in main area */
    #settingsView {
      display: none; flex: 1; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }
    #settingsView.visible { display: flex; }
    .sv-header {
      height: 52px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px;
      font-size: 15px; font-weight: 600; flex-shrink: 0;
    }
    .sv-body {
      flex: 1; overflow-y: auto; padding: 24px;
      max-width: 600px;
    }
    .sv-footer {
      padding: 12px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0;
    }

    /* ── Main area ──────────────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    #chatView { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    .chat-header {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }
    #chatTitle {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--accent-bg);
      border: 1px solid rgba(88,166,255,.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    #headerClearBtn {
      padding: 5px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
    }
    #headerClearBtn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Messages ────────────────────────────────────────────────────────── */
    #msgContainer {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    #msgList {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 100%;
    }

    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 2px;
      letter-spacing: 0;
    }
    .msg-row.user .msg-avatar {
      background: rgba(88,166,255,.25);
      border: 1px solid rgba(88,166,255,.4);
      color: #58a6ff;
    }
    .msg-row.assistant .msg-avatar {
      background: rgba(63,185,80,.18);
      border: 1px solid rgba(63,185,80,.35);
      color: #3fb950;
    }

    .msg-body { flex: 1; min-width: 0; }
    .msg-row.user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

    /* User bubble */
    .msg-row.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(88,166,255,.2);
      border-radius: 16px 4px 16px 16px;
      padding: 12px 16px;
      max-width: 72%;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.65;
    }

    /* Assistant bubble */
    .msg-row.assistant .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* Status chip (during stream) */
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 10px;
      background: var(--hover);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .status-chip .spinner {
      width: 10px; height: 10px;
      border: 1.5px solid rgba(255,255,255,.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Thinking block */
    .think-block {
      border: 1px solid rgba(88,166,255,.2);
      border-radius: var(--r-sm);
      margin-bottom: 10px;
      overflow: hidden;
      background: rgba(88,166,255,.04);
    }
    .think-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      user-select: none;
      transition: background .12s;
    }
    .think-header:hover { background: rgba(88,166,255,.06); }
    .think-arrow { margin-left: auto; transition: transform .2s; font-size: 10px; }
    .think-block.open .think-arrow { transform: rotate(90deg); }
    .think-body {
      display: none;
      padding: 0 12px 12px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
    }
    .think-block.open .think-body { display: block; }

    /* Blinking cursor during stream */
    .cursor { display: inline-block; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* Tool call blocks (inside assistant message) */
    .tool-block {
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      margin-bottom: 8px;
      font-size: 13px;
      overflow: hidden;
    }
    .tool-block-hd {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      cursor: pointer;
      user-select: none;
      transition: background .12s;
    }
    .tool-block-hd:hover { background: var(--hover); }
    .tb-label { flex: 1; font-weight: 500; color: var(--text); font-size: 13px; }
    .tb-ok  { color: var(--green);  display: flex; align-items: center; }
    .tb-err { color: var(--danger); font-size: 13px; }
    .tb-arrow { font-size: 10px; opacity: .5; transition: transform .18s; margin-left: 2px; }
    .tool-block.open .tb-arrow { transform: rotate(90deg); }
    .tool-block-body {
      display: none;
      padding: 4px 12px 12px;
      border-top: 1px solid var(--border);
    }
    .tool-block.open .tool-block-body { display: block; }
    .tb-query { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.6; }
    .tb-query em { color: var(--text); font-style: normal; }
    /* 每一轮检索——小工具块 */
    .tb-round { border: 1px solid var(--border); border-radius: 5px; margin-bottom: 6px; overflow: hidden; }
    .tb-round-hd {
      display: flex; align-items: center; gap: 6px; padding: 5px 9px;
      cursor: pointer; font-size: 12px; user-select: none;
    }
    .tb-round-hd:hover { background: var(--hover); }
    .tb-round-label { flex: 1; font-weight: 600; color: var(--text); }
    .tb-round-sub { color: var(--muted); font-size: 11px; }
    .tb-round-arrow { font-size: 10px; color: var(--muted); transition: transform .15s; }
    .tb-round.open .tb-round-arrow { transform: rotate(90deg); }
    .tb-round-body {
      display: none; padding: 5px 9px 7px;
      font-size: 11px; color: var(--muted); border-top: 1px solid var(--border);
    }
    .tb-round.open .tb-round-body { display: block; }
    .tb-results {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }
    .tb-result-card {
      min-width: 168px;
      max-width: 200px;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 12px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color .12s;
    }
    .tb-result-card:hover { border-color: var(--accent); }
    .rc-idx { color: var(--accent); font-weight: 600; margin-right: 3px; }
    .rc-title {
      display: block; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .rc-url {
      display: block; color: var(--muted); font-size: 11px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rc-body {
      display: block; color: var(--muted); font-size: 11px; margin-top: 3px;
      line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      line-clamp: 3;
      overflow: hidden;
    }
    /* ── KB selector popup ──────────────────────────────── */
    .kb-sel-popup {
      position: absolute; bottom: calc(100% + 6px); left: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 6px 0 0;
      min-width: 200px; max-width: 260px;
      box-shadow: 0 4px 16px rgba(0,0,0,.35); z-index: 200;
    }
    .kb-sel-header {
      font-size: 11px; font-weight: 600; color: var(--muted);
      padding: 0 10px 6px; letter-spacing: .4px; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .kb-sel-list { max-height: 180px; overflow-y: auto; padding: 4px 0; }
    .kb-sel-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; font-size: 13px; cursor: pointer;
      transition: background .1s;
    }
    .kb-sel-item:hover { background: var(--hover); }
    .kb-sel-item input[type=checkbox] { accent-color: var(--accent); flex-shrink:0; }
    .kb-sel-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .kb-sel-empty { padding: 12px 10px; font-size: 12px; color: var(--muted); text-align: center; }
    .kb-sel-footer {
      display: flex; gap: 6px; padding: 6px 10px;
      border-top: 1px solid var(--border);
    }
    .kb-sel-footer button {
      flex: 1; padding: 5px 0; font-size: 12px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface); color: var(--text); cursor: pointer;
    }
    .kb-sel-footer button.primary {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    /* fallback notice */
    .fallback-notice {
      font-size: 11px; color: var(--muted); margin-bottom: 6px;
      padding: 3px 6px; background: var(--hover); border-radius: 4px; display: inline-block;
    }
    /* Settings tool category header */
    .tool-cat-hd {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
      color: var(--muted);
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    /* Message actions (always visible) */
    .msg-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      align-items: center;
    }
    /* 用户消息操作按钮右对齐，匹配气泡方向 */
    .msg-row.user .msg-actions { justify-content: flex-end; }
    /* Version navigation bar — sits at the TOP of msg-body, above tool blocks */
    .ver-nav-bar {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 6px; padding-bottom: 6px; margin-bottom: 4px;
      border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--muted);
    }
    .ver-nav-btn {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 8px; cursor: pointer; color: var(--muted);
      font-size: 12px; line-height: 1.5; transition: all .12s;
    }
    .ver-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .ver-nav-btn:disabled { opacity: .3; cursor: default; }
    /* 版本隐藏：用 !important 保证不被其他 display 规则覆盖 */
    .ver-hidden { display: none !important; }
    /* System / error message row */
    .msg-row.system .msg-avatar { background: var(--hover); border-color: var(--border); color: var(--muted); }
    .msg-row.system .msg-bubble { background: var(--hover); border: 1px solid var(--border); }
    .msg-act-btn {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--sb-bg);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: all .12s;
    }
    .msg-act-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Markdown styles ─────────────────────────────────────────────────── */
    .md h1,.md h2,.md h3,.md h4 {
      font-weight: 700;
      margin: 1em 0 .4em;
      line-height: 1.35;
      color: var(--text);
    }
    .md h1 { font-size: 1.4em; }
    .md h2 { font-size: 1.2em; }
    .md h3 { font-size: 1.05em; }
    .md p { margin: .55em 0; }
    .md ul,.md ol { padding-left: 1.6em; margin: .5em 0; }
    .md li { margin: .25em 0; }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 14px;
      margin: .6em 0;
      color: var(--muted);
      background: var(--accent-bg);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
    }
    .md table { border-collapse: collapse; width: 100%; margin: .7em 0; font-size: 13px; }
    .md th,.md td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; }
    .md th { background: var(--hover); font-weight: 600; }
    .md code {
      background: rgba(255,255,255,.07);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: .88em;
    }
    .md pre {
      position: relative;
      background: #010409;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      margin: .7em 0;
      overflow: hidden;
    }
    .md pre code {
      display: block;
      padding: 14px 16px;
      overflow-x: auto;
      background: transparent;
      border: none;
      font-size: 13px;
      line-height: 1.55;
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #0d1117;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
    }
    .copy-btn {
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #161b22;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      transition: all .12s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
    .md strong { font-weight: 700; }
    .md em { font-style: italic; }

    /* Empty state */
    #emptyState {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      user-select: none;
    }
    .empty-icon { font-size: 48px; opacity: .5; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text); opacity: .6; }
    .empty-hint { font-size: 13px; }
    .empty-tips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .tip-chip {
      padding: 8px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
    }
    .tip-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Input area ──────────────────────────────────────────────────────── */
    #inputArea {
      border-top: 1px solid var(--border);
      padding: 12px 20px 16px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .input-toolbar {
      display: flex;
      gap: 6px;
      margin: 0 auto 8px;
      max-width: 780px;
    }
    .tool-toggle {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
      line-height: 1.4;
    }
    .tool-toggle:hover { border-color: var(--muted); color: var(--text); }
    .tool-toggle.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 780px;
      margin: 0 auto;
    }
    #msgInput {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      padding: 10px 14px;
      resize: none;
      outline: none;
      max-height: 200px;
      overflow-y: auto;
      transition: border-color .15s;
    }
    #msgInput:focus { border-color: var(--accent); }
    #msgInput::placeholder { color: var(--muted); }
    #sendBtn {
      width: 40px; height: 40px;
      background: var(--accent);
      border: none;
      border-radius: var(--r-sm);
      color: #0d1117;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      transition: filter .12s;
      display: flex; align-items: center; justify-content: center;
    }
    #sendBtn:hover:not(:disabled) { filter: brightness(1.15); }
    #sendBtn:disabled { opacity: .4; cursor: not-allowed; }
    #cancelBtn {
      width: 40px; height: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all .12s;
    }
    #cancelBtn.show { display: flex; }
    #cancelBtn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Settings Modal ──────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      animation: fadeIn .15s ease;
    }
    .modal-panel {
      background: var(--sb-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 560px;
      max-width: 96vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-header span { font-size: 15px; font-weight: 700; }
    .close-btn {
      width: 28px; height: 28px;
      background: var(--hover);
      border: none;
      border-radius: 50%;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .close-btn:hover { background: var(--danger); color: #fff; }
    .modal-tabs {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-tab {
      padding: 6px 14px;
      border-radius: var(--r-sm);
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: all .12s;
    }
    .modal-tab:hover { background: var(--hover); color: var(--text); }
    .modal-tab.active { background: var(--accent-bg); color: var(--accent); }
    .modal-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    /* Form elements */
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field > label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .input-wrap { position: relative; }
    input[type=text], input[type=password], input[type=number], textarea, select {
      width: 100%;
      padding: 9px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    select { cursor: pointer; appearance: none; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 36px; }
    .pw-wrap input[type=password]::-ms-reveal,
    .pw-wrap input[type=password]::-ms-clear { display: none; }
    .eye-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 15px; padding: 2px;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .model-pills {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
    }
    .pill {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
    }
    .pill:hover, .pill.active { border-color: var(--accent); color: var(--accent); }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 13px; }
    .toggle-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .toggle {
      position: relative; width: 40px; height: 22px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* Alert */
    .alert {
      padding: 10px 14px;
      border-radius: var(--r-sm);
      font-size: 12px;
      margin-top: 12px;
      animation: fadeIn .15s;
    }
    .alert-ok { background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3); color: var(--green); }
    .alert-err { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); color: var(--danger); }

    /* Model picker */
    .mp-wrap { position: relative; }
    .mp-trigger {
      width: 100%; padding: 9px 12px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: border-color .15s;
    }
    .mp-trigger:hover { border-color: var(--accent); }
    .mp-trigger.open { border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .mp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mp-chevron { margin-left: auto; font-size: 10px; opacity: .6; transition: transform .2s; }
    .mp-trigger.open .mp-chevron { transform: rotate(180deg); }
    .mp-panel {
      border: 1px solid var(--accent); border-top: none;
      border-radius: 0 0 var(--r-sm) var(--r-sm);
      background: var(--card); display: none;
      flex-direction: column; max-height: 260px; overflow: hidden;
    }
    .mp-panel.open { display: flex; }
    .mp-list { overflow-y: auto; flex: 1; padding: 4px 0; }
    .mp-provider-hdr {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px 4px; font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
      position: sticky; top: 0; background: var(--card);
    }
    .mp-provider-hdr-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .mp-model-row {
      padding: 5px 12px 5px 26px; font-size: 13px;
      cursor: pointer; color: var(--text); transition: background .1s;
    }
    .mp-model-row:hover { background: var(--hover); }
    .mp-model-row.active { color: var(--accent); font-weight: 600; }
    .mp-provider-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; color: var(--text); transition: background .1s;
    }
    .mp-provider-row:hover { background: var(--hover); }
    .mp-provider-row.active { color: var(--accent); }
    .mp-row-hint { margin-left: auto; font-size: 11px; color: var(--muted); font-weight: 400; }
    .mp-search-bar { padding: 7px 9px; border-top: 1px solid var(--border); flex-shrink: 0; }
    input.mp-search {
      width: 100%; padding: 6px 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 12px; outline: none;
    }
    input.mp-search:focus { border-color: var(--accent); }

    /* Model selector in header */
    .model-selector-wrap { position: relative; }
    .model-selector-btn {
      padding: 4px 8px 4px 10px;
      border-radius: 20px;
      background: var(--accent-bg);
      border: 1px solid rgba(88,166,255,.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all .12s;
    }
    .model-selector-btn:hover { border-color: var(--accent); }
    .model-selector-btn .chevron { font-size: 9px; opacity: .7; }
    .model-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 180px;
      background: var(--sb-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      z-index: 200;
      display: none;
      animation: fadeIn .1s ease;
    }
    .model-dropdown.open { display: block; }
    .model-dropdown-item {
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: background .1s;
      white-space: nowrap;
    }
    .model-dropdown-item:hover { background: var(--hover); }
    .model-dropdown-item.active { color: var(--accent); font-weight: 600; }
    .model-dropdown-empty { padding: 8px 10px; font-size: 12px; color: var(--muted); text-align: center; }


    /* Buttons */
    .btn-primary {
      padding: 8px 18px; border-radius: var(--r-sm); border: none;
      background: var(--accent); color: #0d1117; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: filter .12s;
    }
    .btn-primary:hover { filter: brightness(1.12); }
    .btn-secondary {
      padding: 8px 16px; border-radius: var(--r-sm);
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: 13px; cursor: pointer; transition: all .12s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger {
      padding: 8px 16px; border-radius: var(--r-sm);
      border: 1px solid rgba(248,81,73,.3); background: rgba(248,81,73,.1);
      color: var(--danger); font-size: 13px; cursor: pointer; transition: all .12s;
    }
    .btn-danger:hover { background: rgba(248,81,73,.2); }
    /* ── 知识库管理 ─────────────────────────────────── */
    .kb-topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .kb-topbar-title { font-weight:600; font-size:15px; }
    .kb-add-form { background:var(--card); border:1px solid var(--border); border-radius:var(--r-sm); padding:14px 14px 12px; margin-bottom:14px; }
    .kb-add-form-title { font-size:13px; font-weight:600; margin-bottom:10px; }
    /* ── 拖拽上传区 ─────────────────────────────────── */
    .kb-drop-zone { border:2px dashed var(--border); border-radius:var(--r-sm); padding:22px 16px; text-align:center; cursor:pointer; transition:border-color .15s, background .15s; }
    .kb-drop-zone:hover, .kb-drop-zone.drag-over { border-color:var(--accent); background:var(--accent-bg); }
    .kb-drop-icon { font-size:26px; color:var(--muted); margin-bottom:6px; }
    .kb-drop-text { font-size:13px; color:var(--text); }
    .kb-drop-hint { font-size:11px; color:var(--muted); margin-top:4px; }
    .kb-file-chip { display:inline-flex; align-items:center; gap:5px; background:var(--hover); border:1px solid var(--border); border-radius:4px; padding:3px 8px; font-size:12px; margin:3px 3px 0 0; max-width:100%; overflow:hidden; }
    .kb-file-chip span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
    .kb-file-chip button { background:none; border:none; color:var(--muted); cursor:pointer; padding:0 0 0 2px; font-size:13px; line-height:1; flex-shrink:0; }
    .kb-file-chip button:hover { color:var(--danger); }
    /* ── 文件导入行（选文件列表） -------------------------------------- */
    .kb-file-row { border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 10px; margin-top:6px; }
    .kb-file-row-top { display:flex; align-items:center; gap:8px; }
    .kb-file-row-name { flex:1; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
    .kb-file-row-del { background:none; border:none; color:var(--muted); cursor:pointer; padding:0; font-size:12px; line-height:1; flex-shrink:0; }
    .kb-file-row-del:hover { color:var(--danger); }
    .kb-file-bar { height:4px; border-radius:2px; background:var(--border); margin-top:6px; overflow:hidden; }
    .kb-file-bar-fill { height:100%; border-radius:2px; }
    .kb-file-bar-fill.loading { width:100%; background:linear-gradient(90deg,var(--accent-bg) 20%,var(--accent) 50%,var(--accent-bg) 80%); background-size:200% 100%; animation:kb-shimmer 1.2s linear infinite; }
    .kb-file-bar-fill.done { width:100%; background:var(--green,#2da44e); }
    @keyframes kb-shimmer { 0%{background-position:200% 0} 100%{background-position:0% 0} }
    .kb-file-meta { font-size:11px; color:var(--muted); margin-top:4px; }
    .kb-file-err  { font-size:11px; color:var(--danger); margin-top:4px; }
    .kb-card { border:1px solid var(--border); border-radius:var(--r-sm); overflow:hidden; margin-bottom:10px; }
    .kb-card-hd { display:flex; align-items:center; gap:8px; padding:10px 12px; cursor:pointer; user-select:none; background:var(--card); }
    .kb-card-hd:hover { background:var(--hover); }
    .kb-chevron { font-size:10px; color:var(--muted); transition:transform .18s; flex-shrink:0; }
    .kb-card-hd.open .kb-chevron { transform:rotate(90deg); }
    .kb-card-name { font-size:13px; font-weight:500; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .kb-card-badge { background:var(--accent-bg); color:var(--accent); font-size:11px; border-radius:10px; padding:1px 8px; white-space:nowrap; flex-shrink:0; }
    .kb-card-acts { display:flex; gap:4px; flex-shrink:0; }
    .kb-card-body { border-top:1px solid var(--border); padding:0 12px; background:var(--bg); }
    .kb-src-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); }
    .kb-src-row:last-of-type { border-bottom:none; }
    .kb-src-icon { font-size:15px; flex-shrink:0; }
    .kb-src-info { flex:1; min-width:0; }
    .kb-src-name { font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .kb-src-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .kb-src-del { background:none; border:none; color:var(--muted); cursor:pointer; padding:2px 5px; border-radius:4px; font-size:14px; line-height:1; }
    .kb-src-del:hover { color:var(--danger); background:rgba(248,81,73,.12); }
    .kb-chunk-badge { background:var(--accent-bg,rgba(9,105,218,.1)); color:var(--accent,#0969da); border:1px solid transparent; border-radius:10px; padding:1px 7px; font-size:11px; cursor:pointer; transition:background .15s,color .15s; }
    .kb-chunk-badge:hover { background:var(--accent,#0969da); color:#fff; }
    .kb-chunk-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .kb-chunk-modal-box { background:var(--card-bg,#fff); border-radius:10px; width:min(540px,92vw); max-height:72vh; display:flex; flex-direction:column; box-shadow:0 8px 32px rgba(0,0,0,.28); overflow:hidden; }
    .kb-chunk-modal-hd { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); font-size:13px; font-weight:600; flex-shrink:0; }
    .kb-chunk-modal-hd button { background:none; border:none; cursor:pointer; font-size:15px; color:var(--muted); padding:3px 6px; border-radius:4px; }
    .kb-chunk-modal-hd button:hover { background:var(--hover,rgba(0,0,0,.08)); }
    .kb-chunk-modal-body { overflow-y:auto; padding:6px 12px; flex:1; }
    .kb-chunk-item { display:flex; gap:8px; padding:7px 4px; border-bottom:1px solid var(--border); font-size:12px; align-items:flex-start; }
    .kb-chunk-item:last-child { border-bottom:none; }
    .kb-chunk-idx { color:var(--muted); min-width:30px; flex-shrink:0; }
    .kb-chunk-preview { color:var(--text,#222); line-height:1.55; word-break:break-all; }
    .kb-card-footer { padding:8px 0; }
    .kb-more-btn { font-size:12px; color:var(--accent); cursor:pointer; border:none; background:none; padding:0; }
    .kb-more-btn:hover { text-decoration:underline; }
    .kb-inline-import { border-top:1px solid var(--border); margin-top:6px; padding:10px 0 4px; }
    .kb-inline-import .kb-drop-zone { padding:16px; margin-bottom:6px; }
    .kb-empty { color:var(--muted); font-size:13px; text-align:center; padding:28px 0; }
  </style>
</head>
<body>
<div id="frame">

  <!-- ── Titlebar ─────────────────────────────────────────────────────────── -->
  <div id="titlebar">
    <div class="pywebview-drag-region tb-drag-area">
    <div class="tb-logo">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13z"/>
        <path d="M5.5 8.5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5S9.38 11 8 11s-2.5-1.12-2.5-2.5z"/>
      </svg>
      <span>AcompaLLM</span>
    </div>
    <div class="tb-spacer"></div>
    </div>
    <button class="tb-btn" title="最小化" onclick="api()?.win_minimize()">
      <svg viewBox="0 0 10 10" fill="currentColor"><rect x="0" y="4.5" width="10" height="1"/></svg>
    </button>
    <button class="tb-btn" id="tbMaxBtn" title="最大化" onclick="tbToggleMax()">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x=".5" y=".5" width="9" height="9"/></svg>
    </button>
    <button class="tb-btn tb-close" title="关闭" onclick="api()?.win_close()">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
      </svg>
    </button>
  </div>

  <div id="app">

  <!-- ── Icon bar ───────────────────────────────────────────────────────────── -->
  <div id="iconBar">
    <!-- 品牌图标（点阵 AI 风格，不可点击） -->
    <div class="ib-logo" title="AcompaLLM">
      <svg viewBox="0 0 20 20" fill="none" stroke="var(--accent)" stroke-width="1.4">
        <circle cx="4"  cy="4"  r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="10" cy="4"  r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="16" cy="4"  r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="4"  cy="10" r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="10" cy="10" r="2"   fill="none" stroke="var(--accent)"/>
        <circle cx="16" cy="10" r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="4"  cy="16" r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="10" cy="16" r="1.4" fill="var(--accent)" stroke="none"/>
        <circle cx="16" cy="16" r="1.4" fill="var(--accent)" stroke="none"/>
        <line x1="4" y1="4"  x2="10" y2="10" stroke-opacity=".4"/>
        <line x1="16" y1="4"  x2="10" y2="10" stroke-opacity=".4"/>
        <line x1="4" y1="16" x2="10" y2="10" stroke-opacity=".4"/>
        <line x1="16" y1="16" x2="10" y2="10" stroke-opacity=".4"/>
      </svg>
    </div>
    <!-- 对话 -->
    <button class="ib-btn active" data-panel="conv" title="对话" onclick="selectSidebarPanel('conv')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 4.5A1.5 1.5 0 0 1 4.5 3h11A1.5 1.5 0 0 1 17 4.5v8A1.5 1.5 0 0 1 15.5 14H7l-4 3V4.5z"/>
      </svg>
    </button>
    <div class="ib-spacer"></div>
    <!-- 知识库（开发中） -->
    <button class="ib-btn" disabled title="知识库（即将推出）">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h12v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4z"/>
        <path d="M4 4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2"/>
        <line x1="7" y1="9" x2="13" y2="9"/><line x1="7" y1="12" x2="11" y2="12"/>
      </svg>
    </button>
    <div class="ib-sep"></div>
    <!-- API控制台（开发中） -->
    <button class="ib-btn" disabled title="API 控制台（即将推出）">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="5,7 9,10 5,13"/>
        <line x1="11" y1="13" x2="15" y2="13"/>
      </svg>
    </button>
    <!-- 设置 -->
    <button class="ib-btn" data-panel="settings" title="设置" onclick="openSettings()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="10" cy="10" r="2.5"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <!-- 对话列表面板 -->
    <div id="sbPanelConv" class="sb-panel">
      <div class="sb-panel-hd">
        <span class="sb-panel-title">对话</span>
        <button id="newChatBtn" title="新对话" onclick="newChat()">+</button>
      </div>
      <div id="convList"></div>
    </div>
    <!-- 设置子导航面板 -->
    <div id="sbPanelSettings" class="sb-panel" style="display:none">
      <div class="sb-panel-hd">
        <span class="sb-panel-title">设置</span>
      </div>
      <nav class="sp-nav">
        <button class="sp-nav-item active" data-tab="api" onclick="switchSettingsTab('api',this)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
            <circle cx="8" cy="8" r="2"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.93 2.93l1.42 1.42M11.65 11.65l1.42 1.42M2.93 13.07l1.42-1.42M11.65 4.35l1.42-1.42"/>
          </svg>
          API 配置
        </button>
        <button class="sp-nav-item" data-tab="tools" onclick="switchSettingsTab('tools',this)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M9.5 2a4 4 0 0 1-4.9 5.4L2 10l4 4 2.6-2.6A4 4 0 1 1 9.5 2z"/>
          </svg>
          工具
        </button>
        <button class="sp-nav-item" data-tab="memory" onclick="switchSettingsTab('memory',this)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M3 2h9a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/>
            <line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="9" y2="9"/>
          </svg>
          知识库
        </button>
      </nav>
    </div><!-- #sbPanelSettings -->
  </aside>
  <div id="resizeHandle"></div>

  <!-- ── Main ─────────────────────────────────────────────────────────────── -->
  <main id="main">

    <!-- ── Settings view（叠加在 main 内，设置模式时显示） ─────────────────── -->
    <div id="settingsView">
      <div class="sv-header" id="svHeader">API 配置</div>
      <div class="sv-body">
        <!-- API tab -->
        <div id="tabApi">
          <div class="field">
            <label>模型</label>
            <div class="mp-wrap">
              <button class="mp-trigger" id="mpTrigger" type="button" onclick="toggleModelPicker(event)">
                <span class="mp-dot" id="mpDot" style="background:#58a6ff"></span>
                <span id="mpLabel">DeepSeek · deepseek-chat</span>
                <span class="mp-chevron">▾</span>
              </button>
              <div class="mp-panel" id="mpPanel">
                <div class="mp-list" id="mpList"></div>
              </div>
            </div>
            <input type="hidden" id="sModel" />
            <input type="hidden" id="sPickedProvider" value="deepseek" />
          </div>
          <div class="field" id="customUrlField" style="display:none">
            <label>Base URL</label>
            <input type="text" id="sBaseUrl" placeholder="https://your-api-host.com/v1" />
          </div>
          <div class="field">
            <label>API Key</label>
            <div class="pw-wrap">
              <input type="password" id="sApiKey" placeholder="sk-xxxxxxxxxxxxxxxx" />
              <button class="eye-btn" onclick="togglePw('sApiKey',this)">
                <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
                  <path d="M8 2.5C4 2.5 1 8 1 8s3 5.5 7 5.5S15 8 15 8 12 2.5 8 2.5zm0 9A3.5 3.5 0 1 1 8 4.5a3.5 3.5 0 0 1 0 7zm0-5.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
                </svg>
              </button>
            </div>
            <p class="hint" id="sApiKeyHint" style="display:none;color:var(--green)">✓ Ollama 本地服务，无需 API Key</p>
          </div>
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;">
            <button id="fetchModelsBtn" class="btn-secondary" type="button" style="font-size:13px;padding:7px 14px;" onclick="fetchAndShowModels()">
              <span id="fetchModelsSpinner" style="display:none;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:4px;"></span>
              验证并刷新模型列表
            </button>
            <span id="fetchModelsStatus" style="font-size:12px;"></span>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>Temperature</label>
              <input type="number" id="sTemp" value="0.7" min="0" max="2" step="0.05" />
              <p class="hint">0 = 精确，1 = 均衡，2 = 创意</p>
            </div>
          </div>
          <div class="field">
            <label>系统提示词 (System Prompt)</label>
            <textarea id="sSystemPrompt" placeholder="可选，在此描述 AI 的角色与行为规范…" rows="3"></textarea>
          </div>
          <div id="connAlert"></div>
        </div>
        <!-- Tools tab -->
        <div id="tabTools" hidden>
          <div class="tool-cat-hd">联网</div>
          <div class="field" style="margin-bottom:14px">
            <label>搜索引擎</label>
            <div class="mp-wrap">
              <button class="mp-trigger" id="sepTrigger" type="button" onclick="toggleSepPicker(event)">
                <span class="mp-dot" id="sepDot" style="background:#ff6900"></span>
                <span id="sepLabel">DuckDuckGo</span>
                <span class="mp-chevron">▾</span>
              </button>
              <div class="mp-panel" id="sepPanel">
                <div class="mp-list" id="sepList"></div>
              </div>
            </div>
            <input type="hidden" id="sWebEngine" value="ddg" />
          </div>
          <!-- Engine API key rows (shown based on selected engine) -->
          <div class="se-key-row field" id="seKeyTavily" style="display:none;margin-bottom:14px">
            <label>Tavily API Key</label>
            <div class="pw-wrap">
              <input type="password" id="sTavilyKey" placeholder="tvly-…" autocomplete="off" />
              <button class="eye-btn" onclick="togglePw('sTavilyKey',this)">
                <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M8 2.5C4 2.5 1 8 1 8s3 5.5 7 5.5S15 8 15 8 12 2.5 8 2.5zm0 9A3.5 3.5 0 1 1 8 4.5a3.5 3.5 0 0 1 0 7zm0-5.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
              </button>
            </div>
          </div>
          <div class="se-key-row field" id="seKeyBing" style="display:none;margin-bottom:14px">
            <label>Bing API Key <span style="font-size:11px;color:var(--muted);font-weight:400">— Azure Cognitive Services</span></label>
            <div class="pw-wrap">
              <input type="password" id="sBingKey" placeholder="请输入 Azure Bing 订阅密钥" autocomplete="off" />
              <button class="eye-btn" onclick="togglePw('sBingKey',this)">
                <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M8 2.5C4 2.5 1 8 1 8s3 5.5 7 5.5S15 8 15 8 12 2.5 8 2.5zm0 9A3.5 3.5 0 1 1 8 4.5a3.5 3.5 0 0 1 0 7zm0-5.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
              </button>
            </div>
          </div>
          <div class="se-key-row field" id="seKeyBrave" style="display:none;margin-bottom:14px">
            <label>Brave Search API Key</label>
            <div class="pw-wrap">
              <input type="password" id="sBraveKey" placeholder="BSA…" autocomplete="off" />
              <button class="eye-btn" onclick="togglePw('sBraveKey',this)">
                <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M8 2.5C4 2.5 1 8 1 8s3 5.5 7 5.5S15 8 15 8 12 2.5 8 2.5zm0 9A3.5 3.5 0 1 1 8 4.5a3.5 3.5 0 0 1 0 7zm0-5.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
              </button>
            </div>
          </div>
          <div class="se-key-row field" id="seKeySerp" style="display:none;margin-bottom:14px">
            <label>SerpAPI Key <span style="font-size:11px;color:var(--muted);font-weight:400">— Google 搜索</span></label>
            <div class="pw-wrap">
              <input type="password" id="sSerpKey" placeholder="请输入 SerpAPI Key" autocomplete="off" />
              <button class="eye-btn" onclick="togglePw('sSerpKey',this)">
                <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M8 2.5C4 2.5 1 8 1 8s3 5.5 7 5.5S15 8 15 8 12 2.5 8 2.5zm0 9A3.5 3.5 0 1 1 8 4.5a3.5 3.5 0 0 1 0 7zm0-5.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
              </button>
            </div>
          </div>
          <div class="toggle-row">
            <div>
              <div class="toggle-label">联网搜索</div>
              <div class="toggle-hint">自动检测问题是否需要实时信息后搜索</div>
            </div>
            <select id="sWebSearch" style="width:110px">
              <option value="auto">自动</option>
              <option value="true">总是</option>
              <option value="false">禁用</option>
            </select>
          </div>
          <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
            <button id="testWebBtn" class="btn-secondary" type="button" onclick="testWebSearch()" style="font-size:13px">测试联网</button>
            <div id="connToolAlert" style="font-size:12px"></div>
          </div>
          <div style="height:20px"></div>
          <div class="toggle-row">
            <div>
              <div class="toggle-label">默认开启知识库检索</div>
              <div class="toggle-hint">每次对话自动从向量库召回相关片段</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="sRag" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <!-- Memory tab -->
        <div id="tabMemory" hidden>
          <!-- 顶部栏 -->
          <div class="kb-topbar">
            <span class="kb-topbar-title">知识库</span>
            <button class="btn-secondary" style="font-size:12px;padding:4px 12px" onclick="kbShowAddForm(null)">＋ 添加</button>
          </div>

          <!-- 内联 添加/导入 表单 -->
          <div id="kbAddForm" hidden class="kb-add-form">
            <div class="kb-add-form-title" id="kbAddFormTitle">新建知识库</div>

            <!-- Step 1：命名 + 选模型（仅新建时显示） -->
            <div id="kbStep1">
              <div class="field" style="margin-bottom:10px">
                <label>知识库名称</label>
                <input id="kbAddName" type="text" placeholder="例如：道德经" />
              </div>
              <div class="field" style="margin-bottom:14px">
                <label>嵌入模型</label>
                <select id="kbEmbedModel" style="width:100%">
                  <option value="BAAI/bge-small-zh-v1.5">bge-small-zh-v1.5（已下载 · 推荐）</option>
                  <option value="BAAI/bge-base-zh-v1.5">bge-base-zh-v1.5（精度更高）</option>
                  <option value="BAAI/bge-large-zh-v1.5">bge-large-zh-v1.5（最高精度 · 较慢）</option>
                  <option value="shibing624/text2vec-base-chinese">text2vec-base-chinese</option>
                </select>
              </div>
              <div style="display:flex;gap:8px">
                <button class="btn-primary" onclick="kbNextStep()">下一步 →</button>
                <button class="btn-secondary" onclick="kbHideAddForm()">取消</button>
              </div>
              <div id="kbStep1Alert" style="margin-top:6px;min-height:16px;font-size:12px"></div>
            </div>

            <!-- Step 2：文件选择 + 导入（追加时直接显示） -->
            <div id="kbStep2" hidden>
              <!-- 拖拽 / 点击上传区 -->
              <div id="kbDropZone" class="kb-drop-zone" onclick="kbClickDrop()" ondragover="kbDragOver(event)" ondragleave="kbDragLeave(event)" ondrop="kbDrop(event)">
                <div class="kb-drop-icon">↑</div>
                <div class="kb-drop-text">将文件拖放到此处，或点击浏览</div>
                <div class="kb-drop-hint">支持 .txt .md .pdf .docx</div>
              </div>
              <!-- 已选文件列表 -->
              <div id="kbFileList" style="margin-top:8px"></div>
              <!-- URL 输入（可选） -->
              <details style="margin-top:10px">
                <summary style="font-size:12px;color:var(--muted);cursor:pointer;user-select:none">导入网页 URL（可选）</summary>
                <div class="field" style="margin-top:8px">
                  <input id="kbUrl" type="text" placeholder="https://…" />
                </div>
              </details>
              <div style="display:flex;gap:8px;margin-top:12px">
                <button class="btn-primary" id="kbIngestBtn" onclick="kbIngest()">开始导入</button>
                <button class="btn-secondary" onclick="kbHideAddForm()">取消</button>
              </div>
              <div id="kbAlert" style="margin-top:8px;min-height:18px;font-size:12px"></div>
            </div>
          </div>

          <!-- 空状态 -->
          <div id="kbEmpty" class="kb-empty" hidden>暂无知识库，点击"＋ 添加"开始导入文档</div>

          <!-- 集合卡片列表 -->
          <div id="kbColList"></div>
        </div>
      </div><!-- .sv-body -->
      <div class="sv-footer">
        <button id="testConnBtn" class="btn-secondary" onclick="testConn()">测试连接</button>
        <button class="btn-primary" onclick="saveSettings()">保存</button>
      </div>
    </div><!-- #settingsView -->

    <div id="chatView" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="chat-header">
      <span id="chatTitle">AcompaLLM</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <button id="headerClearBtn" hidden onclick="clearCurrentConv()">清空对话</button>
        <div class="model-selector-wrap" id="modelSelectorWrap" style="display:none">
          <button class="model-selector-btn" id="modelSelectorBtn" onclick="toggleModelDropdown(event)">
            <span id="modelSelectorLabel">deepseek-chat</span>
            <span class="chevron">▾</span>
          </button>
          <div class="model-dropdown" id="modelDropdown">
            <!-- filled by JS -->
          </div>
        </div>
      </div>
    </div>

    <div id="msgContainer">
      <div id="msgList">
        <!-- filled by JS -->
        <div id="emptyState">
          <div class="empty-title">AcompaLLM</div>
          <div class="empty-hint">开始一段新对话</div>
          <div class="empty-tips">
            <span class="tip-chip" onclick="insertTip(this)">帮我写一封邮件</span>
            <span class="tip-chip" onclick="insertTip(this)">解释量子纠缠</span>
            <span class="tip-chip" onclick="insertTip(this)">今天有什么新闻？</span>
            <span class="tip-chip" onclick="insertTip(this)">写一段 Python 排序</span>
          </div>
        </div>
      </div>
    </div>

    <div id="inputArea">
      <div class="input-toolbar">
        <button id="webSearchBtn" class="tool-toggle" title="联网搜索"
                onclick="toggleTool(this)">搜索</button>
        <div style="position:relative;display:inline-block">
          <button id="ragBtn" class="tool-toggle" title="知识库检索"
                  onclick="kbSelectorToggle()">知识</button>
          <div id="kbSelectorPopup" class="kb-sel-popup" style="display:none">
            <div class="kb-sel-header">绑定知识库</div>
            <div id="kbSelList" class="kb-sel-list"></div>
            <div class="kb-sel-footer">
              <button onclick="kbSelectorClose()">取消</button>
              <button class="primary" onclick="kbSelectorSave()">确认</button>
            </div>
          </div>
        </div>
        <button id="deepThinkBtn" class="tool-toggle" style="display:none"
                title="深度思考（使用 deepseek-reasoner）"
                onclick="toggleTool(this)">深思</button>
      </div>
      <div class="input-row">
        <textarea id="msgInput" rows="1" placeholder="发送消息… (Enter 发送 / Shift+Enter 换行)"></textarea>
        <button id="cancelBtn" title="停止" onclick="cancelStream()">■</button>
        <button id="sendBtn" title="发送 (Enter)" onclick="sendMessage()">▶</button>
      </div>
    </div>

    </div><!-- #chatView -->
  </main>

</div><!-- #app -->
</div><!-- #frame -->
